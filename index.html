                        e('div', { className: 'flex gap-3' },
                            e('button', {
                                onClick: doLogin,
                                disabled: authLoading,
                                className: 'flex-1 py-3 rounded-xl font-black text-base transition-all active:scale-95',
                                style: { background: 'linear-gradient(45deg, #d1fc00, #c4ec00)', color: 'var(--on-primary-container)', opacity: authLoading ? 0.5 : 1 }
                            }, authLoading ? 'Loading...' : 'Login'),
                            e('button', {
                                onClick: doRegister,
                                disabled: authLoading,
                                className: 'flex-1 py-3 rounded-xl font-bold text-base transition-all active:scale-95',
                                style: { background: 'var(--surface-container-low)', color: 'var(--on-surface)', opacity: authLoading ? 0.5 : 1 }
                            }, 'Register')
                        ),
                        !cloudEnabled() ? e('div', { className: 'mt-3 text-xs text-center', style: { color: 'var(--outline)' } },
                            'Offline mode \u2022 Data stored locally'
                        ) : e('div', { className: 'mt-3 text-xs text-center', style: { color: 'var(--primary-fixed-dim)' } },
                            'Cloud sync enabled'
                        )
                    )
                );
            }

            // ======================
            // MIGRATION VIEW
            // ======================
            if (view === 'migrate' && pendingMigration) {
                const dayCount = Object.keys(pendingMigration).filter(k => pendingMigration[k] && pendingMigration[k].name).length;
                return e('div', {
                    className: 'min-h-screen flex flex-col items-center justify-center px-6',
                    style: { background: 'var(--void)', color: 'var(--on-surface)' }
                },
                    e('div', {
                        className: 'w-full max-w-sm rounded-2xl p-6',
                        style: { background: 'var(--surface-container-highest)' }
                    },
                        e('div', { className: 'flex items-center gap-3 mb-5' },
                            e('div', {
                                className: 'w-12 h-12 rounded-xl flex items-center justify-center',
                                style: { background: 'rgba(209, 252, 0, 0.1)' }
                            }, e(MIcon, { icon: 'sync', style: { fontSize: '28px', color: 'var(--primary-container)' } })),
                            e('div', null,
                                e('div', { className: 'text-lg font-black' }, 'Existing Data Found'),
                                e('div', { className: 'text-sm', style: { color: 'var(--on-surface-variant)' } },
                                    `${dayCount} workout${dayCount !== 1 ? 's' : ''} from previous app`
                                )
                            )
                        ),
                        // Show what workouts exist
                        e('div', { className: 'space-y-1.5 mb-5' },
                            Object.keys(pendingMigration).filter(k => pendingMigration[k] && pendingMigration[k].name).map(day =>
                                e('div', {
                                    key: day,
                                    className: 'flex items-center justify-between px-3 py-2 rounded-lg',
                                    style: { background: 'var(--surface-container-low)' }
                                },
                                    e('span', { className: 'text-sm font-bold' }, day),
                                    e('span', { className: 'text-sm', style: { color: 'var(--on-surface-variant)' } }, pendingMigration[day].name)
                                )
                            )
                        ),
                        e('div', { className: 'flex gap-3' },
                            e('button', {
                                onClick: doMigrationSkip,
                                className: 'flex-1 py-3 rounded-xl font-bold text-base transition-all active:scale-95',
                                style: { background: 'var(--surface-container-low)', color: 'var(--on-surface-variant)' }
                            }, 'Skip'),
                            e('button', {
                                onClick: doMigrationImport,
                                className: 'flex-1 py-3 rounded-xl font-black text-base transition-all active:scale-95',
                                style: { background: 'linear-gradient(45deg, #d1fc00, #c4ec00)', color: 'var(--on-primary-container)' }
                            }, 'Import')
                        )
                    )
                );
            }

            // Profile modal overlay
            const profileModal = showProfile ? e('div', {
                className: 'fixed inset-0 z-[100] flex items-start justify-center pt-20',
                onClick: () => setShowProfile(false)
            },
                // Backdrop
                e('div', { className: 'absolute inset-0', style: { background: 'rgba(0,0,0,0.7)' } }),
                // Card
                e('div', {
                    className: 'relative z-10 w-80 rounded-2xl p-5',
                    style: { background: 'var(--surface-container-highest)' },
                    onClick: (ev) => ev.stopPropagation()
                },
                    // User icon + name
                    e('div', { className: 'flex items-center gap-4 mb-5' },
                        e('div', {
                            className: 'w-14 h-14 rounded-2xl flex items-center justify-center',
                            style: { background: 'rgba(209, 252, 0, 0.1)' }
                        }, e(MIcon, { icon: 'person', fill: true, style: { fontSize: '32px', color: 'var(--primary-container)' } })),
                        e('div', null,
                            e('div', { className: 'text-lg font-black' }, currentUser ? currentUser.username : ''),
                            e('div', { className: 'text-xs', style: { color: 'var(--on-surface-variant)' } },
                                currentUser ? `Joined ${new Date(currentUser.createdAt).toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' })}` : ''
                            )
                        )
                    ),
                    // Stats summary
                    e('div', { className: 'flex gap-3 mb-5' },
                        e('div', { className: 'flex-1 rounded-xl p-3 text-center', style: { background: 'var(--surface-container-low)' } },
                            e('div', { className: 'text-lg font-black', style: { color: 'var(--primary-fixed-dim)' } }, workoutHistory.length),
                            e('div', { className: 'text-xs', style: { color: 'var(--on-surface-variant)' } }, 'Workouts')
                        ),
                        e('div', { className: 'flex-1 rounded-xl p-3 text-center', style: { background: 'var(--surface-container-low)' } },
                            e('div', { className: 'text-lg font-black', style: { color: 'var(--primary-fixed-dim)' } },
                                (workoutHistory.reduce((sum, w) => sum + w.exercises.reduce((s, ex) => s + ex.sets.reduce((ss, set) => ss + set.reps * set.weight, 0), 0), 0) / 1000).toFixed(1) + 't'
                            ),
                            e('div', { className: 'text-xs', style: { color: 'var(--on-surface-variant)' } }, 'Lifted')
                        )
                    ),
                    // Sync status
                    e('div', { className: 'flex items-center gap-2 mb-5 px-1' },
                        e(MIcon, { icon: cloudEnabled() ? 'cloud_done' : 'cloud_off', style: { fontSize: '18px', color: cloudEnabled() ? 'var(--primary-fixed-dim)' : 'var(--outline)' } }),
                        e('span', { className: 'text-sm', style: { color: 'var(--on-surface-variant)' } },
                            cloudEnabled() ? 'Cloud sync active' : 'Offline \u2022 Local storage only'
                        )
                    ),
                    // Logout button
                    e('button', {
                        onClick: doLogout,
                        className: 'w-full py-3 rounded-xl font-bold text-base transition-all active:scale-95',
                        style: { background: 'var(--surface-container-low)', color: 'var(--error)' }
                    }, 'Log Out')
                )
            ) : null;

            // ======================
            // EDIT VIEW
            // ======================
            if (view === 'edit') {
                return e('div', {
                    className: 'min-h-screen flex flex-col',
                    style: { background: 'var(--void)', color: 'var(--on-surface)' }
                },
                    e(TopAppBar, {
                        title: editingDay ? editingDay.toUpperCase() : 'EDIT',
                        leftAction: e('button', {
                            onClick: () => { setView('landing'); setEditingWorkout(null); setEditingDay(null); },
                            className: 'flex items-center gap-1 transition-opacity active:opacity-60',
                            style: { color: 'var(--on-surface-variant)' }
                        }, e(ArrowLeft, { size: 20 }), e('span', { className: 'text-sm' }, 'Back')),
                        rightAction: e('button', {
                            onClick: saveWorkout,
                            className: 'px-4 py-2 rounded-xl text-sm font-bold transition-opacity active:opacity-80',
                            style: { background: 'linear-gradient(45deg, #d1fc00, #c4ec00)', color: 'var(--on-primary-container)' },
                            disabled: !editingWorkout?.name || !editingWorkout?.exercises.every(ex => ex.name)
                        }, 'Save')
                    }),
                    e('div', { className: 'flex-1 pt-20 px-4 pb-28 overflow-y-auto' },
                        e('div', { className: 'max-w-4xl mx-auto' },
                            // Workout name
                            e('div', { className: 'mb-6' },
                                e('label', { className: 'block mb-2 text-xs uppercase tracking-widest', style: { color: 'var(--on-surface-variant)' } }, 'Workout Name'),
                                e('input', {
                                    type: 'text',
                                    value: editingWorkout?.name || '',
                                    onChange: (ev) => setEditingWorkout({ ...editingWorkout, name: ev.target.value }),
                                    className: 'w-full p-3 rounded-xl outline-none text-lg font-bold',
                                    style: { background: 'var(--surface-container-low)', color: 'var(--on-surface)', border: 'none', caretColor: 'var(--primary-container)' },
                                    placeholder: 'e.g., Push Day'
                                })
                            ),
                            // Exercises
                            editingWorkout?.exercises.map((exercise, exIdx) =>
                                e('div', { key: exIdx, className: 'mb-6 p-4 rounded-xl', style: { background: 'var(--surface-container-highest)' } },
                                    e('div', { className: 'flex items-center justify-between mb-4 gap-2' },
                                        e('input', {
                                            type: 'text', value: exercise.name,
                                            onChange: (ev) => updateExerciseName(exIdx, ev.target.value),
                                            onKeyDown: (ev) => { if (ev.key === 'Enter') ev.target.blur(); },
                                            className: 'flex-1 max-w-[60%] p-2 rounded-lg outline-none font-bold',
                                            style: { background: 'var(--surface-container-low)', color: 'var(--on-surface)', border: 'none', caretColor: 'var(--primary-container)' },
                                            placeholder: 'Exercise name'
                                        }),
                                        e('button', {
                                            onClick: () => removeExercise(exIdx),
                                            className: 'ml-2 px-3 py-2 rounded-lg text-sm font-bold transition-opacity active:opacity-80',
                                            style: { background: 'var(--error-container)', color: 'var(--on-error-container)' }
                                        }, 'Remove')
                                    ),
                                    e('div', { className: 'mb-4' },
                                        e('input', {
                                            type: 'text', value: exercise.notes || '',
                                            onChange: (ev) => updateExerciseNotes(exIdx, ev.target.value),
                                            onKeyDown: (ev) => { if (ev.key === 'Enter') ev.target.blur(); },
                                            className: 'w-full p-2 rounded-lg outline-none text-sm',
                                            style: { background: 'var(--surface-container-low)', color: 'var(--on-surface-variant)', border: 'none', caretColor: 'var(--primary-container)' },
                                            placeholder: 'Optional notes (e.g., form tips, tempo, rest time)'
                                        })
                                    ),
                                    // Sets
                                    e('div', { className: 'space-y-2' },
                                        exercise.sets.map((set, setIdx) =>
                                            e('div', { key: setIdx, className: 'flex items-center gap-3' },
                                                e('span', { className: 'w-12 text-sm', style: { color: 'var(--on-surface-variant)' } }, `Set ${setIdx + 1}`),
                                                e('input', {
                                                    type: 'number', value: set.reps || '',
                                                    onChange: (ev) => updateSet(exIdx, setIdx, 'reps', ev.target.value),
                                                    onKeyDown: (ev) => { if (ev.key === 'Enter') ev.target.blur(); },
                                                    className: 'w-20 p-2 rounded-lg outline-none',
                                                    style: { background: 'var(--surface-container-low)', color: 'var(--on-surface)', border: 'none', caretColor: 'var(--primary-container)' },
                                                    placeholder: 'Reps'
                                                }),
                                                e('input', {
                                                    type: 'number', step: '0.01', value: set.weight || '',
                                                    onChange: (ev) => updateSet(exIdx, setIdx, 'weight', ev.target.value),
                                                    onKeyDown: (ev) => { if (ev.key === 'Enter') ev.target.blur(); },
                                                    className: 'w-24 p-2 rounded-lg outline-none',
                                                    style: { background: 'var(--surface-container-low)', color: 'var(--on-surface)', border: 'none', caretColor: 'var(--primary-container)' },
                                                    placeholder: 'Weight'
                                                }),
                                                e('span', { className: 'text-sm', style: { color: 'var(--on-surface-variant)' } }, 'kg'),
                                                e('button', {
                                                    onClick: () => removeSet(exIdx, setIdx),
                                                    className: 'ml-auto px-2 py-1 rounded-lg text-sm transition-opacity active:opacity-60',
                                                    style: { background: 'var(--surface-container-low)', color: 'var(--on-surface-variant)' }
                                                }, '\u2715')
                                            )
                                        )
                                    ),
                                    e('button', {
                                        onClick: () => addSet(exIdx),
                                        className: 'mt-3 px-3 py-1 rounded-lg text-sm transition-opacity active:opacity-80',
                                        style: { background: 'var(--surface-container-low)', color: 'var(--primary-fixed-dim)' }
                                    }, '+ Add Set')
                                )
                            ),
                            e('button', {
                                onClick: addExercise,
                                className: 'w-[47%] py-3 rounded-xl flex items-center justify-center gap-2 transition-opacity active:opacity-80',
                                style: { background: 'var(--surface-container-highest)', color: 'var(--primary-fixed-dim)' }
                            }, e(Plus, { size: 20 }), 'Add Exercise')
                        )
                    ),
                    e(BottomNavBar, { activeTab: 'calendar', onTabChange: handleTabChange })
                );
            }

            // ======================
            // WORKOUT IDLE VIEW (no active workout)
            // ======================
            if (view === 'workout-idle') {
                const todayName = DAYS[new Date().getDay() === 0 ? 6 : new Date().getDay() - 1];
                const todayWorkout = workouts[todayName];

                return e('div', {
                    className: 'min-h-screen flex flex-col',
                    style: { background: 'var(--void)', color: 'var(--on-surface)' }
                },
                    e(TopAppBar, { title: 'WORKOUT' }),
                    e('div', { className: 'flex-1 pt-20 pb-28 px-6 flex flex-col items-center justify-center' },
                        e(MIcon, { icon: 'fitness_center', style: { fontSize: '64px', color: 'var(--surface-container-highest)' } }),
                        e('h2', { className: 'text-2xl font-black mt-6 text-center' }, 'No Active Workout'),
                        e('p', { className: 'text-base mt-2 text-center', style: { color: 'var(--on-surface-variant)' } },
                            todayWorkout
                                ? `Today\u2019s workout is ready to go`
                                : `No workout scheduled for ${todayName}`
                        ),
                        todayWorkout ? e('div', { className: 'mt-8 flex flex-col items-center gap-3' },
                            e('button', {
                                onClick: () => startWorkout(todayName),
                                className: 'px-8 py-4 rounded-xl text-lg font-black transition-all active:scale-95',
                                style: { background: 'linear-gradient(45deg, #d1fc00, #c4ec00)', color: 'var(--on-primary-container)', boxShadow: '0 0 30px rgba(209, 252, 0, 0.2)' }
                            }, `Start ${todayName}\u2019s Workout`),
                            e('p', { className: 'text-base font-bold', style: { color: 'var(--primary-fixed-dim)' } }, todayWorkout.name)
                        ) : e('button', {
                            onClick: () => { setActiveTab('calendar'); setView('landing'); },
                            className: 'mt-8 px-6 py-3 rounded-xl text-sm font-bold transition-all active:scale-95',
                            style: { background: 'var(--surface-container-highest)', color: 'var(--primary-fixed-dim)' }
                        }, 'Go to Calendar')
                    ),
                    e(BottomNavBar, { activeTab: 'workout', onTabChange: handleTabChange })
                );
            }

            // ======================
            // STATS VIEW
            // ======================
            if (view === 'stats') {
                // Compute stats from history
                const totalWorkouts = workoutHistory.length;
                const totalWeightKg = workoutHistory.reduce((sum, w) => {
                    return sum + w.exercises.reduce((eSum, ex) => {
                        return eSum + ex.sets.reduce((sSum, s) => sSum + s.reps * s.weight, 0);
                    }, 0);
                }, 0);
                const totalWeightTonnes = (totalWeightKg / 1000).toFixed(1);
                const totalSets = workoutHistory.reduce((sum, w) => {
                    return sum + w.exercises.reduce((eSum, ex) => eSum + ex.sets.length, 0);
                }, 0);
                const totalReps = workoutHistory.reduce((sum, w) => {
                    return sum + w.exercises.reduce((eSum, ex) => eSum + ex.sets.reduce((sSum, s) => sSum + s.reps, 0), 0);
                }, 0);
                // Avg workout time (filter outliers: <40min or >90min)
                const validTimes = workoutHistory.map(w => w.totalTime).filter(t => t >= 2400 && t <= 5400);
                const avgTime = validTimes.length > 0 ? Math.round(validTimes.reduce((a, b) => a + b, 0) / validTimes.length) : 0;
                // Best single set weight
                let bestWeight = 0;
                let bestExName = '';
                workoutHistory.forEach(w => {
                    w.exercises.forEach(ex => {
                        ex.sets.forEach(s => {
                            if (s.weight > bestWeight) { bestWeight = s.weight; bestExName = ex.name; }
                        });
                    });
                });
                // Unique exercises
                const uniqueExercises = new Set();
                workoutHistory.forEach(w => w.exercises.forEach(ex => uniqueExercises.add(ex.name)));
                // Weekly frequency (last 4 weeks)
                const fourWeeksAgo = Date.now() - 28 * 24 * 60 * 60 * 1000;
                const recentWorkouts = workoutHistory.filter(w => w.date >= fourWeeksAgo);
                const weeklyAvg = recentWorkouts.length > 0 ? (recentWorkouts.length / 4).toFixed(1) : '0';

                // Per-exercise stats (all exercises that appear in history)
                const exerciseNames = [...uniqueExercises];

                const statCard = (icon, value, label) => e('div', {
                    className: 'rounded-xl p-4 flex flex-col items-center',
                    style: { background: 'var(--surface-container-highest)' }
                },
                    e(MIcon, { icon, style: { fontSize: '22px', color: 'var(--primary-fixed-dim)', marginBottom: '6px' } }),
                    e('div', { className: 'text-xl font-black', style: { color: 'var(--on-surface)' } }, value),
                    e('div', { className: 'text-xs uppercase tracking-widest mt-1 text-center', style: { color: 'var(--on-surface-variant)' } }, label)
                );

                return e('div', {
                    className: 'min-h-screen flex flex-col',
                    style: { background: 'var(--void)', color: 'var(--on-surface)' }
                },
                    e(TopAppBar, { title: 'STATS' }),
                    e('div', { className: 'flex-1 pt-20 pb-28 px-4 overflow-y-auto' },
                        totalWorkouts === 0 ?
                            e('div', { className: 'flex flex-col items-center justify-center h-full pt-32' },
                                e(MIcon, { icon: 'bar_chart', style: { fontSize: '64px', color: 'var(--surface-container-highest)' } }),
                                e('h2', { className: 'text-2xl font-black mt-6 text-center' }, 'No Stats Yet'),
                                e('p', { className: 'text-base mt-2 text-center', style: { color: 'var(--on-surface-variant)' } }, 'Complete a workout to see your stats')
                            )
                        :
                        e('div', { className: 'max-w-lg mx-auto' },
                            // Overview section
                            e('div', { className: 'text-xs uppercase tracking-widest mb-3 px-1', style: { color: 'var(--on-surface-variant)' } }, 'Overview'),
                            e('div', { className: 'grid grid-cols-3 gap-2 mb-4' },
                                statCard('fitness_center', totalWorkouts, 'Workouts'),
                                statCard('local_fire_department', totalWeightTonnes + 't', 'Lifted'),
                                statCard('timer', avgTime > 0 ? formatTime(avgTime) : '--', 'Avg Time')
                            ),
                            e('div', { className: 'grid grid-cols-3 gap-2 mb-6' },
                                statCard('repeat', totalSets, 'Total Sets'),
                                statCard('speed', totalReps, 'Total Reps'),
                                statCard('calendar_month', weeklyAvg + '/wk', 'Frequency')
                            ),
                            // Personal best
                            bestWeight > 0 ? e('div', {
                                className: 'rounded-xl p-4 mb-6 flex items-center gap-4',
                                style: { background: 'var(--surface-container-highest)' }
                            },
                                e('div', {
                                    className: 'w-12 h-12 rounded-xl flex items-center justify-center flex-shrink-0',
                                    style: { background: 'rgba(209, 252, 0, 0.1)' }
                                }, e(MIcon, { icon: 'emoji_events', fill: true, style: { fontSize: '28px', color: 'var(--primary-container)' } })),
                                e('div', null,
                                    e('div', { className: 'text-xs uppercase tracking-widest', style: { color: 'var(--on-surface-variant)' } }, 'Personal Best'),
                                    e('div', { className: 'font-black text-lg' }, `${bestWeight} kg`),
                                    e('div', { className: 'text-sm', style: { color: 'var(--on-surface-variant)' } }, bestExName)
                                )
                            ) : null,
                            // Exercise progression
                            exerciseNames.length > 0 ? e('div', null,
                                e('div', { className: 'text-xs uppercase tracking-widest mb-3 px-1', style: { color: 'var(--on-surface-variant)' } }, 'Exercise Progression'),
                                e('div', { className: 'space-y-2' },
                                    exerciseNames.map(name => {
                                        const hist = getExerciseHistory(name);
                                        const lastMax = hist.length > 0 ? hist[hist.length - 1].maxWeight : 0;
                                        return e('div', {
                                            key: name,
                                            className: 'rounded-xl p-4 flex items-center gap-3',
                                            style: { background: 'var(--surface-container-high)' }
                                        },
                                            e('div', { className: 'flex-1 min-w-0' },
                                                e('div', { className: 'font-bold text-base truncate' }, name),
                                                e('div', { className: 'text-sm', style: { color: 'var(--on-surface-variant)' } },
                                                    lastMax > 0 ? `Last: ${lastMax} kg` : 'No data'
                                                )
                                            ),
                                            e(Sparkline, { data: hist, width: 110, height: 36 })
                                        );
                                    })
                                )
                            ) : null
                        )
                    ),
                    e(BottomNavBar, { activeTab: 'stats', onTabChange: handleTabChange })
                );
            }

            // ======================
            // LIVE WORKOUT VIEW
            // ======================
            if (view === 'live') {
                const currentExercise = liveWorkout.exercises[currentExerciseIndex];
                const currentSet = currentExercise.sets[currentSetIndex];
                const nextExName = getNextExerciseName();

                return e('div', {
                    className: 'min-h-screen flex flex-col',
                    style: { background: 'var(--void)', color: 'var(--on-surface)' }
                },
                    // TopAppBar: CWA left, workout name center, sets left right
                    e(TopAppBar, {
                        title: liveWorkout.name.toUpperCase(),
                        leftAction: e('span', {
                            className: 'font-black italic text-xl tracking-tighter',
                            style: { color: 'var(--primary-container)' }
                        }, 'CWA'),
                        rightAction: e('div', { className: 'flex items-center gap-2' },
                            e('span', { className: 'text-xs uppercase tracking-widest', style: { color: 'var(--on-surface-variant)' } }, 'Sets'),
                            e('span', { className: 'text-lg font-black', style: { color: 'var(--on-surface)' } }, getTotalSetsRemaining())
                        )
                    }),
                    // Main content
                    e('div', { className: 'flex-1 flex flex-col pt-20 px-4 pb-28' },
                        // Exercise name row with progress dots
                        e('div', { className: 'flex items-center justify-between px-2 mb-1' },
                            e('div', { className: 'flex-1' },
                                e('div', { className: 'text-2xl font-black leading-tight' }, currentExercise.name),
                                e('div', { className: 'text-sm mt-0.5', style: { color: 'var(--on-surface-variant)' } }, `Set ${currentSetIndex + 1} of ${currentExercise.sets.length}`)
                            ),
                            // Progress dots
                            e('div', { className: 'flex gap-1.5 flex-wrap justify-end ml-3', style: { maxWidth: '45%' } },
                                liveWorkout.exercises.map((ex, i) =>
                                    e('div', { key: i, className: 'flex gap-1' },
                                        ex.sets.map((_, j) => {
                                            let bg;
                                            if (i < currentExerciseIndex || (i === currentExerciseIndex && j < currentSetIndex)) bg = 'var(--primary-container)';
                                            else if (i === currentExerciseIndex && j === currentSetIndex) bg = 'var(--secondary)';
                                            else bg = 'var(--surface-container-highest)';
                                            return e('div', { key: j, style: { width: 7, height: 7, borderRadius: '50%', background: bg } });
                                        })
                                    )
                                )
                            )
                        ),
                        // Timers row: day + total time | set time
                        e('div', { className: 'flex items-center justify-between px-2 mb-4 mt-2' },
                            e('div', { className: 'flex items-center gap-3' },
                                e('span', { className: 'text-xs uppercase tracking-widest font-bold', style: { color: 'var(--on-surface-variant)' } }, liveWorkout.day),
                                e('span', { className: 'text-sm font-bold', style: { color: 'var(--primary-fixed-dim)' } }, formatTime(totalElapsedTime))
                            ),
                            e('div', { className: 'flex items-center gap-2' },
                                e('span', { className: 'text-xs uppercase tracking-widest', style: { color: 'var(--on-surface-variant)' } }, 'Set'),
                                e('span', { className: 'text-sm font-bold', style: { color: 'var(--primary-fixed-dim)' } }, formatTime(currentSetTime))
                            )
                        ),
                        // Arrow + Number inputs + Arrow
                        e('div', { className: 'flex items-center justify-center gap-3 mt-2' },
                            // Back arrow
                            e('button', {
                                onClick: prevSet,
                                disabled: !canGoPrev(),
                                className: 'p-3 rounded-2xl transition-all active:scale-90 flex-shrink-0',
                                style: {
                                    background: canGoPrev() ? 'var(--surface-container-highest)' : 'var(--surface-container-low)',
                                    color: canGoPrev() ? 'var(--on-surface)' : 'var(--outline-variant)',
                                    opacity: canGoPrev() ? 1 : 0.3
                                }
                            }, e(ArrowLeft, { size: 28 })),
                            // Reps input
                            e(CustomNumberInput, { value: currentSet.reps, onChange: (val) => updateLiveSet('reps', val), label: 'Reps', step: 1 }),
                            // Weight input
                            e(CustomNumberInput, { value: currentSet.weight, onChange: (val) => updateLiveSet('weight', val), label: 'Weight (kg)', step: 0.5 }),
                            // Forward arrow
                            e('button', {
                                onClick: nextSet,
                                className: 'p-3 rounded-2xl transition-all active:scale-90 flex-shrink-0',
                                style: { background: 'linear-gradient(45deg, #d1fc00, #c4ec00)', color: 'var(--void)' }
                            }, e(ArrowRight, { size: 28 }))
                        ),
                        // Notes bar - centered under the two counters with background
                        currentExercise.notes ? e('div', { className: 'flex justify-center mt-3' },
                            e('div', {
                                className: 'px-5 py-2.5 rounded-xl text-sm leading-snug text-center',
                                style: {
                                    background: 'var(--surface-container-high)',
                                    color: 'var(--on-surface-variant)',
                                    width: '25.5rem',
                                    maxWidth: '100%',
                                    display: '-webkit-box',
                                    WebkitLineClamp: '2',
                                    WebkitBoxOrient: 'vertical',
                                    overflow: 'hidden'
                                }
                            }, currentExercise.notes)
                        ) : null,
                        // Next exercise indicator (bottom right)
                        e('div', { className: 'mt-auto pt-3 flex justify-end px-2' },
                            nextExName ? e('div', {
                                className: 'flex items-center gap-2 px-3 py-1.5 rounded-xl',
                                style: { background: 'var(--surface-container-highest)' }
                            },
                                e('span', { className: 'text-xs uppercase tracking-widest', style: { color: 'var(--on-surface-variant)' } }, 'Next:'),
                                e('span', {
                                    className: 'text-sm font-bold',
                                    style: { color: nextExName === 'Finish' ? 'var(--primary-container)' : 'var(--on-surface)' }
                                }, nextExName)
                            ) : null
                        )
                    ),
                    e(BottomNavBar, { activeTab: 'workout', onTabChange: handleTabChange })
                );
            }

            // ======================
            // COMPLETE VIEW
            // ======================
            if (view === 'complete') {
                const { summary: workoutSummary, totalScore, maxScore } = calculateWorkoutSummary();
                const scoreLevel = maxScore > 0 ? Math.round((totalScore / maxScore) * 5) : 0;
                const clampedScore = Math.max(0, Math.min(5, scoreLevel));

                // Battery cell colors - progressive fill
                const cellColors = [
                    '#45484c', // 1 - dim
                    '#737679', // 2 - outline
                    '#a9abaf', // 3 - on-surface-variant
                    '#c4ec00', // 4 - primary-fixed-dim
                    '#d1fc00', // 5 - primary-container
                ];

                return e('div', {
                    className: 'min-h-screen flex flex-col',
                    style: { background: 'var(--void)', color: 'var(--on-surface)' }
                },
                    e(TopAppBar, {
                        title: 'WORKOUT COMPLETE',
                        rightAction: e('button', {
                            onClick: finishWorkout,
                            className: 'px-4 py-2 rounded-xl text-sm font-bold transition-opacity active:opacity-80',
                            style: { background: 'linear-gradient(45deg, #d1fc00, #c4ec00)', color: 'var(--on-primary-container)' }
                        }, 'Home')
                    }),
                    e('div', { className: 'flex-1 flex flex-col items-center pt-20 px-5 pb-28 overflow-y-auto' },
                        // Hero card
                        e('div', {
                            className: 'w-full max-w-lg rounded-2xl p-6 mt-4',
                            style: { background: 'var(--surface-container-highest)' }
                        },
                            // Trophy + title row
                            e('div', { className: 'flex items-center gap-4 mb-5' },
                                e('div', {
                                    className: 'w-16 h-16 rounded-2xl flex items-center justify-center flex-shrink-0',
                                    style: { background: 'rgba(209, 252, 0, 0.1)' }
                                },
                                    e(MIcon, { icon: 'emoji_events', fill: true, style: { fontSize: '36px', color: 'var(--primary-container)' } })
                                ),
                                e('div', null,
                                    e('div', { className: 'text-2xl font-black leading-tight' }, 'Great Work!'),
                                    e('div', { className: 'text-sm mt-0.5', style: { color: 'var(--on-surface-variant)' } },
                                        liveWorkout ? `${liveWorkout.name} \u2022 ${liveWorkout.day}` : 'Workout finished'
                                    )
                                )
                            ),
                            // Stats row
                            e('div', { className: 'flex gap-3 mb-5' },
                                // Time box
                                e('div', {
                                    className: 'flex-1 rounded-xl p-3 flex flex-col items-center',
                                    style: { background: 'var(--surface-container-low)' }
                                },
                                    e(MIcon, { icon: 'timer', style: { fontSize: '20px', color: 'var(--primary-fixed-dim)', marginBottom: '4px' } }),
                                    e('div', { className: 'text-xl font-black', style: { color: 'var(--primary-fixed-dim)' } }, formatTime(totalElapsedTime)),
                                    e('div', { className: 'text-xs uppercase tracking-widest mt-0.5', style: { color: 'var(--on-surface-variant)' } }, 'Duration')
                                ),
                                // Sets box
                                e('div', {
                                    className: 'flex-1 rounded-xl p-3 flex flex-col items-center',
                                    style: { background: 'var(--surface-container-low)' }
                                },
                                    e(MIcon, { icon: 'repeat', style: { fontSize: '20px', color: 'var(--primary-fixed-dim)', marginBottom: '4px' } }),
                                    e('div', { className: 'text-xl font-black', style: { color: 'var(--primary-fixed-dim)' } }, completedSets.length),
                                    e('div', { className: 'text-xs uppercase tracking-widest mt-0.5', style: { color: 'var(--on-surface-variant)' } }, 'Sets Done')
                                ),
                                // Score box
                                e('div', {
                                    className: 'flex-1 rounded-xl p-3 flex flex-col items-center',
                                    style: { background: 'var(--surface-container-low)' }
                                },
                                    e(MIcon, { icon: 'trending_up', style: { fontSize: '20px', color: 'var(--primary-fixed-dim)', marginBottom: '4px' } }),
                                    e('div', { className: 'text-xl font-black', style: { color: 'var(--primary-fixed-dim)' } }, `${totalScore}/${maxScore}`),
                                    e('div', { className: 'text-xs uppercase tracking-widest mt-0.5', style: { color: 'var(--on-surface-variant)' } }, 'Points')
                                )
                            ),
                            // Battery score bar
                            e('div', null,
                                e('div', { className: 'text-xs uppercase tracking-widest mb-2', style: { color: 'var(--on-surface-variant)' } }, 'Workout Score'),
                                e('div', { className: 'flex gap-1.5' },
                                    [0, 1, 2, 3, 4].map(i =>
                                        e('div', {
                                            key: i,
                                            className: 'flex-1 h-10 rounded-lg transition-all duration-500',
                                            style: {
                                                background: i < clampedScore ? cellColors[i] : 'var(--surface-container-low)',
                                                boxShadow: i < clampedScore && i >= 3 ? `0 0 12px ${cellColors[i]}40` : 'none'
                                            }
                                        })
                                    )
                                ),
                                e('div', { className: 'flex justify-between mt-1.5' },
                                    e('span', { className: 'text-xs', style: { color: 'var(--outline)' } }, 'Maintain'),
                                    e('span', { className: 'text-xs font-bold', style: { color: clampedScore >= 4 ? 'var(--primary-container)' : 'var(--outline)' } }, 'Progress')
                                )
                            )
                        ),
                        // Exercise Summary
                        e('div', { className: 'w-full max-w-lg mt-6' },
                            e('div', { className: 'text-xs uppercase tracking-widest mb-3 px-1', style: { color: 'var(--on-surface-variant)' } }, 'Exercise Breakdown'),
                            e('div', { className: 'space-y-2' },
                                workoutSummary.map((item, idx) => {
                                    const hist = getExerciseHistory(item.name);
                                    return e('div', {
                                        key: idx,
                                        className: 'p-4 rounded-xl',
                                        style: { background: 'var(--surface-container-high)' }
                                    },
                                        // Top row: points + name + change
                                        e('div', { className: 'flex items-center gap-3' },
                                            e('div', {
                                                className: 'w-10 h-10 rounded-xl flex items-center justify-center flex-shrink-0 text-sm font-black',
                                                style: {
                                                    background: item.points === 2 ? 'var(--primary-container)' : item.points === 1 ? 'var(--primary-fixed-dim)' : 'var(--surface-container-lowest)',
                                                    color: item.points >= 1 ? 'var(--void)' : 'var(--on-surface-variant)'
                                                }
                                            }, `+${item.points}`),
                                            e('div', { className: 'flex-1 min-w-0' },
                                                e('div', { className: 'font-bold text-base truncate' }, item.name),
                                                e('div', {
                                                    className: 'text-sm truncate',
                                                    style: { color: item.hasChanges ? 'var(--primary-fixed-dim)' : 'var(--on-surface-variant)' }
                                                }, item.change)
                                            )
                                        ),
                                        // Sparkline row (if history exists)
                                        hist.length >= 2 ? e('div', {
                                            className: 'mt-3 rounded-lg px-3 py-2 flex items-center justify-between',
                                            style: { background: 'var(--surface-container-lowest)' }
                                        },
                                            e('div', { className: 'text-xs', style: { color: 'var(--on-surface-variant)' } },
                                                `${hist.length} sessions \u2022 ${hist[hist.length - 1].maxWeight}kg`
                                            ),
                                            e(Sparkline, { data: hist, width: 100, height: 28 })
                                        ) : null
                                    );
                                })
                            )
                        )
                    ),
                    e(BottomNavBar, { activeTab: 'workout', onTabChange: handleTabChange })
                );
            }

            // ======================
            // LANDING / CALENDAR VIEW
            // ======================
            const today = DAYS[new Date().getDay() === 0 ? 6 : new Date().getDay() - 1];
            const currentDate = new Date();

            const getDateForDay = (dayName) => {
                const todayIndex = DAYS.indexOf(today);
                const targetIndex = DAYS.indexOf(dayName);
                const dayDiff = targetIndex - todayIndex;
                const targetDate = new Date(currentDate);
                targetDate.setDate(currentDate.getDate() + dayDiff);
                const day = targetDate.getDate().toString().padStart(2, '0');
                const month = (targetDate.getMonth() + 1).toString().padStart(2, '0');
                return `${day}/${month}`;
            };

            // Get week number
            const getWeekNumber = (d) => {
                const date = new Date(d);
                date.setHours(0, 0, 0, 0);
                date.setDate(date.getDate() + 3 - (date.getDay() + 6) % 7);
                const week1 = new Date(date.getFullYear(), 0, 4);
                return 1 + Math.round(((date - week1) / 86400000 - 3 + (week1.getDay() + 6) % 7) / 7);
            };

            const monthNames = ['January', 'February', 'March', 'April', 'May', 'June', 'July', 'August', 'September', 'October', 'November', 'December'];

            return e('div', {
                className: 'min-h-screen flex flex-col',
                style: { background: 'var(--void)', color: 'var(--on-surface)' }
            },
                profileModal,
                e(TopAppBar, {
                    title: 'CALENDAR VIEW',
                    rightAction: e('button', {
                        onClick: () => setShowProfile(true),
                        className: 'w-9 h-9 rounded-xl flex items-center justify-center transition-all active:scale-90',
                        style: { background: 'rgba(209, 252, 0, 0.1)' }
                    }, e(MIcon, { icon: 'person', fill: true, style: { fontSize: '20px', color: 'var(--primary-container)' } }))
                }),
                e('main', { className: 'flex-1 pt-20 px-4 pb-28' },
                    // Date header
                    e('div', { className: 'mb-6' },
                        e('p', {
                            className: 'text-xs uppercase tracking-widest',
                            style: { color: 'var(--on-surface-variant)' }
                        }, `${monthNames[currentDate.getMonth()]} ${currentDate.getFullYear()}`),
                        e('h2', { className: 'text-4xl font-black leading-none mt-1' }, `WEEK ${getWeekNumber(currentDate)}`)
                    ),
                    // Weekly grid
                    e('div', { className: 'grid grid-cols-2 gap-4 max-w-6xl mx-auto' },
                        DAYS.map((day) => {
                            const workout = workouts[day];
                            const isToday = day === today;
                            const hasProgress = workout?.progress;

                            // TODAY card - highlighted with primary-container
                            if (isToday && workout) {
                                return e('div', {
                                    key: day,
                                    className: 'rounded-xl p-5 flex flex-col justify-between min-h-[160px] relative overflow-hidden',
                                    style: {
                                        background: 'var(--primary-container)',
                                        boxShadow: '0 0 30px rgba(209, 252, 0, 0.15)'
                                    }
                                },
                                    e('div', {
                                        className: 'absolute top-2 right-2 px-2 py-0.5 rounded text-xs font-bold',
                                        style: { background: 'rgba(76, 93, 0, 0.2)', color: 'var(--on-primary-container)' }
                                    }, getDateForDay(day)),
                                    e('div', null,
                                        e('span', {
                                            className: 'text-xs uppercase tracking-widest font-bold',
                                            style: { color: 'var(--on-primary-container)' }
                                        }, `${day} \u2022 Today`),
                                        e('h3', {
                                            className: 'font-black text-xl mt-1 leading-tight',
                                            style: { color: 'var(--on-primary-container)' }
                                        }, workout.name)
                                    ),
                                    e('div', { className: 'flex items-center gap-2 justify-end mt-4' },
                                        e('button', {
                                            key: 'start',
                                            onClick: () => startWorkout(day),
                                            className: 'px-4 py-2 rounded-xl text-sm font-bold transition-all active:scale-95',
                                            style: { background: 'var(--on-primary-container)', color: 'var(--primary-container)' }
                                        }, hasProgress ? 'Continue' : 'Start'),
                                        e('button', {
                                            key: 'settings',
                                            onClick: () => { setEditingDay(day); setEditingWorkout(workout); setView('edit'); },
                                            className: 'p-2 rounded-xl transition-all active:scale-95',
                                            style: { background: 'rgba(76, 93, 0, 0.15)', color: 'var(--on-primary-container)' }
                                        }, e(Settings, { size: 18 }))
                                    )
                                );
                            }

                            // Today but no workout (rest day)
                            if (isToday && !workout) {
                                return e('div', {
                                    key: day,
                                    className: 'rounded-xl p-5 flex flex-col justify-between min-h-[160px] relative',
                                    style: {
                                        background: 'var(--primary-container)',
                                        boxShadow: '0 0 30px rgba(209, 252, 0, 0.15)'
                                    }
                                },
                                    e('div', {
                                        className: 'absolute top-2 right-2 px-2 py-0.5 rounded text-xs font-bold',
                                        style: { background: 'rgba(76, 93, 0, 0.2)', color: 'var(--on-primary-container)' }
                                    }, getDateForDay(day)),
                                    e('div', null,
                                        e('span', { className: 'text-xs uppercase tracking-widest font-bold', style: { color: 'var(--on-primary-container)' } }, `${day} \u2022 Today`),
                                        e('h3', { className: 'font-medium text-lg mt-1 italic', style: { color: 'var(--on-primary-container)', opacity: 0.7 } }, 'Rest Day')
                                    ),
                                    e('div', { className: 'flex justify-end mt-4' },
                                        e('button', {
                                            onClick: () => { setEditingDay(day); startNewWorkout(); },
                                            className: 'flex items-center gap-2 px-4 py-2 rounded-xl text-sm font-bold transition-all active:scale-95',
                                            style: { background: 'var(--on-primary-container)', color: 'var(--primary-container)' }
                                        }, e(Plus, { size: 18 }), 'Add')
                                    )
                                );
                            }

                            // Regular day with workout
                            if (workout) {
                                return e('div', {
                                    key: day,
                                    className: 'rounded-xl p-5 flex flex-col justify-between min-h-[160px] relative',
                                    style: { background: 'var(--surface-container-highest)' }
                                },
                                    e('div', {
                                        className: 'absolute top-2 right-2 px-2 py-0.5 rounded text-xs font-bold',
                                        style: { background: 'rgba(248, 249, 254, 0.06)', color: 'var(--on-surface-variant)' }
                                    }, getDateForDay(day)),
                                    e('div', null,
                                        e('span', { className: 'text-xs uppercase tracking-widest', style: { color: 'var(--on-surface-variant)' } }, day),
                                        e('h3', { className: 'font-bold text-xl mt-1', style: { color: 'var(--on-surface)' } }, workout.name)
                                    ),
                                    e('div', { className: 'flex items-center gap-2 justify-end mt-4' },
                                        e('button', {
                                            key: 'start',
                                            onClick: () => startWorkout(day),
                                            className: 'px-4 py-2 rounded-xl text-sm font-bold transition-all active:scale-95',
                                            style: { background: 'var(--surface-container-low)', color: 'var(--primary-fixed-dim)' }
                                        }, hasProgress ? 'Continue' : 'Start'),
                                        e('button', {
                                            key: 'settings',
                                            onClick: () => { setEditingDay(day); setEditingWorkout(workout); setView('edit'); },
                                            className: 'p-2 rounded-xl transition-all active:scale-95',
                                            style: { background: 'rgba(69, 72, 76, 0.15)', color: 'var(--on-surface)' }
                                        }, e(Settings, { size: 18 }))
                                    )
                                );
                            }

                            // Rest day (no workout)
                            return e('div', {
                                key: day,
                                className: 'rounded-xl p-5 flex flex-col justify-between min-h-[160px] relative',
                                style: { background: 'var(--surface-container-low)', border: '1px dashed rgba(69, 72, 76, 0.2)' }
                            },
                                e('div', {
                                    className: 'absolute top-2 right-2 px-2 py-0.5 rounded text-xs font-bold',
                                    style: { background: 'rgba(248, 249, 254, 0.03)', color: 'var(--on-surface-variant)' }
                                }, getDateForDay(day)),
                                e('div', null,
                                    e('span', { className: 'text-xs uppercase tracking-widest', style: { color: 'var(--on-surface-variant)' } }, day),
                                    e('h3', { className: 'font-medium text-lg mt-1 italic', style: { color: 'var(--on-surface-variant)', opacity: 0.6 } }, 'Rest Day')
                                ),
                                e('div', { className: 'flex justify-end mt-4' },
                                    e('button', {
                                        onClick: () => { setEditingDay(day); startNewWorkout(); },
                                        className: 'flex items-center gap-2 px-4 py-2 rounded-xl text-sm transition-all active:scale-95',
                                        style: { background: 'var(--surface-container-highest)', color: 'var(--primary-fixed-dim)' }
                                    }, e(Plus, { size: 18 }), 'Add')
                                )
                            );
                        })
                    )
                ),
                e(BottomNavBar, { activeTab, onTabChange: handleTabChange })
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(e(WorkoutApp));
    </script>
</body>
</html>
