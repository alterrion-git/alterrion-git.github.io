<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="CWA">
    <meta name="theme-color" content="#0b0e11">
    <meta name="screen-orientation" content="portrait">
    <link rel="manifest" href="manifest.json">
    <title>CWA - Workout Tracker</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        
        html {
            height: 100%;
            height: 100dvh;
            overflow: hidden;
            position: fixed;
            width: 100%;
        }

        :root {
            --void: #0b0e11;
            --surface: #0b0e11;
            --surface-container-lowest: #000000;
            --surface-container-low: #101417;
            --surface-container: #161a1e;
            --surface-container-high: #1c2024;
            --surface-container-highest: #22262b;
            --surface-bright: #282d31;
            --surface-variant: #22262b;
            --primary: #f4ffc6;
            --primary-container: #d1fc00;
            --primary-dim: #c7ef00;
            --primary-fixed: #d1fc00;
            --primary-fixed-dim: #c4ec00;
            --on-primary: #546600;
            --on-primary-container: #4c5d00;
            --on-surface: #f8f9fe;
            --on-surface-variant: #a9abaf;
            --on-background: #f8f9fe;
            --outline: #737679;
            --outline-variant: #45484c;
            --secondary: #efe754;
            --secondary-container: #656100;
            --on-secondary-container: #fffac3;
            --tertiary: #ffeb9c;
            --error: #ff7351;
            --error-container: #b92902;
            --on-error-container: #ffd2c8;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--void);
            color: var(--on-surface);
            overflow-x: hidden;
            overflow-y: auto;
            position: fixed;
            width: 100%;
            height: 100vh;
            height: 100dvh;
            font-size: 22px;
            padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
            touch-action: manipulation;
        }
        
        #root {
            height: 100%;
            overflow-y: auto;
        }
        
        input[type="number"]::-webkit-outer-spin-button,
        input[type="number"]::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
        input[type="number"] {
            -moz-appearance: textfield;
            appearance: textfield;
        }

        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }

        /* Scroll wheel modal */
        .scroll-wheel-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.85);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10000;
        }
        
        .scroll-wheel-container {
            background: var(--surface-container-high);
            border-radius: 20px;
            padding: 20px;
            width: 300px;
            text-align: center;
        }
        
        .scroll-wheel {
            height: 200px;
            overflow-y: scroll;
            scroll-snap-type: y mandatory;
            -webkit-overflow-scrolling: touch;
        }
        
        .scroll-wheel-item {
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            scroll-snap-align: center;
            cursor: pointer;
            color: var(--on-surface-variant);
        }
        
        .scroll-wheel-item.active {
            font-size: 32px;
            font-weight: bold;
            color: var(--primary-container);
        }

        /* Kinetic gradient for primary CTAs */
        .kinetic-gradient {
            background: linear-gradient(45deg, #d1fc00, #c4ec00);
        }

        /* Ghost border utility */
        .ghost-border {
            border: 1px solid rgba(69, 72, 76, 0.15);
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        "void": "#0b0e11",
                        "surface": "#0b0e11",
                        "surface-container-lowest": "#000000",
                        "surface-container-low": "#101417",
                        "surface-container": "#161a1e",
                        "surface-container-high": "#1c2024",
                        "surface-container-highest": "#22262b",
                        "surface-bright": "#282d31",
                        "surface-variant": "#22262b",
                        "primary": "#f4ffc6",
                        "primary-container": "#d1fc00",
                        "primary-dim": "#c7ef00",
                        "primary-fixed": "#d1fc00",
                        "primary-fixed-dim": "#c4ec00",
                        "on-primary": "#546600",
                        "on-primary-container": "#4c5d00",
                        "on-surface": "#f8f9fe",
                        "on-surface-variant": "#a9abaf",
                        "on-background": "#f8f9fe",
                        "outline": "#737679",
                        "outline-variant": "#45484c",
                        "secondary": "#efe754",
                        "secondary-container": "#656100",
                        "on-secondary-container": "#fffac3",
                        "tertiary": "#ffeb9c",
                        "error": "#ff7351",
                        "error-container": "#b92902",
                        "on-error-container": "#ffd2c8",
                    },
                    fontFamily: {
                        "inter": ["Inter", "sans-serif"],
                    },
                },
            },
        }
    </script>
</head>
<body>
    <div id="root"></div>
    <script>
        // Register service worker for PWA
        const APP_VERSION = '3.4.0';
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register(`sw.js?v=${APP_VERSION}`).catch(() => {
                    console.log('Service worker registration failed');
                });
            });
        }
        
        window.addEventListener('load', () => {
            setTimeout(() => { window.scrollTo(0, 1); }, 100);
        });

        // NOTE: We deliberately do NOT reload the page on resize/orientation/fold changes.
        // Reloading was destructive — it dropped the user out of an in-progress workout and
        // felt like "the app closed". The React layout is now fully reactive to viewport
        // changes (see useViewport), so switching between cover screen and main screen,
        // folding/unfolding, rotating, or keyboard show/hide all re-layout in place.
        // We just re-broadcast a resize so any throttled listeners settle after the change.
        const nudgeResize = () => { setTimeout(() => window.dispatchEvent(new Event('resize')), 120); };
        window.addEventListener('orientationchange', nudgeResize);
        if (window.screen && window.screen.orientation) {
            window.screen.orientation.addEventListener('change', nudgeResize);
        }

        // ============================================
        // FIREBASE CLOUD SYNC
        // ============================================
        // Paste your Firebase Realtime Database URL below before uploading.
        // Get it from: Firebase Console > Realtime Database > URL at the top.
        const FIREBASE_DB_URL = 'https://workout-app-423a6-default-rtdb.europe-west1.firebasedatabase.app'; // e.g. 'https://your-project-default-rtdb.europe-west1.firebasedatabase.app'

        const cloudEnabled = () => FIREBASE_DB_URL.length > 0;

        async function hashPassword(password) {
            const encoder = new TextEncoder();
            const data = encoder.encode(password + '_cwa_salt_2024');
            const hashBuffer = await crypto.subtle.digest('SHA-256', data);
            const hashArray = Array.from(new Uint8Array(hashBuffer));
            return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
        }

        async function cloudGet(path) {
            if (!cloudEnabled()) return null;
            try {
                const res = await fetch(`${FIREBASE_DB_URL}/${path}.json`);
                if (!res.ok) return null;
                return await res.json();
            } catch (err) { console.error('Cloud get error:', err); return null; }
        }

        async function cloudSet(path, data) {
            if (!cloudEnabled()) return false;
            try {
                const res = await fetch(`${FIREBASE_DB_URL}/${path}.json`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                return res.ok;
            } catch (err) { console.error('Cloud set error:', err); return false; }
        }

        // ============================================
        // PROGRESS / GOALS / PHOTOS / AI HELPERS
        // ============================================

        // --- Date helpers for weekly/monthly grouping & gating ---
        const DAY_MS = 24 * 60 * 60 * 1000;
        function startOfDay(ts) { const d = new Date(ts); d.setHours(0, 0, 0, 0); return d.getTime(); }
        function dayKey(ts) { const d = new Date(ts); return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`; }
        function isoWeekInfo(ts) {
            const d = new Date(ts); d.setHours(0, 0, 0, 0);
            d.setDate(d.getDate() + 3 - ((d.getDay() + 6) % 7)); // nearest Thursday
            const week1 = new Date(d.getFullYear(), 0, 4);
            const week = 1 + Math.round(((d - week1) / DAY_MS - 3 + ((week1.getDay() + 6) % 7)) / 7);
            return { year: d.getFullYear(), week };
        }
        function weekKey(ts) { const { year, week } = isoWeekInfo(ts); return `${year}-W${String(week).padStart(2, '0')}`; }
        function monthKey(ts) { const d = new Date(ts); return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}`; }
        function countDistinct(arr, keyFn) { return new Set(arr.map(keyFn)).size; }

        // Auto-end window: a session older than this is considered abandoned. Used to (a)
        // strip stale `progress` whenever workouts load (so finished/forgotten workouts can
        // never "come back" days later) and (b) auto-discard a live session left running.
        const AUTO_END_MS = 4 * 60 * 60 * 1000; // 4 hours
        function sanitizeWorkouts(w) {
            if (!w || typeof w !== 'object') return w;
            let changed = false;
            const out = {};
            for (const k of Object.keys(w)) {
                const day = w[k];
                if (day && day.progress) {
                    const started = day.progress.startTime || day.progress.setStartTime || 0;
                    if (!started || (Date.now() - started) > AUTO_END_MS) {
                        out[k] = { ...day, progress: null };
                        changed = true;
                        continue;
                    }
                }
                out[k] = day;
            }
            return changed ? out : w;
        }

        // --- On-device OpenAI API key (never synced to the world-readable DB) ---
        const OPENAI_KEY_LS = 'cwa-openai-key';
        function getOpenAIKey() { try { return localStorage.getItem(OPENAI_KEY_LS) || ''; } catch (err) { return ''; } }
        function setOpenAIKey(k) { try { if (k) localStorage.setItem(OPENAI_KEY_LS, k); else localStorage.removeItem(OPENAI_KEY_LS); } catch (err) {} }

        // --- IndexedDB store for progress photos (kept local; not in Firebase) ---
        const PHOTO_DB = 'cwa-photos', PHOTO_STORE = 'photos';
        function openPhotoDB() {
            return new Promise((resolve, reject) => {
                const req = indexedDB.open(PHOTO_DB, 1);
                req.onupgradeneeded = () => {
                    const db = req.result;
                    if (!db.objectStoreNames.contains(PHOTO_STORE)) {
                        const store = db.createObjectStore(PHOTO_STORE, { keyPath: 'id' });
                        store.createIndex('user', 'user', { unique: false });
                    }
                };
                req.onsuccess = () => resolve(req.result);
                req.onerror = () => reject(req.error);
            });
        }
        async function photoAdd(record) {
            const db = await openPhotoDB();
            return new Promise((resolve, reject) => {
                const tx = db.transaction(PHOTO_STORE, 'readwrite');
                tx.objectStore(PHOTO_STORE).put(record);
                tx.oncomplete = () => resolve(true);
                tx.onerror = () => reject(tx.error);
            });
        }
        async function photoList(user) {
            const db = await openPhotoDB();
            return new Promise((resolve, reject) => {
                const tx = db.transaction(PHOTO_STORE, 'readonly');
                const req = tx.objectStore(PHOTO_STORE).getAll();
                req.onsuccess = () => resolve((req.result || []).filter(r => !user || r.user === user).sort((a, b) => b.date - a.date));
                req.onerror = () => reject(req.error);
            });
        }
        async function photoDelete(id) {
            const db = await openPhotoDB();
            return new Promise((resolve, reject) => {
                const tx = db.transaction(PHOTO_STORE, 'readwrite');
                tx.objectStore(PHOTO_STORE).delete(id);
                tx.oncomplete = () => resolve(true);
                tx.onerror = () => reject(tx.error);
            });
        }
        // Downscale an uploaded image to a reasonable max dimension and JPEG-compress it,
        // so on-device storage stays small and the LLM payload is light.
        function compressImage(file, maxDim = 1024, quality = 0.8) {
            return new Promise((resolve, reject) => {
                const img = new Image();
                const url = URL.createObjectURL(file);
                img.onload = () => {
                    let { width, height } = img;
                    if (width > height && width > maxDim) { height = Math.round(height * maxDim / width); width = maxDim; }
                    else if (height > maxDim) { width = Math.round(width * maxDim / height); height = maxDim; }
                    const canvas = document.createElement('canvas');
                    canvas.width = width; canvas.height = height;
                    canvas.getContext('2d').drawImage(img, 0, 0, width, height);
                    URL.revokeObjectURL(url);
                    resolve(canvas.toDataURL('image/jpeg', quality));
                };
                img.onerror = () => { URL.revokeObjectURL(url); reject(new Error('Could not read image')); };
                img.src = url;
            });
        }

        // --- OpenAI multimodal call (chat completions) ---
        async function callOpenAI(apiKey, content, { model = 'gpt-4o', system, maxTokens = 900 } = {}) {
            const messages = [];
            if (system) messages.push({ role: 'system', content: system });
            messages.push({ role: 'user', content });
            const res = await fetch('https://api.openai.com/v1/chat/completions', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${apiKey}` },
                body: JSON.stringify({ model, messages, max_tokens: maxTokens, temperature: 0.6 })
            });
            if (!res.ok) {
                let detail = '';
                try { const j = await res.json(); detail = j.error && j.error.message ? j.error.message : ''; } catch (err) {}
                throw new Error(detail || `OpenAI request failed (${res.status})`);
            }
            const data = await res.json();
            return (data.choices && data.choices[0] && data.choices[0].message && data.choices[0].message.content) || '';
        }

        const RECAP_SYSTEM = "You are an expert strength & physique coach reviewing a client's training and body-composition data. Be specific, honest, and motivating. Reference their actual numbers and stated goal. Give 3-5 concrete, prioritized recommendations for the next period. If progress photos are included, comment briefly and tactfully on visible changes. Keep it concise (under ~300 words), use short paragraphs or bullet points, and avoid medical claims.";

        const { useState, useEffect, useRef } = React;
        const e = React.createElement;

        const DAYS = ['Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday', 'Sunday'];

        // --- Shared viewport hook (single source of truth for screen size) ---
        // Fixes the recurring aspect-ratio bugs: instead of every component sniffing
        // window dimensions independently (and disagreeing), they all read from here,
        // and everything re-renders together on any viewport change.
        function getViewport() {
            const w = window.innerWidth || document.documentElement.clientWidth || 360;
            const h = window.innerHeight || document.documentElement.clientHeight || 640;
            return {
                w, h,
                // Cover screen = short relative to width (flip phone cover, or landscape).
                isCover: h < w * 1.2,
                // Genuinely small in either dimension — used to scale controls down.
                isSmall: w < 360 || h < 520,
            };
        }
        function useViewport() {
            const [vp, setVp] = useState(getViewport);
            useEffect(() => {
                let raf = null;
                const update = () => {
                    if (raf) cancelAnimationFrame(raf);
                    raf = requestAnimationFrame(() => setVp(getViewport()));
                };
                window.addEventListener('resize', update);
                window.addEventListener('orientationchange', update);
                if (window.visualViewport) window.visualViewport.addEventListener('resize', update);
                return () => {
                    window.removeEventListener('resize', update);
                    window.removeEventListener('orientationchange', update);
                    if (window.visualViewport) window.visualViewport.removeEventListener('resize', update);
                    if (raf) cancelAnimationFrame(raf);
                };
            }, []);
            return vp;
        }

        // --- Reusable confirmation dialog (used before destructive actions) ---
        function ConfirmDialog({ title, message, confirmLabel = 'Delete', cancelLabel = 'Cancel', danger = true, onConfirm, onCancel }) {
            return e('div', {
                className: 'fixed inset-0 z-[200] flex items-center justify-center px-6',
                onClick: onCancel
            },
                e('div', { className: 'absolute inset-0', style: { background: 'rgba(0,0,0,0.7)' } }),
                e('div', {
                    className: 'relative z-10 w-full max-w-xs rounded-2xl p-5',
                    style: { background: 'var(--surface-container-highest)' },
                    onClick: (ev) => ev.stopPropagation()
                },
                    e('div', { className: 'text-lg font-black mb-1', style: { color: 'var(--on-surface)' } }, title || 'Are you sure?'),
                    message ? e('div', { className: 'text-sm mb-4', style: { color: 'var(--on-surface-variant)' } }, message) : e('div', { className: 'mb-4' }),
                    e('div', { className: 'flex gap-3' },
                        e('button', {
                            onClick: onCancel,
                            className: 'flex-1 py-3 rounded-xl font-bold text-base transition-all active:scale-95',
                            style: { background: 'var(--surface-container-low)', color: 'var(--on-surface)' }
                        }, cancelLabel),
                        e('button', {
                            onClick: onConfirm,
                            className: 'flex-1 py-3 rounded-xl font-black text-base transition-all active:scale-95',
                            style: danger
                                ? { background: 'var(--error-container)', color: 'var(--on-error-container)' }
                                : { background: 'linear-gradient(45deg, #d1fc00, #c4ec00)', color: 'var(--on-primary-container)' }
                        }, confirmLabel)
                    )
                )
            );
        }

        // --- Daily metrics entry form (own local state) ---
        // fixedDate: 'YYYY-MM-DD' to lock the date (hides the picker, used by the calendar
        // day sheet). initial: an existing metrics entry to prefill for editing.
        function MetricForm({ onSave, fixedDate, initial, compact }) {
            const init = initial || {};
            const str = (v) => (v == null ? '' : String(v));
            const [date, setDate] = useState(() => fixedDate || new Date().toISOString().slice(0, 10));
            const [weight, setWeight] = useState(str(init.weight));
            const [kcal, setKcal] = useState(str(init.kcal));
            const [sleep, setSleep] = useState(str(init.sleep));
            const [steps, setSteps] = useState(str(init.steps));
            const [note, setNote] = useState(init.note || '');
            const inputStyle = { background: 'var(--surface-container-low)', color: 'var(--on-surface)', border: 'none', caretColor: 'var(--primary-container)' };
            const num = (ph, val, set, step) => e('input', {
                type: 'number', inputMode: 'decimal', step: step || 'any', value: val,
                onChange: (ev) => set(ev.target.value), placeholder: ph,
                className: 'w-full p-2.5 rounded-lg outline-none text-base', style: inputStyle
            });
            const submit = () => {
                const ts = new Date(date + 'T12:00:00').getTime();
                const entry = {
                    date: ts,
                    weight: parseFloat(weight) || null,
                    kcal: parseFloat(kcal) || null,
                    sleep: parseFloat(sleep) || null,
                    steps: parseFloat(steps) || null,
                    note: note.trim(),
                };
                if (entry.weight == null && entry.kcal == null && entry.sleep == null && entry.steps == null && !entry.note) return;
                onSave(entry);
                if (!fixedDate) { setWeight(''); setKcal(''); setSleep(''); setSteps(''); setNote(''); }
            };
            const labeled = (label, node) => e('div', null,
                e('div', { className: 'text-xs uppercase tracking-widest mb-1', style: { color: 'var(--on-surface-variant)' } }, label), node);
            return e('div', { className: 'rounded-2xl', style: compact ? {} : { padding: '16px', background: 'var(--surface-container-highest)' } },
                fixedDate ? null : e('div', { className: 'mb-3' }, labeled('Date', e('input', {
                    type: 'date', value: date, onChange: (ev) => setDate(ev.target.value),
                    className: 'w-full p-2.5 rounded-lg outline-none text-base', style: inputStyle
                }))),
                e('div', { className: 'grid grid-cols-2 gap-3 mb-3' },
                    labeled('Weight (kg)', num('70.5', weight, setWeight)),
                    labeled('Calories', num('2500', kcal, setKcal)),
                    labeled('Sleep (h)', num('7.5', sleep, setSleep)),
                    labeled('Steps', num('8000', steps, setSteps))
                ),
                e('div', { className: 'mb-3' }, labeled('Note', e('input', {
                    type: 'text', value: note, onChange: (ev) => setNote(ev.target.value),
                    placeholder: 'Optional (energy, soreness, diet…)',
                    className: 'w-full p-2.5 rounded-lg outline-none text-base', style: inputStyle
                }))),
                e('button', {
                    onClick: submit,
                    className: 'w-full py-3 rounded-xl font-black text-base transition-all active:scale-95',
                    style: { background: 'linear-gradient(45deg, #d1fc00, #c4ec00)', color: 'var(--on-primary-container)' }
                }, 'Save Entry')
            );
        }

        // --- OpenAI API key entry (stored on-device only) ---
        function ApiKeyForm({ onChanged }) {
            const [val, setVal] = useState(getOpenAIKey());
            const [show, setShow] = useState(false);
            const [saved, setSaved] = useState(false);
            const save = () => { setOpenAIKey(val.trim()); setSaved(true); setTimeout(() => setSaved(false), 1500); if (onChanged) onChanged(); };
            const clear = () => { setVal(''); setOpenAIKey(''); if (onChanged) onChanged(); };
            return e('div', { className: 'rounded-2xl p-4', style: { background: 'var(--surface-container-highest)' } },
                e('div', { className: 'flex items-center gap-2 mb-2' },
                    e('input', {
                        type: show ? 'text' : 'password', value: val,
                        onChange: (ev) => setVal(ev.target.value), placeholder: 'sk-…', autoCapitalize: 'none', autoCorrect: 'off', spellCheck: false,
                        className: 'flex-1 min-w-0 p-2.5 rounded-lg outline-none text-base',
                        style: { background: 'var(--surface-container-low)', color: 'var(--on-surface)', border: 'none', caretColor: 'var(--primary-container)' }
                    }),
                    e('button', {
                        onClick: () => setShow(s => !s),
                        className: 'px-3 py-2.5 rounded-lg text-sm', style: { background: 'var(--surface-container-low)', color: 'var(--on-surface-variant)' }
                    }, show ? 'Hide' : 'Show')
                ),
                e('div', { className: 'flex gap-2' },
                    e('button', { onClick: save, className: 'flex-1 py-2.5 rounded-lg font-bold text-sm transition-all active:scale-95', style: { background: 'linear-gradient(45deg, #d1fc00, #c4ec00)', color: 'var(--on-primary-container)' } }, saved ? 'Saved ✓' : 'Save Key'),
                    e('button', { onClick: clear, className: 'px-4 py-2.5 rounded-lg font-bold text-sm', style: { background: 'var(--surface-container-low)', color: 'var(--error)' } }, 'Clear')
                ),
                e('div', { className: 'text-xs mt-3 leading-snug', style: { color: 'var(--outline)' } },
                    'Stored only on this device (localStorage) — never uploaded to the cloud. Used directly from your browser to call OpenAI for recaps.')
            );

        // Mini sparkline graph for exercise history
        function Sparkline({ data, width = 120, height = 32, color = '#c4ec00' }) {
            if (!data || data.length < 2) {
                return e('div', {
                    className: 'flex items-center justify-center text-xs',
                    style: { width, height, color: 'var(--outline)', opacity: 0.5 }
                }, 'No history');
            }
            const vals = data.map(d => d.maxWeight);
            const min = Math.min(...vals);
            const max = Math.max(...vals);
            const range = max - min || 1;
            const pad = 3;
            const gw = width - pad * 2;
            const gh = height - pad * 2;
            const points = vals.map((v, i) => {
                const x = pad + (i / (vals.length - 1)) * gw;
                const y = pad + gh - ((v - min) / range) * gh;
                return `${x},${y}`;
            });
            const isUp = vals[vals.length - 1] >= vals[0];
            const lineColor = isUp ? color : 'var(--error)';
            const fillPoints = `${pad},${pad + gh} ${points.join(' ')} ${pad + gw},${pad + gh}`;
            const repColor = '#00e5ff'; // bright cyan for rep increases
            return e('svg', { width, height, viewBox: `0 0 ${width} ${height}`, style: { display: 'block' } },
                e('polygon', { points: fillPoints, fill: lineColor, fillOpacity: 0.1 }),
                e('polyline', { points: points.join(' '), fill: 'none', stroke: lineColor, strokeWidth: 1.5, strokeLinecap: 'round', strokeLinejoin: 'round' }),
                vals.map((v, i) => {
                    const x = pad + (i / (vals.length - 1)) * gw;
                    const y = pad + gh - ((v - min) / range) * gh;
                    const isLast = i === vals.length - 1;
                    const repsUp = data[i] && data[i].repsUp;
                    const dotColor = repsUp ? repColor : (isLast ? lineColor : 'var(--surface-container-highest)');
                    const strokeC = repsUp ? repColor : lineColor;
                    const r = isLast ? 3 : (repsUp ? 3 : 2);
                    return e('circle', { key: i, cx: x, cy: y, r, fill: dotColor, stroke: strokeC, strokeWidth: repsUp ? 1.5 : 1 });
                })
            );
        }

        // --- Workout Score Gauge (redesigned colors) ---
        function WorkoutScoreGauge({ score, maxScore }) {
            const scoreLevel = Math.round((score / maxScore) * 5);
            const clampedScore = Math.max(1, Math.min(5, scoreLevel));
            const percentage = clampedScore / 5;
            const fillAngle = 180 * percentage;
            
            const colors = [
                '#45484c', // outline-variant - 1/5
                '#737679', // outline - 2/5
                '#a9abaf', // on-surface-variant - 3/5
                '#c4ec00', // primary-fixed-dim - 4/5
                '#d1fc00'  // primary-container - 5/5
            ];
            
            return e('div', { className: 'flex flex-col items-center' },
                e('div', { className: 'text-sm mb-2', style: { color: 'var(--on-surface-variant)' } }, 'Workout Score'),
                e('div', { className: 'relative' },
                    e('svg', { width: 120, height: 70, viewBox: '0 0 120 70' },
                        e('defs', {},
                            e('linearGradient', { id: 'arcGradient', gradientUnits: 'userSpaceOnUse', x1: '10', y1: '60', x2: '110', y2: '60' },
                                e('stop', { offset: '0%', style: { stopColor: '#45484c', stopOpacity: 1 } }),
                                e('stop', { offset: '25%', style: { stopColor: '#737679', stopOpacity: 1 } }),
                                e('stop', { offset: '50%', style: { stopColor: '#a9abaf', stopOpacity: 1 } }),
                                e('stop', { offset: '75%', style: { stopColor: '#c4ec00', stopOpacity: 1 } }),
                                e('stop', { offset: '100%', style: { stopColor: '#d1fc00', stopOpacity: 1 } })
                            )
                        ),
                        (() => {
                            const startAngle = 180, endAngle = 360;
                            const startRad = (startAngle * Math.PI) / 180;
                            const endRad = (endAngle * Math.PI) / 180;
                            const radius = 50, cx = 60, cy = 60;
                            const x1 = cx + radius * Math.cos(startRad), y1 = cy + radius * Math.sin(startRad);
                            const x2 = cx + radius * Math.cos(endRad), y2 = cy + radius * Math.sin(endRad);
                            return e('path', { d: `M ${x1} ${y1} A ${radius} ${radius} 0 0 1 ${x2} ${y2}`, stroke: '#22262b', strokeWidth: 10, fill: 'none', strokeLinecap: 'round' });
                        })(),
                        (() => {
                            const startAngle = 180, endAngle = 180 + fillAngle;
                            const startRad = (startAngle * Math.PI) / 180;
                            const endRad = (endAngle * Math.PI) / 180;
                            const radius = 50, cx = 60, cy = 60;
                            const x1 = cx + radius * Math.cos(startRad), y1 = cy + radius * Math.sin(startRad);
                            const x2 = cx + radius * Math.cos(endRad), y2 = cy + radius * Math.sin(endRad);
                            const largeArcFlag = fillAngle > 180 ? 1 : 0;
                            return e('path', { d: `M ${x1} ${y1} A ${radius} ${radius} 0 ${largeArcFlag} 1 ${x2} ${y2}`, stroke: 'url(#arcGradient)', strokeWidth: 10, fill: 'none', strokeLinecap: 'round' });
                        })()
                    ),
                    e('div', { className: 'absolute bottom-0 left-1/2 transform -translate-x-1/2 text-center', style: { marginBottom: '-8px' } },
                        e('div', {
                            className: 'px-4 py-1 rounded-lg font-bold text-2xl',
                            style: { backgroundColor: colors[clampedScore - 1], color: clampedScore >= 4 ? 'var(--void)' : 'var(--on-surface)' }
                        }, `${clampedScore}/5`)
                    )
                )
            );

        // --- Scroll Wheel ---
        function ScrollWheel({ value, onChange, onClose, label, step = 1, min = 0, max = 500 }) {
            const [items] = useState(() => {
                const arr = [];
                for (let i = min; i <= max; i += step) arr.push(i);
                return arr;
            });
            const wheelRef = useRef(null);
            const [selectedValue, setSelectedValue] = useState(value);

            useEffect(() => {
                if (wheelRef.current) {
                    const index = items.indexOf(value);
                    if (index !== -1) wheelRef.current.scrollTop = index * 50 - 75;
                }
            }, []);

            const handleScroll = () => {
                if (wheelRef.current) {
                    const scrollTop = wheelRef.current.scrollTop;
                    const index = Math.round((scrollTop + 75) / 50);
                    if (index >= 0 && index < items.length) setSelectedValue(items[index]);
                }
            };

            return e('div', { className: 'scroll-wheel-overlay', onClick: onClose },
                e('div', { className: 'scroll-wheel-container', onClick: (ev) => ev.stopPropagation() },
                    e('div', { className: 'text-xl mb-4' }, label),
                    e('div', { ref: wheelRef, className: 'scroll-wheel', onScroll: handleScroll },
                        e('div', { style: { height: '75px' } }),
                        items.map((item) =>
                            e('div', {
                                key: item,
                                className: `scroll-wheel-item ${item === selectedValue ? 'active' : ''}`,

        // --- Custom Number Input (rounded box design) ---
        // Format a number for display: drop trailing .0 but keep real decimals (partials).
        function fmtNum(v) {
            if (typeof v !== 'number' || isNaN(v)) return '0';
            return Number.isInteger(v) ? String(v) : String(Math.round(v * 100) / 100);
        }

        function CustomNumberInput({ value, onChange, label, step = 1, size = 168 }) {
            const [isLongPress, setIsLongPress] = useState(false);
            const [tempValue, setTempValue] = useState('');
            const longPressTimer = useRef(null);

            // Scale all type sizes off the box size so it stays readable when shrunk.
            const valuePx = Math.round(size * 0.34);
            const arrowPx = Math.max(14, Math.round(size * 0.12));
            const sizePx = Math.round(size) + 'px';

            const handleTouchStart = () => { longPressTimer.current = setTimeout(() => { setIsLongPress(true); setTempValue(fmtNum(value)); }, 500); };
            const handleTouchEnd = () => { if (longPressTimer.current) clearTimeout(longPressTimer.current); };

            const handleBubbleClick = (ev) => {
                ev.stopPropagation();
                const rect = ev.currentTarget.getBoundingClientRect();
                const y = ev.clientY - rect.top;
                if (y < rect.height / 2) onChange(Math.round((value + step) * 100) / 100);
                else onChange(Math.max(0, Math.round((value - step) * 100) / 100));
            };

            const handleManualBlur = () => {
                const num = parseFloat(tempValue);
                if (!isNaN(num)) onChange(num);
                else if (tempValue === '') onChange(0);
                setIsLongPress(false);
            };

            if (isLongPress) {
                return e('div', { className: 'text-center' },
                    e('div', { className: 'font-bold uppercase tracking-widest mb-2', style: { color: 'var(--on-surface-variant)', fontSize: '0.8rem' } }, label),
                    e('input', {
                        type: 'number', step, value: tempValue, inputMode: 'decimal',
                        onChange: (ev) => setTempValue(ev.target.value),
                        onBlur: handleManualBlur,
                        onKeyDown: (ev) => { if (ev.key === 'Enter') ev.target.blur(); },
                        autoFocus: true,
                        className: 'font-black text-center rounded-2xl outline-none',
                        style: { width: sizePx, height: sizePx, fontSize: valuePx + 'px', background: 'var(--surface-container-high)', border: '3px solid var(--primary-container)', color: 'var(--on-surface)', caretColor: 'var(--primary-container)' }
                    })
                );
            }

            return e('div', { className: 'text-center' },
                e('div', { className: 'font-bold uppercase tracking-widest mb-2', style: { color: 'var(--on-surface-variant)', fontSize: '0.8rem' } }, label),
                e('div', {
                    onClick: handleBubbleClick,
                    onTouchStart: handleTouchStart, onTouchEnd: handleTouchEnd,
                    onMouseDown: handleTouchStart, onMouseUp: handleTouchEnd,
                    className: 'font-black text-center rounded-2xl outline-none flex flex-col items-center justify-center select-none cursor-pointer relative overflow-hidden',
                    style: { width: sizePx, height: sizePx, background: 'var(--surface-container-highest)', color: 'var(--on-surface)' }
                },
                    e('div', { className: 'absolute top-0 left-0 right-0 h-1/3 flex items-center justify-center', style: { paddingTop: '4px', fontSize: arrowPx + 'px', color: 'var(--primary-fixed-dim)', opacity: 0.6 } }, '\u25B2'),
                    e('div', { className: 'font-black', style: { fontSize: valuePx + 'px', lineHeight: 1 } }, fmtNum(value)),
                    e('div', { className: 'absolute bottom-0 left-0 right-0 h-1/3 flex items-center justify-center', style: { paddingBottom: '4px', fontSize: arrowPx + 'px', color: 'var(--primary-fixed-dim)', opacity: 0.6 } }, '\u25BC')
                )
            );
        }

        // ============================================
        // MAIN APP
        // ============================================
        function WorkoutApp() {
            const [view, setView] = useState('login');
            const [workouts, setWorkouts] = useState({});
            const [editingDay, setEditingDay] = useState(null);
            const [editingWorkout, setEditingWorkout] = useState(null);
