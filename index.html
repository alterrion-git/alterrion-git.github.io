            const [currentSetIndex, setCurrentSetIndex] = useState(0);
            const [workoutStartTime, setWorkoutStartTime] = useState(null);
            const [setStartTime, setSetStartTime] = useState(null);
            const [totalElapsedTime, setTotalElapsedTime] = useState(0);
            const [currentSetTime, setCurrentSetTime] = useState(0);
            const [completedSets, setCompletedSets] = useState([]);
            const [isLoading, setIsLoading] = useState(true);
            const [initialWorkoutSnapshot, setInitialWorkoutSnapshot] = useState(null);
            const [activeTab, setActiveTab] = useState('calendar');
            const [workoutHistory, setWorkoutHistory] = useState([]);
            // Auth state
            const [currentUser, setCurrentUser] = useState(null); // { username, createdAt }
            const [authError, setAuthError] = useState('');
            const [authLoading, setAuthLoading] = useState(false);
            const [showProfile, setShowProfile] = useState(false);
            const [loginUsername, setLoginUsername] = useState('');
            const [loginPassword, setLoginPassword] = useState('');
            const [pendingMigration, setPendingMigration] = useState(null);
            const [expandedHistoryIdx, setExpandedHistoryIdx] = useState(null);
            // Progress-tracking state
            const DEFAULT_PROFILE = { goal: '', split: '', targetWeight: null, targetBodyFat: null, dailyKcal: null, heightCm: null, startWeight: null };
            const [profile, setProfile] = useState(DEFAULT_PROFILE);
            const [metrics, setMetrics] = useState([]); // [{ date, weight, kcal, sleep, steps, note }]
            const [recaps, setRecaps] = useState([]);   // [{ type, date, periodKey, text }]
            const [progressSub, setProgressSub] = useState('hub'); // hub | goals | metrics | photos | recaps | settings
            const [photos, setPhotos] = useState([]);   // loaded from IndexedDB (local only)
            const [aiBusy, setAiBusy] = useState(false);
            const [aiError, setAiError] = useState('');
            const [toast, setToast] = useState('');
            // Month calendar: cursor = first-of-month being shown; selectedDay = day sheet open
            const [calCursor, setCalCursor] = useState(() => { const d = new Date(); d.setDate(1); d.setHours(0, 0, 0, 0); return d.getTime(); });
            const [selectedDay, setSelectedDay] = useState(null); // ms at noon of the picked day, or null
            const [monthPicker, setMonthPicker] = useState(false);

            // Cover screen detection (flip phone: nearly square aspect) — shared hook
            const viewport = useViewport();
            const isCoverScreen = viewport.isCover;
            // Confirmation dialog state: { title, message, confirmLabel, onConfirm }
            const [confirmState, setConfirmState] = useState(null);

            // Check for old app data in localStorage
            const getOldAppData = () => {
                try {
                    const old = localStorage.getItem('workout-tracker-data');
                    if (old) {
                        const parsed = JSON.parse(old);
                        if (Object.keys(parsed).length > 0) return parsed;
                    }
                } catch (err) {}
                return null;
            };

            // --- Auth functions ---
            const doLogin = async () => {
                if (!loginUsername.trim() || !loginPassword.trim()) { setAuthError('Enter username and password'); return; }
                setAuthLoading(true);
                setAuthError('');
                const uname = loginUsername.trim().toLowerCase();
                const pHash = await hashPassword(loginPassword);
                if (cloudEnabled()) {
                    const userData = await cloudGet('users/' + uname);
                    if (!userData) { setAuthError('User not found. Register first.'); setAuthLoading(false); return; }
                    if (userData.passwordHash !== pHash) { setAuthError('Wrong password'); setAuthLoading(false); return; }
                    setCurrentUser({ username: uname, createdAt: userData.createdAt || Date.now() });
                    const loadedWorkouts = sanitizeWorkouts(userData.workouts || {});
                    const loadedHistory = userData.history || [];
                    setWorkouts(loadedWorkouts);
                    setWorkoutHistory(loadedHistory);
                    hydrateProgress(uname, userData);
                    localStorage.setItem('cwa-user', JSON.stringify({ username: uname, passwordHash: pHash }));
                    // Check for old data to migrate (only if account has no workouts)
                    if (Object.keys(loadedWorkouts).length === 0) {
                        const oldData = getOldAppData();
                        if (oldData) { setPendingMigration(oldData); setView('migrate'); setAuthLoading(false); return; }
                    }
                } else {
                    const localUser = localStorage.getItem('cwa-user-' + uname);
                    if (!localUser) { setAuthError('User not found. Register first.'); setAuthLoading(false); return; }
                    const parsed = JSON.parse(localUser);
                    if (parsed.passwordHash !== pHash) { setAuthError('Wrong password'); setAuthLoading(false); return; }
                    setCurrentUser({ username: uname, createdAt: parsed.createdAt || Date.now() });
                    const w = localStorage.getItem('cwa-workouts-' + uname);
                    const h = localStorage.getItem('cwa-history-' + uname);
                    if (w) setWorkouts(sanitizeWorkouts(JSON.parse(w)));
                    else {
                        const oldData = getOldAppData();
                        if (oldData) { setPendingMigration(oldData); setView('migrate'); setAuthLoading(false); localStorage.setItem('cwa-user', JSON.stringify({ username: uname, passwordHash: pHash })); return; }
                    }
                    if (h) setWorkoutHistory(JSON.parse(h));
                    hydrateProgress(uname, null);
                    localStorage.setItem('cwa-user', JSON.stringify({ username: uname, passwordHash: pHash }));
                }
                setView('landing');
                setIsLoading(false);
                setAuthLoading(false);
            };

            const doRegister = async () => {
                if (!loginUsername.trim() || !loginPassword.trim()) { setAuthError('Enter username and password'); return; }
                if (loginPassword.trim().length < 4) { setAuthError('Password must be at least 4 characters'); return; }
                setAuthLoading(true);
                setAuthError('');
                const uname = loginUsername.trim().toLowerCase();
                const pHash = await hashPassword(loginPassword);
                if (cloudEnabled()) {
                    const existing = await cloudGet('users/' + uname);
                    if (existing) { setAuthError('Username already taken'); setAuthLoading(false); return; }
                    const userData = { passwordHash: pHash, createdAt: Date.now(), workouts: {}, history: [] };
                    await cloudSet('users/' + uname, userData);
                    setCurrentUser({ username: uname, createdAt: userData.createdAt });
                    localStorage.setItem('cwa-user', JSON.stringify({ username: uname, passwordHash: pHash }));
                } else {
                    const localUser = localStorage.getItem('cwa-user-' + uname);
                    if (localUser) { setAuthError('Username already taken'); setAuthLoading(false); return; }
                    const userData = { passwordHash: pHash, createdAt: Date.now() };
                    localStorage.setItem('cwa-user-' + uname, JSON.stringify(userData));
                    setCurrentUser({ username: uname, createdAt: userData.createdAt });
                    localStorage.setItem('cwa-user', JSON.stringify({ username: uname, passwordHash: pHash }));
                }
                // Check for old data to migrate into the new account
                const oldData = getOldAppData();
                if (oldData) {
                    setPendingMigration(oldData);
                    setView('migrate');
                    setIsLoading(false);
                    setAuthLoading(false);
                    return;
                }
                setWorkouts({});
                setWorkoutHistory([]);
                setView('landing');
                setIsLoading(false);
                setAuthLoading(false);
            };

            const doMigrationImport = () => {
                if (pendingMigration) {
                    setWorkouts(pendingMigration);
                    setPendingMigration(null);
                }
                setView('landing');
            };

            const doMigrationSkip = () => {
                setPendingMigration(null);
                setView('landing');
            };

            const doLogout = () => {
                setCurrentUser(null);
                setWorkouts({});
                setWorkoutHistory([]);
                setProfile(DEFAULT_PROFILE);
                setMetrics([]);
                setRecaps([]);
                setPhotos([]);
                setProgressSub('hub');
                setView('login');
                setLoginUsername('');
                setLoginPassword('');
                setShowProfile(false);
                localStorage.removeItem('cwa-user');
            };

            // Coalescing, serialized cloud writer. Local save is immediate; cloud writes are
            // queued so they run strictly in order and always end on the LATEST state. This
            // kills the last-write-wins race where a slow earlier write (with an active
            // `progress`) could land after the completion write and resurrect a finished
            // workout hours/days later.
            const syncRef = useRef({ pending: null, running: false });
            const syncToCloud = (w, h) => {
                if (!currentUser) return;
                const uname = currentUser.username;
                try {
                    localStorage.setItem('cwa-workouts-' + uname, JSON.stringify(w));
                    localStorage.setItem('cwa-history-' + uname, JSON.stringify(h));
                } catch (err) {}
                if (!cloudEnabled()) return;
                syncRef.current.pending = { uname, w, h };
                if (syncRef.current.running) return;
                syncRef.current.running = true;
                (async () => {
                    while (syncRef.current.pending) {
                        const job = syncRef.current.pending;
                        syncRef.current.pending = null;
                        try {
                            await cloudSet('users/' + job.uname + '/workouts', job.w);
                            await cloudSet('users/' + job.uname + '/history', job.h);
                        } catch (err) {}
                    }
                    syncRef.current.running = false;
                })();
            };

            // Persist a single progress field (profile / metrics / recaps) locally + cloud.
            const cloudSaveField = async (field, value) => {
                if (!currentUser) return;
                const uname = currentUser.username;
                try { localStorage.setItem('cwa-' + field + '-' + uname, JSON.stringify(value)); } catch (err) {}
                if (cloudEnabled()) await cloudSet('users/' + uname + '/' + field, value);
            };

            // Hydrate progress data from a loaded user record (cloud) or localStorage.
            const hydrateProgress = (uname, src) => {
                const pick = (field, fallback) => {
                    if (src && src[field] != null) return src[field];
                    try { const raw = localStorage.getItem('cwa-' + field + '-' + uname); if (raw) return JSON.parse(raw); } catch (err) {}
                    return fallback;
                };
                setProfile({ ...DEFAULT_PROFILE, ...(pick('profile', {}) || {}) });
                setMetrics(pick('metrics', []) || []);
                setRecaps(pick('recaps', []) || []);
            };

            // --- Tab switching logic ---
            const handleTabChange = (tabId) => {
                if (tabId === 'calendar') {
                    setActiveTab('calendar');
                    setView('landing');
                    // Don't reset edit state - just go back to calendar grid
                } else if (tabId === 'workout') {
                    setActiveTab('workout');
                    if (view === 'live' || view === 'complete') {
                        // Already in a workout flow, stay there
                    } else if (liveWorkout) {
                        setView('live');
                    } else {
                        setView('workout-idle');
                    }
                } else if (tabId === 'month') {
                    setActiveTab('month');
                    setView('calendarMonth');
                } else if (tabId === 'progress') {
                    setActiveTab('progress');
                    setProgressSub('hub');
                    setAiError('');
                    setView('progress');
                } else if (tabId === 'stats') {
                    setActiveTab('stats');
                    setView('stats');
                }
            };

            // --- Auto-login on mount ---
            useEffect(() => {
                const tryAutoLogin = async () => {
                    try {
                        const savedSession = localStorage.getItem('cwa-user');
                        if (savedSession) {
                            const { username, passwordHash } = JSON.parse(savedSession);
                            if (cloudEnabled()) {
                                const userData = await cloudGet('users/' + username);
                                if (userData && userData.passwordHash === passwordHash) {
                                    setCurrentUser({ username, createdAt: userData.createdAt || Date.now() });
                                    const lw = sanitizeWorkouts(userData.workouts || {});
                                    setWorkouts(lw);
                                    setWorkoutHistory(userData.history || []);
                                    hydrateProgress(username, userData);
                                    // Drop straight back into an in-progress workout if there is one.
                                    if (!resumeSessionIfAny(lw, username)) setView('landing');
                                    setIsLoading(false);
                                    return;
                                }
                            }
                            // Fallback to local
                            const localUser = localStorage.getItem('cwa-user-' + username);
                            if (localUser) {
                                const parsed = JSON.parse(localUser);
                                if (parsed.passwordHash === passwordHash) {
                                    setCurrentUser({ username, createdAt: parsed.createdAt || Date.now() });
                                    const w = localStorage.getItem('cwa-workouts-' + username);
                                    const h = localStorage.getItem('cwa-history-' + username);
                                    const lw = sanitizeWorkouts(w ? JSON.parse(w) : {});
                                    if (w) setWorkouts(lw);
                                    if (h) setWorkoutHistory(JSON.parse(h));
                                    hydrateProgress(username, null);
                                    if (!resumeSessionIfAny(lw, username)) setView('landing');
                                    setIsLoading(false);
                                    return;
                                }
                            }
                        }
                    } catch (err) { console.log('Auto-login failed:', err); }
                    setIsLoading(false);
                };
                tryAutoLogin();
            }, []);

            // --- Sync on data change ---
            useEffect(() => {
                if (!isLoading && currentUser) {
                    syncToCloud(workouts, workoutHistory);
                }
            }, [workouts, workoutHistory]);
            useEffect(() => { if (!isLoading && currentUser) cloudSaveField('profile', profile); }, [profile]);
            useEffect(() => { if (!isLoading && currentUser) cloudSaveField('metrics', metrics); }, [metrics]);
            useEffect(() => { if (!isLoading && currentUser) cloudSaveField('recaps', recaps); }, [recaps]);

            // Load this user's progress photos from IndexedDB whenever the user changes.
            useEffect(() => {
                let cancelled = false;
                if (currentUser) {
                    photoList(currentUser.username).then(list => { if (!cancelled) setPhotos(list); }).catch(() => {});
                } else {
                    setPhotos([]);
                }
                return () => { cancelled = true; };
            }, [currentUser]);

            const refreshPhotos = async () => {
                if (!currentUser) return;
                try { setPhotos(await photoList(currentUser.username)); } catch (err) {}
            };

            // Auto-dismiss transient toast messages.
            useEffect(() => {
                if (!toast) return;
                const t = setTimeout(() => setToast(''), 2200);
                return () => clearTimeout(t);
            }, [toast]);

            const saveToHistory = (workout, elapsedTime, totalScore, maxScore) => {
                const entry = {
                    date: Date.now(),
                    day: workout.day,
                    name: workout.name,
                    totalTime: elapsedTime,
                    score: totalScore || 0,
                    maxScore: maxScore || 0,
                    exercises: workout.exercises.map(ex => ({
                        name: ex.name,
                        sets: ex.sets.map(s => ({ reps: s.reps, weight: s.weight }))
                    }))
                };
                // One unified session per calendar day per day-slot. If today's workout was
                // already logged (started/finished more than once after tweaking settings,
                // re-running it, etc.), REPLACE that entry rather than appending a duplicate —
                // duplicates pollute the trend data the AI recaps rely on. Keyed on calendar
                // date + day-slot (not name) so renaming mid-day still collapses to one.
                setWorkoutHistory(prev => {
                    const ek = dayKey(entry.date);
                    const dupIdx = prev.findIndex(h => h.day === entry.day && dayKey(h.date) === ek);
                    if (dupIdx !== -1) {
                        const copy = prev.slice();
                        copy[dupIdx] = entry;
                        return copy;
                    }
                    return [...prev, entry];
                });
            };

            const deleteFromHistory = (idx) => {
                setWorkoutHistory(prev => prev.filter((_, i) => i !== idx));
                setExpandedHistoryIdx(null);
            };

            const getExerciseHistory = (exerciseName) => {
                const entries = [];
                for (let i = workoutHistory.length - 1; i >= 0 && entries.length < 5; i--) {
                    const w = workoutHistory[i];
                    const ex = w.exercises.find(x => x.name === exerciseName);
                    if (ex) {
                        const maxWeight = Math.max(...ex.sets.map(s => s.weight));
                        const totalReps = ex.sets.reduce((sum, s) => sum + s.reps, 0);
                        const totalVol = ex.sets.reduce((sum, s) => sum + s.reps * s.weight, 0);
                        entries.unshift({ date: w.date, maxWeight, totalReps, totalVol, repsUp: false });
                    }
                }
                // Mark sessions where reps increased vs previous
                for (let i = 1; i < entries.length; i++) {
                    if (entries[i].totalReps > entries[i - 1].totalReps) {
                        entries[i].repsUp = true;
                    }
                }
                return entries;
            };

            // --- Timers ---
            useEffect(() => {
                let interval;
                if (workoutStartTime && view === 'live') {
                    interval = setInterval(() => {
                        const elapsedMs = Date.now() - workoutStartTime;
                        // Safety net: a session left running past the auto-end window is treated
                        // as abandoned and discarded (not saved), so it can't linger or log a
                        // bogus multi-hour workout into the recap data.
                        if (elapsedMs > AUTO_END_MS) {
                            cancelWorkout();
                            setToast('Workout auto-ended after 4h');
                            return;
                        }
                        setTotalElapsedTime(Math.floor(elapsedMs / 1000));
                    }, 1000);
                }
                return () => clearInterval(interval);
            }, [workoutStartTime, view]);

            useEffect(() => {
                let interval;
                if (setStartTime && view === 'live') {
                    interval = setInterval(() => { setCurrentSetTime(Math.floor((Date.now() - setStartTime) / 1000)); }, 1000);
                }
                return () => clearInterval(interval);
            }, [setStartTime, view]);

            const formatTime = (seconds) => {
                const mins = Math.floor(seconds / 60);
                const secs = seconds % 60;
                return `${mins}:${secs.toString().padStart(2, '0')}`;
            };

            // --- Workout CRUD ---
            const startNewWorkout = () => {
                setEditingWorkout({ name: '', exercises: [{ name: '', notes: '', sets: [{ reps: 0, weight: 0 }, { reps: 0, weight: 0 }] }] });
                setView('edit');
            };

            const addExercise = () => {
                setEditingWorkout({ ...editingWorkout, exercises: [...editingWorkout.exercises, { name: '', notes: '', sets: [{ reps: 0, weight: 0 }, { reps: 0, weight: 0 }] }] });
            };

            const addSet = (exerciseIndex) => {
                const newExercises = [...editingWorkout.exercises];
                newExercises[exerciseIndex].sets.push({ reps: 0, weight: 0 });
                setEditingWorkout({ ...editingWorkout, exercises: newExercises });
            };

            const updateExerciseName = (exerciseIndex, name) => {
                const newExercises = [...editingWorkout.exercises];
                newExercises[exerciseIndex].name = name;
                setEditingWorkout({ ...editingWorkout, exercises: newExercises });
            };

            const updateExerciseNotes = (exerciseIndex, notes) => {
                const newExercises = [...editingWorkout.exercises];
                newExercises[exerciseIndex].notes = notes;
                setEditingWorkout({ ...editingWorkout, exercises: newExercises });
            };

            const updateSet = (exerciseIndex, setIndex, field, value) => {
                const newExercises = [...editingWorkout.exercises];
                const parsedValue = value === '' ? 0 : parseFloat(value);
                newExercises[exerciseIndex].sets[setIndex][field] = isNaN(parsedValue) ? 0 : parsedValue;
                setEditingWorkout({ ...editingWorkout, exercises: newExercises });
            };

            const removeSet = (exerciseIndex, setIndex) => {
                const newExercises = [...editingWorkout.exercises];
                if (newExercises[exerciseIndex].sets.length > 1) {
                    newExercises[exerciseIndex].sets.splice(setIndex, 1);
                    setEditingWorkout({ ...editingWorkout, exercises: newExercises });
                }
            };

            const removeExercise = (exerciseIndex) => {
                const newExercises = [...editingWorkout.exercises];
                if (newExercises.length > 1) {
                    newExercises.splice(exerciseIndex, 1);
                    setEditingWorkout({ ...editingWorkout, exercises: newExercises });
                }
            };

            const moveExercise = (fromIndex, toIndex) => {
                if (toIndex < 0 || toIndex >= editingWorkout.exercises.length) return;
                const newExercises = [...editingWorkout.exercises];
                const [moved] = newExercises.splice(fromIndex, 1);
                newExercises.splice(toIndex, 0, moved);
                setEditingWorkout({ ...editingWorkout, exercises: newExercises });
            };

            const saveWorkout = () => {
                if (editingWorkout.name && editingWorkout.exercises.every(ex => ex.name)) {
                    const prev = workouts[editingDay];
                    // Preserve an in-progress session across edits (adding notes / tweaking
                    // settings used to silently cancel the workout). Only drop progress if the
                    // edit made the saved indices invalid.
                    let progress = prev && prev.progress ? prev.progress : null;
                    if (progress) {
                        const ex = editingWorkout.exercises[progress.currentExerciseIndex];
                        if (!ex || !ex.sets[progress.currentSetIndex]) progress = null;
                    }
                    const newWorkouts = { ...workouts };
                    newWorkouts[editingDay] = { ...editingWorkout, progress };
                    setWorkouts(newWorkouts);
                    setView('landing');
                    setEditingDay(null);
                    setEditingWorkout(null);
                }
            };

            // Active-session marker: lets us drop the user straight back into a live
            // workout when the PWA is reopened (instead of forcing a Continue tap), and
            // makes set-1 recoverable.
            const writeSessionMarker = (day) => {
                try { localStorage.setItem('cwa-active-session', JSON.stringify({ user: currentUser ? currentUser.username : null, day, ts: Date.now() })); } catch (err) {}
            };
            const clearSessionMarker = () => {
                try { localStorage.removeItem('cwa-active-session'); } catch (err) {}
            };

            // On app reopen, jump straight back into a recent in-progress workout.
            const resumeSessionIfAny = (loadedWorkouts, username) => {
                try {
                    const raw = localStorage.getItem('cwa-active-session');
                    if (!raw) return false;
                    const marker = JSON.parse(raw);
                    if (!marker || !marker.day) return false;
                    if (marker.user && username && marker.user !== username) return false;
                    // Only auto-resume sessions within the auto-end window so we never yank the
                    // user into a workout they abandoned (matches sanitizeWorkouts, which has
                    // already stripped progress older than this from loadedWorkouts).
                    if (Date.now() - (marker.ts || 0) > AUTO_END_MS) return false;
                    const w = loadedWorkouts[marker.day];
                    if (!w || !w.progress) return false;
                    const p = w.progress;
                    // Indices may be stale if the workout was edited — validate before resuming.
                    if (!w.exercises[p.currentExerciseIndex] || !w.exercises[p.currentExerciseIndex].sets[p.currentSetIndex]) return false;
                    setCurrentExerciseIndex(p.currentExerciseIndex);
                    setCurrentSetIndex(p.currentSetIndex);
                    setWorkoutStartTime(p.startTime || Date.now());
                    setCompletedSets(p.completedSets || []);
                    setSetStartTime(Date.now());
                    setInitialWorkoutSnapshot(p.initialSnapshot || JSON.parse(JSON.stringify({ ...w, progress: null })));
                    setLiveWorkout({ ...w, day: marker.day });
                    setActiveTab('workout');
                    setView('live');
                    return true;
                } catch (err) { return false; }
            };

            const startWorkout = (day) => {
                const workout = workouts[day];
                const progress = workout.progress;
                if (progress) {
                    setCurrentExerciseIndex(progress.currentExerciseIndex);
                    setCurrentSetIndex(progress.currentSetIndex);
                    setWorkoutStartTime(progress.startTime);
                    setCompletedSets(progress.completedSets || []);
                    setSetStartTime(progress.setStartTime || Date.now());
                    if (progress.initialSnapshot) setInitialWorkoutSnapshot(progress.initialSnapshot);
                    else setInitialWorkoutSnapshot(JSON.parse(JSON.stringify(workout)));
                } else {
                    // Brand-new session: persist progress immediately (including the initial
                    // snapshot) so the workout is recoverable even if the app is killed while
                    // still on the very first set.
                    const snapshot = JSON.parse(JSON.stringify({ ...workout, progress: null }));
                    const now = Date.now();
                    setInitialWorkoutSnapshot(snapshot);
                    setCurrentExerciseIndex(0);
                    setCurrentSetIndex(0);
                    setWorkoutStartTime(now);
                    setCompletedSets([]);
                    setSetStartTime(now);
                    setWorkouts(prev => ({
                        ...prev,
                        [day]: { ...prev[day], progress: { currentExerciseIndex: 0, currentSetIndex: 0, startTime: now, setStartTime: now, completedSets: [], initialSnapshot: snapshot } }
                    }));
                }
                writeSessionMarker(day);
                setLiveWorkout({ ...workout, day });
                setView('live');
                setActiveTab('workout');
            };

            const getTotalSetsRemaining = () => {
                if (!liveWorkout) return 0;
                let total = 0;
                for (let i = currentExerciseIndex; i < liveWorkout.exercises.length; i++) {
                    const exercise = liveWorkout.exercises[i];
                    total += i === currentExerciseIndex ? exercise.sets.length - currentSetIndex : exercise.sets.length;
                }
                return total;
            };

            const updateLiveSet = (field, value) => {
                const newWorkout = { ...liveWorkout };
                newWorkout.exercises[currentExerciseIndex].sets[currentSetIndex][field] = parseFloat(value) || 0;
                setLiveWorkout(newWorkout);
            };

            const nextSet = () => {
                const setTime = currentSetTime;
                const newCompletedSets = [...completedSets, setTime];
                setCompletedSets(newCompletedSets);

                const updatedWorkouts = { ...workouts };
                updatedWorkouts[liveWorkout.day] = {
                    ...liveWorkout,
                    progress: { currentExerciseIndex, currentSetIndex: currentSetIndex + 1, startTime: workoutStartTime, setStartTime: Date.now(), completedSets: newCompletedSets, initialSnapshot: initialWorkoutSnapshot }
                };

                const currentExercise = liveWorkout.exercises[currentExerciseIndex];

                if (currentSetIndex + 1 < currentExercise.sets.length) {
                    setCurrentSetIndex(currentSetIndex + 1);
                    setSetStartTime(Date.now());
                    setCurrentSetTime(0);
                    updatedWorkouts[liveWorkout.day].progress.currentSetIndex = currentSetIndex + 1;
                    updatedWorkouts[liveWorkout.day].progress.setStartTime = Date.now();
                } else if (currentExerciseIndex + 1 < liveWorkout.exercises.length) {
                    setCurrentExerciseIndex(currentExerciseIndex + 1);
                    setCurrentSetIndex(0);
                    setSetStartTime(Date.now());
                    setCurrentSetTime(0);
                    updatedWorkouts[liveWorkout.day].progress.currentExerciseIndex = currentExerciseIndex + 1;
                    updatedWorkouts[liveWorkout.day].progress.currentSetIndex = 0;
                    updatedWorkouts[liveWorkout.day].progress.setStartTime = Date.now();
                } else {
                    updatedWorkouts[liveWorkout.day].progress = null;
                    setWorkouts(updatedWorkouts);
                    const { totalScore, maxScore } = calculateWorkoutSummary();
                    saveToHistory(liveWorkout, Math.floor((Date.now() - workoutStartTime) / 1000), totalScore, maxScore);
                    clearSessionMarker();
                    setView('complete');
                    return;
                }
                writeSessionMarker(liveWorkout.day);
                setWorkouts(updatedWorkouts);
            };

            const prevSet = () => {
                if (currentSetIndex > 0) {
                    setCurrentSetIndex(currentSetIndex - 1);
                    setSetStartTime(Date.now());
                    setCurrentSetTime(0);
                    // Remove last completed set time
                    if (completedSets.length > 0) {
                        setCompletedSets(completedSets.slice(0, -1));
                    }
                } else if (currentExerciseIndex > 0) {
                    const prevExercise = liveWorkout.exercises[currentExerciseIndex - 1];
                    setCurrentExerciseIndex(currentExerciseIndex - 1);
                    setCurrentSetIndex(prevExercise.sets.length - 1);
                    setSetStartTime(Date.now());
                    setCurrentSetTime(0);
                    if (completedSets.length > 0) {
                        setCompletedSets(completedSets.slice(0, -1));
                    }
                }
                // else: already at very first set, do nothing
            };

            const canGoPrev = () => {
                return currentSetIndex > 0 || currentExerciseIndex > 0;
            };

            const getNextExerciseName = () => {
                if (!liveWorkout) return '';
                const currentExercise = liveWorkout.exercises[currentExerciseIndex];
                const isLastSetOfExercise = currentSetIndex >= currentExercise.sets.length - 1;
                const isLastExercise = currentExerciseIndex >= liveWorkout.exercises.length - 1;
                if (isLastSetOfExercise && isLastExercise) return 'Finish';
                if (isLastSetOfExercise && !isLastExercise) return liveWorkout.exercises[currentExerciseIndex + 1].name;
                return null; // still more sets in current exercise
            };

            const finishWorkout = () => {
                clearSessionMarker();
                setView('landing');
                setActiveTab('calendar');
                setLiveWorkout(null);
                setCurrentExerciseIndex(0);
                setCurrentSetIndex(0);
                setWorkoutStartTime(null);
                setSetStartTime(null);
                setTotalElapsedTime(0);
                setCurrentSetTime(0);
                setCompletedSets([]);
                setInitialWorkoutSnapshot(null);
            };

            // Permanently delete a day's workout from the plan.
            const deleteWorkout = (day) => {
                setWorkouts(prev => {
                    const nw = { ...prev };
                    delete nw[day];
                    return nw;
                });
                if (liveWorkout && liveWorkout.day === day) {
                    clearSessionMarker();
                    setLiveWorkout(null);
                }
                setView('landing');
                setActiveTab('calendar');
                setEditingDay(null);
                setEditingWorkout(null);
            };

            // Discard an in-progress workout without saving to history (clears its progress).
            const cancelWorkout = () => {
                if (liveWorkout) {
                    setWorkouts(prev => {
                        const nw = { ...prev };
                        if (nw[liveWorkout.day]) nw[liveWorkout.day] = { ...nw[liveWorkout.day], progress: null };
                        return nw;
                    });
                }
                clearSessionMarker();
                setLiveWorkout(null);
                setCurrentExerciseIndex(0);
                setCurrentSetIndex(0);
                setWorkoutStartTime(null);
                setSetStartTime(null);
                setTotalElapsedTime(0);
                setCurrentSetTime(0);
                setCompletedSets([]);
                setInitialWorkoutSnapshot(null);
                setView('landing');
                setActiveTab('calendar');
            };

            const calculateWorkoutSummary = () => {
                if (!initialWorkoutSnapshot || !liveWorkout) return { summary: [], totalScore: 0, maxScore: 0 };
                const summary = [];
                let totalScore = 0;
                liveWorkout.exercises.forEach((exercise, exIdx) => {
                    const initialExercise = initialWorkoutSnapshot.exercises[exIdx];
                    if (!initialExercise) return;
                    let totalRepsIncrease = 0, maxWeightIncrease = 0, hasChanges = false, points = 0;
                    exercise.sets.forEach((set, setIdx) => {
                        const initialSet = initialExercise.sets[setIdx];
                        if (!initialSet) return;
                        const repsDiff = set.reps - initialSet.reps;
                        const weightDiff = set.weight - initialSet.weight;
                        if (repsDiff > 0) { totalRepsIncrease += repsDiff; hasChanges = true; }
                        if (weightDiff > maxWeightIncrease) { maxWeightIncrease = weightDiff; if (weightDiff > 0) hasChanges = true; }
                    });
                    if (maxWeightIncrease > 0) points = 2;
                    else if (totalRepsIncrease >= 2) points = 2;
                    else if (totalRepsIncrease === 1) points = 1;
                    totalScore += points;
                    let changeText = 'No change';
                    if (totalRepsIncrease > 0 && maxWeightIncrease > 0) changeText = `Increased reps by ${totalRepsIncrease} and weight by ${maxWeightIncrease}kg`;
                    else if (totalRepsIncrease > 0) changeText = `Increased reps by ${totalRepsIncrease}`;
                    else if (maxWeightIncrease > 0) changeText = `Increased weight by ${maxWeightIncrease}kg`;
                    summary.push({ name: exercise.name, change: changeText, hasChanges, points });
                });
                return { summary, totalScore, maxScore: liveWorkout.exercises.length * 2 };
            };

            // ======================
            // PROGRESS-TRACKING HANDLERS
            // ======================
            const updateProfileField = (field, value) => setProfile(prev => ({ ...prev, [field]: value }));

            // Upsert one metrics entry per calendar day.
            const saveMetric = (entry) => {
                setMetrics(prev => {
                    const k = dayKey(entry.date);
                    const rest = prev.filter(m => dayKey(m.date) !== k);
                    return [...rest, entry].sort((a, b) => a.date - b.date);
                });
            };
            const deleteMetric = (date) => setMetrics(prev => prev.filter(m => dayKey(m.date) !== dayKey(date)));

            const addPhotoFromFile = async (file, dateTs) => {
                if (!file || !currentUser) return;
                try {
                    const ts = dateTs || Date.now();
                    const data = await compressImage(file);
                    const rec = { id: `${currentUser.username}-${Date.now()}-${Math.random().toString(36).slice(2, 7)}`, user: currentUser.username, date: ts, week: weekKey(ts), data };
                    await photoAdd(rec);
                    await refreshPhotos();
                    setToast('Photo added');
                } catch (err) { setAiError('Could not add photo: ' + (err.message || err)); }
            };
            const removePhoto = async (id) => { try { await photoDelete(id); await refreshPhotos(); } catch (err) {} };

            // All timestamped data points used to judge how much history exists.
            const allDataDates = () => [
                ...workoutHistory.map(w => w.date),
                ...metrics.map(m => m.date),
                ...photos.map(p => p.date),
            ].filter(Boolean);

            const distinctWeeks = () => countDistinct(allDataDates(), weekKey);
            const distinctMonths = () => countDistinct(allDataDates(), monthKey);

            // Gating: weekly needs >=2 weeks of data and none generated for the current
            // ISO week yet; monthly needs >=2 months and none for the current month.
            const lastRecap = (type) => recaps.filter(r => r.type === type).sort((a, b) => b.date - a.date)[0];
            const canGenerate = (type) => {
                if (!getOpenAIKey()) return { ok: false, reason: 'Add your OpenAI API key in Settings.' };
                if (type === 'weekly') {
                    if (distinctWeeks() < 2) return { ok: false, reason: 'Need at least 2 weeks of data.' };
                    const last = lastRecap('weekly');
                    if (last && last.periodKey === weekKey(Date.now())) return { ok: false, reason: 'Weekly recap already done this week.' };
                } else {
                    if (distinctMonths() < 2) return { ok: false, reason: 'Need at least 2 months of data.' };
                    const last = lastRecap('monthly');
                    if (last && last.periodKey === monthKey(Date.now())) return { ok: false, reason: 'Monthly recap already done this month.' };
                }
                return { ok: true, reason: '' };
            };

            // Exercises with "proper history": appear in >=2 logged sessions. Used so the LLM
            // only reasons about lifts the user has actually stuck with.
            const buildExerciseTrends = (sinceTs) => {
                const byName = {};
                workoutHistory.forEach(w => {
                    w.exercises.forEach(ex => {
                        const top = ex.sets.reduce((b, s) => (s.weight > b.weight ? s : b), { reps: 0, weight: 0 });
                        const vol = ex.sets.reduce((sum, s) => sum + s.reps * s.weight, 0);
                        (byName[ex.name] = byName[ex.name] || []).push({ date: w.date, topWeight: top.weight, topReps: top.reps, vol });
                    });
                });
                const lines = [];
                Object.keys(byName).forEach(name => {
                    const sessions = byName[name].sort((a, b) => a.date - b.date);
                    if (sessions.length < 2) return; // skip exercises without real history
                    const recent = sessions.filter(s => s.date >= sinceTs);
                    const ref = recent.length >= 2 ? recent : sessions.slice(-Math.min(4, sessions.length));
                    const first = ref[0], last = ref[ref.length - 1];
                    const dW = (last.topWeight - first.topWeight);
                    lines.push(`- ${name}: top set ${first.topWeight}kg×${first.topReps} → ${last.topWeight}kg×${last.topReps} (${dW >= 0 ? '+' : ''}${Math.round(dW * 10) / 10}kg) over ${ref.length} sessions`);
                });
                return lines;
            };

            const buildRecapContent = (type) => {
                const now = Date.now();
                const periodStart = type === 'weekly' ? now - 7 * DAY_MS : now - 31 * DAY_MS;
                const workoutsInPeriod = workoutHistory.filter(w => w.date >= periodStart);
                const metricsInPeriod = metrics.filter(m => m.date >= periodStart);
                const weights = metricsInPeriod.filter(m => m.weight).map(m => m.weight);
                const kcals = metricsInPeriod.filter(m => m.kcal).map(m => m.kcal);
                const sleeps = metricsInPeriod.filter(m => m.sleep).map(m => m.sleep);
                const avg = (a) => a.length ? Math.round((a.reduce((x, y) => x + y, 0) / a.length) * 10) / 10 : null;
                const p = profile;
                const goalLine = [
                    p.goal ? `Goal: ${p.goal}` : null,
                    p.split ? `Split: ${p.split}` : null,
                    p.targetWeight ? `Target weight: ${p.targetWeight}kg` : null,
                    p.targetBodyFat ? `Target body fat: ${p.targetBodyFat}%` : null,
                    p.dailyKcal ? `Daily kcal target: ${p.dailyKcal}` : null,
                ].filter(Boolean).join(' | ') || 'No explicit goals set.';
                const trends = buildExerciseTrends(periodStart);
                const lines = [];
                lines.push(`Period: ${type} (last ${type === 'weekly' ? '7 days' : '~1 month'}).`);
                lines.push(goalLine);
                lines.push(`Workouts completed this period: ${workoutsInPeriod.length}.`);
                if (trends.length) { lines.push('Lift progression (exercises with real history):'); trends.forEach(t => lines.push(t)); }
                else lines.push('Not enough repeated-exercise history to show lift trends yet.');
                const bodyBits = [];
                if (weights.length) bodyBits.push(`weight ${weights[0]}→${weights[weights.length - 1]}kg (avg ${avg(weights)})`);
                if (kcals.length) bodyBits.push(`avg intake ${avg(kcals)} kcal/day over ${kcals.length} logged days`);
                if (sleeps.length) bodyBits.push(`avg sleep ${avg(sleeps)}h`);
                lines.push(bodyBits.length ? `Body metrics: ${bodyBits.join('; ')}.` : 'No body metrics logged this period.');
                const photosInPeriod = photos.filter(ph => ph.date >= periodStart).sort((a, b) => b.date - a.date).slice(0, 2);
                lines.push(photosInPeriod.length ? `${photosInPeriod.length} progress photo(s) attached (most recent).` : 'No progress photos this period.');
                lines.push('\nWrite a concise coaching recap and 3-5 prioritized recommendations for the next period.');
                const content = [{ type: 'text', text: lines.join('\n') }];
                photosInPeriod.forEach(ph => content.push({ type: 'image_url', image_url: { url: ph.data } }));
                return content;
            };

            const generateRecap = async (type) => {
                setAiError('');
                const gate = canGenerate(type);
                if (!gate.ok) { setAiError(gate.reason); return; }
                const apiKey = getOpenAIKey();
                setAiBusy(true);
                try {
                    const content = buildRecapContent(type);
                    const text = await callOpenAI(apiKey, content, { system: RECAP_SYSTEM, maxTokens: type === 'monthly' ? 1100 : 850 });
                    const now = Date.now();
                    const periodKey = type === 'weekly' ? weekKey(now) : monthKey(now);
                    const entry = { type, date: now, periodKey, text };
                    setRecaps(prev => [...prev.filter(r => !(r.type === type && r.periodKey === periodKey)), entry].sort((a, b) => b.date - a.date));
                    setToast((type === 'weekly' ? 'Weekly' : 'Monthly') + ' recap ready');

            // Profile modal overlay

                // Card
                e('div', {
                    className: 'relative z-10 w-80 rounded-2xl p-5',
                    style: { background: 'var(--surface-container-highest)' },

                },
                    // User icon + name
                    e('div', { className: 'flex items-center gap-4 mb-5' },
                        e('div', {
                            className: 'w-14 h-14 rounded-2xl flex items-center justify-center',
                            style: { background: 'rgba(209, 252, 0, 0.1)' }
                        }, e(MIcon, { icon: 'person', fill: true, style: { fontSize: '32px', color: 'var(--primary-container)' } })),
                        e('div', null,
                            e('div', { className: 'text-lg font-black' }, currentUser ? currentUser.username : ''),
                            e('div', { className: 'text-xs', style: { color: 'var(--on-surface-variant)' } },
                                currentUser ? `Joined ${new Date(currentUser.createdAt).toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' })}` : ''
                            )
                        )
                    ),
                    // Stats summary
                    e('div', { className: 'flex gap-3 mb-5' },
                        e('div', { className: 'flex-1 rounded-xl p-3 text-center', style: { background: 'var(--surface-container-low)' } },
                            e('div', { className: 'text-lg font-black', style: { color: 'var(--primary-fixed-dim)' } }, workoutHistory.length),
                            e('div', { className: 'text-xs', style: { color: 'var(--on-surface-variant)' } }, 'Workouts')
                        ),
                        e('div', { className: 'flex-1 rounded-xl p-3 text-center', style: { background: 'var(--surface-container-low)' } },
                            e('div', { className: 'text-lg font-black', style: { color: 'var(--primary-fixed-dim)' } },
                                (workoutHistory.reduce((sum, w) => sum + w.exercises.reduce((s, ex) => s + ex.sets.reduce((ss, set) => ss + set.reps * set.weight, 0), 0), 0) / 1000).toFixed(1) + 't'
                            ),
                            e('div', { className: 'text-xs', style: { color: 'var(--on-surface-variant)' } }, 'Lifted')
                        )
                    ),
                    // Sync status
                    e('div', { className: 'flex items-center gap-2 mb-5 px-1' },
                        e(MIcon, { icon: cloudEnabled() ? 'cloud_done' : 'cloud_off', style: { fontSize: '18px', color: cloudEnabled() ? 'var(--primary-fixed-dim)' : 'var(--outline)' } }),
                        e('span', { className: 'text-sm', style: { color: 'var(--on-surface-variant)' } },
                            cloudEnabled() ? 'Cloud sync active' : 'Offline \u2022 Local storage only'
                        )
                    ),
                    // Logout button
                    e('button', {
                        onClick: doLogout,
                        className: 'w-full py-3 rounded-xl font-bold text-base transition-all active:scale-95',
                        style: { background: 'var(--surface-container-low)', color: 'var(--error)' }
                    }, 'Log Out')
                )
            ) : null;

            // ======================
            // EDIT VIEW
            // ======================
            if (view === 'edit') {
                return e('div', {
                    className: 'min-h-screen flex flex-col',
                    style: { background: 'var(--void)', color: 'var(--on-surface)' }
                },
                    e(TopAppBar, {
                        title: editingDay ? editingDay.toUpperCase() : 'EDIT',
                        leftAction: e('button', {
                            onClick: () => { setView('landing'); setEditingWorkout(null); setEditingDay(null); },
                            className: 'flex items-center gap-1 transition-opacity active:opacity-60',
                            style: { color: 'var(--on-surface-variant)' }
                        }, e(ArrowLeft, { size: 20 }), e('span', { className: 'text-sm' }, 'Back')),
                        rightAction: e('button', {
                            onClick: saveWorkout,
                            className: 'px-4 py-2 rounded-xl text-sm font-bold transition-opacity active:opacity-80',
                            style: { background: 'linear-gradient(45deg, #d1fc00, #c4ec00)', color: 'var(--on-primary-container)' },
                            disabled: !editingWorkout?.name || !editingWorkout?.exercises.every(ex => ex.name)
                        }, 'Save')
                    }),
                    e('div', { className: 'flex-1 pt-20 px-4 pb-28 overflow-y-auto' },
                        e('div', { className: 'max-w-4xl mx-auto' },
                            // Workout name
                            e('div', { className: 'mb-6' },
                                e('label', { className: 'block mb-2 text-xs uppercase tracking-widest', style: { color: 'var(--on-surface-variant)' } }, 'Workout Name'),
                                e('input', {
                                    type: 'text',
                                    value: editingWorkout?.name || '',
                                    onChange: (ev) => setEditingWorkout({ ...editingWorkout, name: ev.target.value }),
                                    className: 'w-full p-3 rounded-xl outline-none text-lg font-bold',
                                    style: { background: 'var(--surface-container-low)', color: 'var(--on-surface)', border: 'none', caretColor: 'var(--primary-container)' },
                                    placeholder: 'e.g., Push Day'
                                })
                            ),
                            // Exercises
                            editingWorkout?.exercises.map((exercise, exIdx) =>
                                e('div', { key: exIdx, className: 'mb-6 p-4 rounded-xl', style: { background: 'var(--surface-container-highest)' } },
                                    e('div', { className: 'flex items-center justify-between mb-4 gap-2' },
                                        e('input', {
                                            type: 'text', value: exercise.name,
                                            onChange: (ev) => updateExerciseName(exIdx, ev.target.value),
                                            onKeyDown: (ev) => { if (ev.key === 'Enter') ev.target.blur(); },
                                            className: 'flex-1 min-w-0 p-2 rounded-lg outline-none font-bold',
                                            style: { background: 'var(--surface-container-low)', color: 'var(--on-surface)', border: 'none', caretColor: 'var(--primary-container)' },
                                            placeholder: 'Exercise name'
                                        }),
                                        e('div', { className: 'flex items-center gap-1 flex-shrink-0' },
                                            e('button', {

                            // Delete whole workout (only for an already-saved day)
                            (editingDay && workouts[editingDay]) ? e('button', {
                                onClick: () => setConfirmState({
                                    title: 'Delete workout?',

                        )
                    ),
                    confirmState ? e(ConfirmDialog, { ...confirmState, onCancel: () => setConfirmState(null) }) : null,

                );
            }

            // ======================
            // WORKOUT IDLE VIEW (no active workout)
            // ======================
            if (view === 'workout-idle') {
                const todayName = DAYS[new Date().getDay() === 0 ? 6 : new Date().getDay() - 1];
                const todayWorkout = workouts[todayName];

                return e('div', {
                    className: 'min-h-screen flex flex-col',
                    style: { background: 'var(--void)', color: 'var(--on-surface)' }
                },
                    e(TopAppBar, { title: 'WORKOUT' }),
                    e('div', { className: 'flex-1 pt-20 pb-28 px-6 flex flex-col items-center justify-center' },
                        e(MIcon, { icon: 'fitness_center', style: { fontSize: '64px', color: 'var(--surface-container-highest)' } }),
                        e('h2', { className: 'text-2xl font-black mt-6 text-center' }, 'No Active Workout'),
                        e('p', { className: 'text-base mt-2 text-center', style: { color: 'var(--on-surface-variant)' } },
                            todayWorkout
                                ? `Today\u2019s workout is ready to go`
                                : `No workout scheduled for ${todayName}`
                        ),
                        todayWorkout ? e('div', { className: 'mt-8 flex flex-col items-center gap-3' },
                            e('button', {
                                onClick: () => startWorkout(todayName),
                                className: 'px-8 py-4 rounded-xl text-lg font-black transition-all active:scale-95',
                                style: { background: 'linear-gradient(45deg, #d1fc00, #c4ec00)', color: 'var(--on-primary-container)', boxShadow: '0 0 30px rgba(209, 252, 0, 0.2)' }
                            }, `Start ${todayName}\u2019s Workout`),
                            e('p', { className: 'text-base font-bold', style: { color: 'var(--primary-fixed-dim)' } }, todayWorkout.name)
                        ) : e('button', {
                            onClick: () => { setActiveTab('calendar'); setView('landing'); },
                            className: 'mt-8 px-6 py-3 rounded-xl text-sm font-bold transition-all active:scale-95',
                            style: { background: 'var(--surface-container-highest)', color: 'var(--primary-fixed-dim)' }
                        }, 'Go to Calendar')
                    ),
                    e(BottomNavBar, { activeTab: 'workout', onTabChange: handleTabChange })
                );
            }

            // ======================
            // STATS VIEW
            // ======================
            if (view === 'stats') {
                // Compute stats from history
                const totalWorkouts = workoutHistory.length;
                const totalWeightKg = workoutHistory.reduce((sum, w) => {
                    return sum + w.exercises.reduce((eSum, ex) => {
                        return eSum + ex.sets.reduce((sSum, s) => sSum + s.reps * s.weight, 0);
                    }, 0);
                }, 0);
                const totalWeightTonnes = (totalWeightKg / 1000).toFixed(1);
                const totalSets = workoutHistory.reduce((sum, w) => {
                    return sum + w.exercises.reduce((eSum, ex) => eSum + ex.sets.length, 0);
                }, 0);
                const totalReps = workoutHistory.reduce((sum, w) => {
                    return sum + w.exercises.reduce((eSum, ex) => eSum + ex.sets.reduce((sSum, s) => sSum + s.reps, 0), 0);
                }, 0);
                // Avg workout time (filter outliers: <40min or >90min)
                const validTimes = workoutHistory.map(w => w.totalTime).filter(t => t >= 2400 && t <= 5400);
                const avgTime = validTimes.length > 0 ? Math.round(validTimes.reduce((a, b) => a + b, 0) / validTimes.length) : 0;
                // Best single set weight
                let bestWeight = 0;
                let bestExName = '';
                workoutHistory.forEach(w => {
                    w.exercises.forEach(ex => {
                        ex.sets.forEach(s => {
                            if (s.weight > bestWeight) { bestWeight = s.weight; bestExName = ex.name; }
                        });
                    });
                });
                // Unique exercises
                const uniqueExercises = new Set();
                workoutHistory.forEach(w => w.exercises.forEach(ex => uniqueExercises.add(ex.name)));
                // Weekly frequency (last 4 weeks)
                const fourWeeksAgo = Date.now() - 28 * 24 * 60 * 60 * 1000;
                const recentWorkouts = workoutHistory.filter(w => w.date >= fourWeeksAgo);
                const weeklyAvg = recentWorkouts.length > 0 ? (recentWorkouts.length / 4).toFixed(1) : '0';

                // Last 10 workouts (newest first)
                const last10 = workoutHistory.slice().reverse().slice(0, 10);

                    className: 'rounded-xl p-4 flex flex-col items-center',
                    style: { background: 'var(--surface-container-highest)' }

                    e('div', { className: 'text-xl font-black', style: { color: 'var(--on-surface)' } }, value),
                    e('div', { className: 'text-xs uppercase tracking-widest mt-1 text-center', style: { color: 'var(--on-surface-variant)' } }, label)
                );

                    className: 'min-h-screen flex flex-col',

                                statCard('timer', avgTime > 0 ? formatTime(avgTime) : '--', 'Avg Time')

                            e('div', { className: 'grid grid-cols-3 gap-2 mb-6' },

                                statCard('speed', totalReps, 'Total Reps'),
                                statCard('calendar_month', weeklyAvg + '/wk', 'Frequency')

                                className: 'rounded-xl p-4 mb-6 flex items-center gap-4',
                                style: { background: 'var(--surface-container-highest)' }

                                e('div', {

                                )
                            ) : null,
                            // Workout History
                            last10.length > 0 ? e('div', null,
                                e('div', { className: 'text-xs uppercase tracking-widest mb-3 px-1', style: { color: 'var(--on-surface-variant)' } }, 'Recent Workouts'),
                                e('div', { className: 'space-y-2' },
                                    last10.map((w, dispIdx) => {
                                        const realIdx = workoutHistory.length - 1 - dispIdx;
                                        const isExpanded = expandedHistoryIdx === realIdx;
                                        const wDate = new Date(w.date);
                                        const dateStr = wDate.toLocaleDateString('en-GB', { day: 'numeric', month: 'short' });
                                        const totalWt = w.exercises.reduce((s, ex) => s + ex.sets.reduce((ss, set) => ss + set.reps * set.weight, 0), 0);

                                                },

                                                    e('div', { className: 'text-xs uppercase', style: { color: 'var(--on-surface-variant)' } }, dateStr.split(' ')[1])

                                                // Name + day
                                                e('div', { className: 'flex-1 min-w-0' },

                                                // Duration
                                                e('div', { className: 'text-sm font-bold flex-shrink-0', style: { color: 'var(--on-surface-variant)' } }, formatTime(w.totalTime)),
                                                // Score badge
                                                w.maxScore > 0 ? (() => {
                                                    const ratio = w.score / w.maxScore;
                                                    const level = Math.max(0, Math.min(4, Math.round(ratio * 5) - 1));
                                                    const colors = ['#45484c', '#737679', '#a9abaf', '#c4ec00', '#d1fc00'];
                                                    const bg = level >= 0 ? colors[Math.max(0, level)] : colors[0];
                                                    const fg = level >= 3 ? 'var(--void)' : 'var(--on-surface)';
                                                    return e('div', {

                                                            title: 'Delete from history?',

                                                    style: { background: 'var(--surface-container-low)', color: 'var(--error)' }
                                                }, 'Delete from History')
                                            ) : null
                                        );
                                    })
                                )
                            ) : null
                        )
                    ),
                    confirmState ? e(ConfirmDialog, { ...confirmState, onCancel: () => setConfirmState(null) }) : null,
                    e(BottomNavBar, { activeTab: 'stats', onTabChange: handleTabChange })
                );

            // ======================
            // LIVE WORKOUT VIEW
            // ======================
            if (view === 'live') {
                const currentExercise = liveWorkout.exercises[currentExerciseIndex];
                const currentSet = currentExercise.sets[currentSetIndex];
                const nextExName = getNextExerciseName();

                // Size the reps/weight boxes to actually fit the current screen.

                const boxSize = isCoverScreen

                    : Math.max(110, Math.min(168, Math.floor((viewport.w - 52) / 2)));
                const contentPadTop = 72;
                const contentPadBottom = isCoverScreen ? 52 : 112;

                // Partials control: replaces the old "type 0.1 reps" hack with a proper
                // half-rep stepper. Reps can hold decimals (e.g. 8.5 = 8 reps + 1 partial).
                const partialFrac = Math.round((currentSet.reps - Math.floor(currentSet.reps)) * 100) / 100;
                const setReps = (v) => updateLiveSet('reps', Math.max(0, Math.round(v * 100) / 100));
                const partialRow = e('div', { className: 'flex items-center justify-center gap-2 mt-2' },
                    e('button', {

                        className: 'w-9 h-9 rounded-full flex items-center justify-center text-lg font-black active:scale-90 flex-shrink-0',
                        style: { background: 'linear-gradient(45deg, #d1fc00, #c4ec00)', color: 'var(--void)' }
                    }, '+')
                );

                return e('div', {
                    className: 'h-full flex flex-col',

                        leftAction: e('span', {

                        rightAction: e('div', { className: 'flex items-center gap-2' },
                            e('span', { className: 'text-xs uppercase tracking-widest', style: { color: 'var(--on-surface-variant)' } }, 'Sets'),
                            e('span', { className: 'text-lg font-black', style: { color: 'var(--on-surface)' } }, getTotalSetsRemaining())
                        )
                    }),
                    // Main content
                    e('div', { className: 'flex-1 flex flex-col px-4', style: { paddingTop: contentPadTop, paddingBottom: contentPadBottom, minHeight: 0, overflowY: 'auto' } },

                        e('div', { className: 'flex items-center justify-between px-2 mb-1' },
                            e('div', { className: 'flex-1' },
                                e('div', { className: 'text-2xl font-black leading-tight' }, currentExercise.name),
                                e('div', { className: 'text-sm mt-0.5', style: { color: 'var(--on-surface-variant)' } }, `Set ${currentSetIndex + 1} of ${currentExercise.sets.length}`)
                            ),
                            // Progress dots
                            e('div', { className: 'flex gap-1.5 flex-wrap justify-end ml-3', style: { maxWidth: '45%' } },
                                liveWorkout.exercises.map((ex, i) =>
                                    e('div', { key: i, className: 'flex gap-1' },
                                        ex.sets.map((_, j) => {
                                            let bg;
                                            if (i < currentExerciseIndex || (i === currentExerciseIndex && j < currentSetIndex)) bg = 'var(--primary-container)';
                                            else if (i === currentExerciseIndex && j === currentSetIndex) bg = 'var(--secondary)';
                                            else bg = 'var(--surface-container-highest)';
                                            return e('div', { key: j, style: { width: 7, height: 7, borderRadius: '50%', background: bg } });
                                        })
                                    )
                                )
                            )
                        ),
                        // Timers row: day + total time | set time
                        e('div', { className: 'flex items-center justify-between px-2 mb-4 mt-2' },
                            e('div', { className: 'flex items-center gap-3' },
                                e('span', { className: 'text-xs uppercase tracking-widest font-bold', style: { color: 'var(--on-surface-variant)' } }, liveWorkout.day),
                                e('span', { className: 'text-sm font-bold', style: { color: 'var(--primary-fixed-dim)' } }, formatTime(totalElapsedTime))
                            ),
                            e('div', { className: 'flex items-center gap-2' },
                                e('span', { className: 'text-xs uppercase tracking-widest', style: { color: 'var(--on-surface-variant)' } }, 'Set'),
                                e('span', { className: 'text-sm font-bold', style: { color: 'var(--primary-fixed-dim)' } }, formatTime(currentSetTime))
                            )
                        ),
                        // Cover screen: arrows inline with counters
                        // Full screen: counters, notes, then arrows below
                        isCoverScreen ?

                                e('div', { className: 'flex items-center justify-center gap-2 mt-2' },
                                    e('button', {
                                        onClick: prevSet,
                                        disabled: !canGoPrev(),
                                        className: 'p-2 rounded-2xl transition-all active:scale-90 flex-shrink-0',
                                        style: {
                                            background: canGoPrev() ? 'var(--surface-container-highest)' : 'var(--surface-container-low)',
                                            color: canGoPrev() ? 'var(--on-surface)' : 'var(--outline-variant)',
                                            opacity: canGoPrev() ? 1 : 0.3
                                        }
                                    }, e(ArrowLeft, { size: 22 })),
                                    e(CustomNumberInput, { value: currentSet.reps, onChange: (val) => updateLiveSet('reps', val), label: 'Reps', step: 1, size: boxSize }),
                                    e(CustomNumberInput, { value: currentSet.weight, onChange: (val) => updateLiveSet('weight', val), label: 'Weight (kg)', step: 0.5, size: boxSize }),
                                    e('button', {
                                        onClick: nextSet,
                                        className: 'p-2 rounded-2xl transition-all active:scale-90 flex-shrink-0',
                                        style: { background: 'linear-gradient(45deg, #d1fc00, #c4ec00)', color: 'var(--void)' }

                                partialRow,

                            ) : e('div', null),
                            e('button', {
                                onClick: () => setConfirmState({
                                    title: 'Discard workout?',
