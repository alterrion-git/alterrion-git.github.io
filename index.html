<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="CWA">
    <meta name="theme-color" content="#0b0e11">
    <meta name="screen-orientation" content="portrait">
    <link rel="manifest" href="manifest.json">
    <title>CWA - Workout Tracker</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        
        html {
            height: 100%;
            height: 100dvh;
            overflow: hidden;
            position: fixed;
            width: 100%;
        }

        :root {
            --void: #0b0e11;
            --surface: #0b0e11;
            --surface-container-lowest: #000000;
            --surface-container-low: #101417;
            --surface-container: #161a1e;
            --surface-container-high: #1c2024;
            --surface-container-highest: #22262b;
            --surface-bright: #282d31;
            --surface-variant: #22262b;
            --primary: #f4ffc6;
            --primary-container: #d1fc00;
            --primary-dim: #c7ef00;
            --primary-fixed: #d1fc00;
            --primary-fixed-dim: #c4ec00;
            --on-primary: #546600;
            --on-primary-container: #4c5d00;
            --on-surface: #f8f9fe;
            --on-surface-variant: #a9abaf;
            --on-background: #f8f9fe;
            --outline: #737679;
            --outline-variant: #45484c;
            --secondary: #efe754;
            --secondary-container: #656100;
            --on-secondary-container: #fffac3;
            --tertiary: #ffeb9c;
            --error: #ff7351;
            --error-container: #b92902;
            --on-error-container: #ffd2c8;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--void);
            color: var(--on-surface);
            overflow-x: hidden;
            overflow-y: auto;
            position: fixed;
            width: 100%;
            height: 100vh;
            height: 100dvh;
            font-size: 22px;
            padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
            touch-action: manipulation;
        }
        
        #root {
            height: 100%;
            overflow-y: auto;
        }
        
        input[type="number"]::-webkit-outer-spin-button,
        input[type="number"]::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
        input[type="number"] {
            -moz-appearance: textfield;
            appearance: textfield;
        }

        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }

        /* Scroll wheel modal */
        .scroll-wheel-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.85);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10000;
        }
        
        .scroll-wheel-container {
            background: var(--surface-container-high);
            border-radius: 20px;
            padding: 20px;
            width: 300px;
            text-align: center;
        }
        
        .scroll-wheel {
            height: 200px;
            overflow-y: scroll;
            scroll-snap-type: y mandatory;
            -webkit-overflow-scrolling: touch;
        }
        
        .scroll-wheel-item {
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            scroll-snap-align: center;
            cursor: pointer;
            color: var(--on-surface-variant);
        }
        
        .scroll-wheel-item.active {
            font-size: 32px;
            font-weight: bold;
            color: var(--primary-container);
        }

        /* Kinetic gradient for primary CTAs */
        .kinetic-gradient {
            background: linear-gradient(45deg, #d1fc00, #c4ec00);
        }

        /* Ghost border utility */
        .ghost-border {
            border: 1px solid rgba(69, 72, 76, 0.15);
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        "void": "#0b0e11",
                        "surface": "#0b0e11",
                        "surface-container-lowest": "#000000",
                        "surface-container-low": "#101417",
                        "surface-container": "#161a1e",
                        "surface-container-high": "#1c2024",
                        "surface-container-highest": "#22262b",
                        "surface-bright": "#282d31",
                        "surface-variant": "#22262b",
                        "primary": "#f4ffc6",
                        "primary-container": "#d1fc00",
                        "primary-dim": "#c7ef00",
                        "primary-fixed": "#d1fc00",
                        "primary-fixed-dim": "#c4ec00",
                        "on-primary": "#546600",
                        "on-primary-container": "#4c5d00",
                        "on-surface": "#f8f9fe",
                        "on-surface-variant": "#a9abaf",
                        "on-background": "#f8f9fe",
                        "outline": "#737679",
                        "outline-variant": "#45484c",
                        "secondary": "#efe754",
                        "secondary-container": "#656100",
                        "on-secondary-container": "#fffac3",
                        "tertiary": "#ffeb9c",
                        "error": "#ff7351",
                        "error-container": "#b92902",
                        "on-error-container": "#ffd2c8",
                    },
                    fontFamily: {
                        "inter": ["Inter", "sans-serif"],
                    },
                },
            },
        }
    </script>
</head>
<body>
    <div id="root"></div>
    <script>
        // Register service worker for PWA
        const APP_VERSION = '3.0.0';
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register(`sw.js?v=${APP_VERSION}`).catch(() => {
                    console.log('Service worker registration failed');
                });
            });
        }
        
        window.addEventListener('load', () => {
            setTimeout(() => { window.scrollTo(0, 1); }, 100);
        });

        let lastWidth = window.innerWidth;
        let lastHeight = window.innerHeight;

        const handleScreenChange = () => {
            const currentWidth = window.innerWidth;
            const currentHeight = window.innerHeight;
            const widthDiff = Math.abs(currentWidth - lastWidth);
            const heightDiff = Math.abs(currentHeight - lastHeight);
            if (widthDiff > 100 || heightDiff > 100) {
                lastWidth = currentWidth;
                lastHeight = currentHeight;
                window.location.reload();
                return;
            }
            const viewport = document.querySelector('meta[name=viewport]');
            viewport.setAttribute('content', 'width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover');
            window.scrollTo(0, 0);
            lastWidth = currentWidth;
            lastHeight = currentHeight;
        };

        window.addEventListener('orientationchange', () => { setTimeout(handleScreenChange, 100); });
        let resizeTimeout;
        window.addEventListener('resize', () => {
            clearTimeout(resizeTimeout);
            resizeTimeout = setTimeout(handleScreenChange, 150);
        });

        if (window.screen && window.screen.orientation) {
            window.screen.orientation.addEventListener('change', () => { setTimeout(handleScreenChange, 100); });
        }

        // ============================================
        // FIREBASE CLOUD SYNC
        // ============================================
        // Paste your Firebase Realtime Database URL below before uploading.
        // Get it from: Firebase Console > Realtime Database > URL at the top.
        const FIREBASE_DB_URL = 'https://workout-app-423a6-default-rtdb.europe-west1.firebasedatabase.app'; // e.g. 'https://your-project-default-rtdb.europe-west1.firebasedatabase.app'

        const cloudEnabled = () => FIREBASE_DB_URL.length > 0;

        async function hashPassword(password) {
            const encoder = new TextEncoder();
            const data = encoder.encode(password + '_cwa_salt_2024');
            const hashBuffer = await crypto.subtle.digest('SHA-256', data);
            const hashArray = Array.from(new Uint8Array(hashBuffer));
            return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
        }

        async function cloudGet(path) {
            if (!cloudEnabled()) return null;
            try {
                const res = await fetch(`${FIREBASE_DB_URL}/${path}.json`);
                if (!res.ok) return null;
                return await res.json();
            } catch (err) { console.error('Cloud get error:', err); return null; }
        }

        async function cloudSet(path, data) {
            if (!cloudEnabled()) return false;
            try {
                const res = await fetch(`${FIREBASE_DB_URL}/${path}.json`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                return res.ok;
            } catch (err) { console.error('Cloud set error:', err); return false; }
        }

        const { useState, useEffect, useRef } = React;
        const e = React.createElement;

        const DAYS = ['Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday', 'Sunday'];

        // --- Icon Components (inline SVG) ---
        const Plus = ({ size = 24 }) => e('svg', { width: size, height: size, viewBox: '0 0 24 24', fill: 'none', stroke: 'currentColor', strokeWidth: 2 },
            e('line', { x1: 12, y1: 5, x2: 12, y2: 19 }),
            e('line', { x1: 5, y1: 12, x2: 19, y2: 12 })
        );

        const Settings = ({ size = 24 }) => e('svg', { width: size, height: size, viewBox: '0 0 24 24', fill: 'none', stroke: 'currentColor', strokeWidth: 2, strokeLinecap: 'round', strokeLinejoin: 'round' },
            e('path', { d: 'M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z' }),
            e('circle', { cx: 12, cy: 12, r: 3 })
        );

        const ArrowLeft = ({ size = 24 }) => e('svg', { width: size, height: size, viewBox: '0 0 24 24', fill: 'none', stroke: 'currentColor', strokeWidth: 2 },
            e('line', { x1: 19, y1: 12, x2: 5, y2: 12 }),
            e('polyline', { points: '12 19 5 12 12 5' })
        );

        const ArrowRight = ({ size = 24 }) => e('svg', { width: size, height: size, viewBox: '0 0 24 24', fill: 'none', stroke: 'currentColor', strokeWidth: 2 },
            e('line', { x1: 5, y1: 12, x2: 19, y2: 12 }),
            e('polyline', { points: '12 5 19 12 12 19' })
        );

        const Check = ({ size = 24 }) => e('svg', { width: size, height: size, viewBox: '0 0 24 24', fill: 'none', stroke: 'currentColor', strokeWidth: 2 },
            e('polyline', { points: '20 6 9 17 4 12' })
        );

        // Material icon helper
        const MIcon = ({ icon, fill = false, className = '', style = {} }) => e('span', {
            className: `material-symbols-outlined ${className}`,
            style: { fontVariationSettings: fill ? "'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24" : "'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24", ...style }
        }, icon);

        // Mini sparkline graph for exercise history
        function Sparkline({ data, width = 120, height = 32, color = '#c4ec00' }) {
            if (!data || data.length < 2) {
                return e('div', {
                    className: 'flex items-center justify-center text-xs',
                    style: { width, height, color: 'var(--outline)', opacity: 0.5 }
                }, 'No history');
            }
            const vals = data.map(d => d.maxWeight);
            const min = Math.min(...vals);
            const max = Math.max(...vals);
            const range = max - min || 1;
            const pad = 3;
            const gw = width - pad * 2;
            const gh = height - pad * 2;
            const points = vals.map((v, i) => {
                const x = pad + (i / (vals.length - 1)) * gw;
                const y = pad + gh - ((v - min) / range) * gh;
                return `${x},${y}`;
            });
            const isUp = vals[vals.length - 1] >= vals[0];
            const lineColor = isUp ? color : 'var(--error)';
            const fillPoints = `${pad},${pad + gh} ${points.join(' ')} ${pad + gw},${pad + gh}`;
            const repColor = '#00e5ff'; // bright cyan for rep increases
            return e('svg', { width, height, viewBox: `0 0 ${width} ${height}`, style: { display: 'block' } },
                e('polygon', { points: fillPoints, fill: lineColor, fillOpacity: 0.1 }),
                e('polyline', { points: points.join(' '), fill: 'none', stroke: lineColor, strokeWidth: 1.5, strokeLinecap: 'round', strokeLinejoin: 'round' }),
                vals.map((v, i) => {
                    const x = pad + (i / (vals.length - 1)) * gw;
                    const y = pad + gh - ((v - min) / range) * gh;
                    const isLast = i === vals.length - 1;
                    const repsUp = data[i] && data[i].repsUp;
                    const dotColor = repsUp ? repColor : (isLast ? lineColor : 'var(--surface-container-highest)');
                    const strokeC = repsUp ? repColor : lineColor;
                    const r = isLast ? 3 : (repsUp ? 3 : 2);
                    return e('circle', { key: i, cx: x, cy: y, r, fill: dotColor, stroke: strokeC, strokeWidth: repsUp ? 1.5 : 1 });
                })
            );
        }

        // --- TopAppBar ---
        function TopAppBar({ title, leftAction, rightAction }) {
            return e('header', {
                className: 'fixed top-0 left-0 w-full z-50 h-16 px-5 flex justify-between items-center',
                style: { background: 'var(--surface-container-low)' }
            },
                // Left: CWA branding or back button
                e('div', { className: 'flex items-center min-w-[60px]' },
                    leftAction || e('span', {
                        className: 'font-black italic text-xl tracking-tighter',
                        style: { color: 'var(--primary-container)' }
                    }, 'CWA')
                ),
                // Center: screen title
                e('h1', {
                    className: 'font-black uppercase tracking-tighter text-lg',
                    style: { color: 'var(--primary-container)' }
                }, title || ''),
                // Right: action buttons
                e('div', { className: 'flex items-center min-w-[60px] justify-end' },
                    rightAction || null
                )
            );
        }

        // --- BottomNavBar ---
        function BottomNavBar({ activeTab, onTabChange }) {
            const tabs = [
                { id: 'calendar', icon: 'calendar_today', label: 'Calendar' },
                { id: 'workout', icon: 'fitness_center', label: 'Workout' },
                { id: 'stats', icon: 'bar_chart', label: 'Stats' },
            ];

            // Detect narrow cover screen (flip phones: nearly square or landscape aspect)
            const [isCover, setIsCover] = useState(window.innerHeight < window.innerWidth * 1.2);
            useEffect(() => {
                const check = () => setIsCover(window.innerHeight < window.innerWidth * 1.2);
                window.addEventListener('resize', check);
                return () => window.removeEventListener('resize', check);
            }, []);

            return e('nav', {
                className: 'fixed bottom-0 left-0 z-50 flex items-end',
                style: {
                    background: 'rgba(16, 20, 23, 0.85)',
                    backdropFilter: 'blur(20px)',
                    WebkitBackdropFilter: 'blur(20px)',
                    paddingBottom: isCover ? '6px' : 'max(env(safe-area-inset-bottom), 12px)',
                    paddingTop: isCover ? '4px' : '12px',
                    borderTop: '1px solid rgba(69, 72, 76, 0.1)',
                    width: isCover ? '42%' : '100%',
                    paddingLeft: isCover ? '4px' : '32px',
                    paddingRight: isCover ? '4px' : '32px',
                    borderRadius: isCover ? '0 20px 0 0' : '0'
                }
            },
                tabs.map(tab => {
                    const isActive = activeTab === tab.id;
                    const btnSize = isCover ? '36px' : '52px';
                    const iconSize = isCover ? (isActive ? '20px' : '18px') : (isActive ? '28px' : '24px');
                    return e('div', {
                        key: tab.id,
                        className: 'flex-1 flex justify-center',
                        style: { height: isCover ? '40px' : '56px', alignItems: 'flex-start' }
                    },
                        e('button', {
                            onClick: () => onTabChange(tab.id),
                            className: 'flex items-center justify-center rounded-full transition-all duration-300 active:scale-90',
                            style: isActive ? {
                                width: btnSize,
                                height: btnSize,
                                background: 'linear-gradient(45deg, #d1fc00, #c4ec00)',
                                color: 'var(--void)',
                                boxShadow: '0 0 20px rgba(209, 252, 0, 0.3)',
                                transform: isCover ? 'translateY(-6px)' : 'translateY(-12px)'
                            } : {
                                width: btnSize,
                                height: btnSize,
                                background: 'transparent',
                                color: 'var(--outline)',
                                transform: 'translateY(0)'
                            }
                        }, e(MIcon, { icon: tab.icon, fill: isActive, style: { fontSize: iconSize } }))
                    );
                })
            );
        }

        // --- Workout Score Gauge (redesigned colors) ---
        function WorkoutScoreGauge({ score, maxScore }) {
            const scoreLevel = Math.round((score / maxScore) * 5);
            const clampedScore = Math.max(1, Math.min(5, scoreLevel));
            const percentage = clampedScore / 5;
            const fillAngle = 180 * percentage;
            
            const colors = [
                '#45484c', // outline-variant - 1/5
                '#737679', // outline - 2/5
                '#a9abaf', // on-surface-variant - 3/5
                '#c4ec00', // primary-fixed-dim - 4/5
                '#d1fc00'  // primary-container - 5/5
            ];
            
            return e('div', { className: 'flex flex-col items-center' },
                e('div', { className: 'text-sm mb-2', style: { color: 'var(--on-surface-variant)' } }, 'Workout Score'),
                e('div', { className: 'relative' },
                    e('svg', { width: 120, height: 70, viewBox: '0 0 120 70' },
                        e('defs', {},
                            e('linearGradient', { id: 'arcGradient', gradientUnits: 'userSpaceOnUse', x1: '10', y1: '60', x2: '110', y2: '60' },
                                e('stop', { offset: '0%', style: { stopColor: '#45484c', stopOpacity: 1 } }),
                                e('stop', { offset: '25%', style: { stopColor: '#737679', stopOpacity: 1 } }),
                                e('stop', { offset: '50%', style: { stopColor: '#a9abaf', stopOpacity: 1 } }),
                                e('stop', { offset: '75%', style: { stopColor: '#c4ec00', stopOpacity: 1 } }),
                                e('stop', { offset: '100%', style: { stopColor: '#d1fc00', stopOpacity: 1 } })
                            )
                        ),
                        (() => {
                            const startAngle = 180, endAngle = 360;
                            const startRad = (startAngle * Math.PI) / 180;
                            const endRad = (endAngle * Math.PI) / 180;
                            const radius = 50, cx = 60, cy = 60;
                            const x1 = cx + radius * Math.cos(startRad), y1 = cy + radius * Math.sin(startRad);
                            const x2 = cx + radius * Math.cos(endRad), y2 = cy + radius * Math.sin(endRad);
                            return e('path', { d: `M ${x1} ${y1} A ${radius} ${radius} 0 0 1 ${x2} ${y2}`, stroke: '#22262b', strokeWidth: 10, fill: 'none', strokeLinecap: 'round' });
                        })(),
                        (() => {
                            const startAngle = 180, endAngle = 180 + fillAngle;
                            const startRad = (startAngle * Math.PI) / 180;
                            const endRad = (endAngle * Math.PI) / 180;
                            const radius = 50, cx = 60, cy = 60;
                            const x1 = cx + radius * Math.cos(startRad), y1 = cy + radius * Math.sin(startRad);
                            const x2 = cx + radius * Math.cos(endRad), y2 = cy + radius * Math.sin(endRad);
                            const largeArcFlag = fillAngle > 180 ? 1 : 0;
                            return e('path', { d: `M ${x1} ${y1} A ${radius} ${radius} 0 ${largeArcFlag} 1 ${x2} ${y2}`, stroke: 'url(#arcGradient)', strokeWidth: 10, fill: 'none', strokeLinecap: 'round' });
                        })()
                    ),
                    e('div', { className: 'absolute bottom-0 left-1/2 transform -translate-x-1/2 text-center', style: { marginBottom: '-8px' } },
                        e('div', {
                            className: 'px-4 py-1 rounded-lg font-bold text-2xl',
                            style: { backgroundColor: colors[clampedScore - 1], color: clampedScore >= 4 ? 'var(--void)' : 'var(--on-surface)' }
                        }, `${clampedScore}/5`)
                    )
                )
            );
        }

        // --- Scroll Wheel ---
        function ScrollWheel({ value, onChange, onClose, label, step = 1, min = 0, max = 500 }) {
            const [items] = useState(() => {
                const arr = [];
                for (let i = min; i <= max; i += step) arr.push(i);
                return arr;
            });
            const wheelRef = useRef(null);
            const [selectedValue, setSelectedValue] = useState(value);

            useEffect(() => {
                if (wheelRef.current) {
                    const index = items.indexOf(value);
                    if (index !== -1) wheelRef.current.scrollTop = index * 50 - 75;
                }
            }, []);

            const handleScroll = () => {
                if (wheelRef.current) {
                    const scrollTop = wheelRef.current.scrollTop;
                    const index = Math.round((scrollTop + 75) / 50);
                    if (index >= 0 && index < items.length) setSelectedValue(items[index]);
                }
            };

            return e('div', { className: 'scroll-wheel-overlay', onClick: onClose },
                e('div', { className: 'scroll-wheel-container', onClick: (ev) => ev.stopPropagation() },
                    e('div', { className: 'text-xl mb-4' }, label),
                    e('div', { ref: wheelRef, className: 'scroll-wheel', onScroll: handleScroll },
                        e('div', { style: { height: '75px' } }),
                        items.map((item) =>
                            e('div', {
                                key: item,
                                className: `scroll-wheel-item ${item === selectedValue ? 'active' : ''}`,
                                onClick: () => { setSelectedValue(item); onChange(item); onClose(); }
                            }, step === 1 ? item : item.toFixed(1))
                        ),
                        e('div', { style: { height: '75px' } })
                    ),
                    e('div', { className: 'flex gap-4 mt-4' },
                        e('button', {
                            onClick: onClose,
                            className: 'flex-1 px-4 py-2 rounded-xl',
                            style: { background: 'var(--surface-container-highest)', color: 'var(--on-surface)' }
                        }, 'Cancel'),
                        e('button', {
                            onClick: () => { onChange(selectedValue); onClose(); },
                            className: 'flex-1 px-4 py-2 rounded-xl font-bold',
                            style: { background: 'linear-gradient(45deg, #d1fc00, #c4ec00)', color: 'var(--on-primary-container)' }
                        }, 'Set')
                    )
                )
            );
        }

        // --- Custom Number Input (rounded box design) ---
        function CustomNumberInput({ value, onChange, label, step = 1 }) {
            const [isLongPress, setIsLongPress] = useState(false);
            const [tempValue, setTempValue] = useState('');
            const longPressTimer = useRef(null);

            const handleTouchStart = () => { longPressTimer.current = setTimeout(() => { setIsLongPress(true); setTempValue(value.toString()); }, 500); };
            const handleTouchEnd = () => { if (longPressTimer.current) clearTimeout(longPressTimer.current); };

            const handleBubbleClick = (ev) => {
                ev.stopPropagation();
                const rect = ev.currentTarget.getBoundingClientRect();
                const y = ev.clientY - rect.top;
                if (y < rect.height / 2) onChange(value + step);
                else onChange(Math.max(0, value - step));
            };

            const handleManualBlur = () => {
                const num = parseFloat(tempValue);
                if (!isNaN(num)) onChange(num);
                else if (tempValue === '') onChange(0);
                setIsLongPress(false);
            };

            if (isLongPress) {
                return e('div', { className: 'text-center' },
                    e('div', { className: 'text-sm font-bold uppercase tracking-widest mb-2', style: { color: 'var(--on-surface-variant)' } }, label),
                    e('input', {
                        type: 'number', step, value: tempValue,
                        onChange: (ev) => setTempValue(ev.target.value),
                        onBlur: handleManualBlur,
                        onKeyDown: (ev) => { if (ev.key === 'Enter') ev.target.blur(); },
                        autoFocus: true,
                        className: 'w-48 h-48 text-5xl font-black text-center rounded-2xl outline-none',
                        style: { background: 'var(--surface-container-high)', border: '3px solid var(--primary-container)', color: 'var(--on-surface)', caretColor: 'var(--primary-container)' }
                    })
                );
            }

            return e('div', { className: 'text-center' },
                e('div', { className: 'text-sm font-bold uppercase tracking-widest mb-2', style: { color: 'var(--on-surface-variant)' } }, label),
                e('div', {
                    onClick: handleBubbleClick,
                    onTouchStart: handleTouchStart, onTouchEnd: handleTouchEnd,
                    onMouseDown: handleTouchStart, onMouseUp: handleTouchEnd,
                    className: 'w-48 h-48 text-5xl font-black text-center rounded-2xl outline-none flex flex-col items-center justify-center select-none cursor-pointer relative overflow-hidden',
                    style: { background: 'var(--surface-container-highest)', color: 'var(--on-surface)' }
                },
                    e('div', { className: 'absolute top-0 left-0 right-0 h-1/3 flex items-center justify-center', style: { paddingTop: '4px', fontSize: '20px', color: 'var(--primary-fixed-dim)', opacity: 0.6 } }, '\u25B2'),
                    e('div', { className: 'text-5xl font-black' }, value),
                    e('div', { className: 'absolute bottom-0 left-0 right-0 h-1/3 flex items-center justify-center', style: { paddingBottom: '4px', fontSize: '20px', color: 'var(--primary-fixed-dim)', opacity: 0.6 } }, '\u25BC')
                )
            );
        }

        // ============================================
        // MAIN APP
        // ============================================
        function WorkoutApp() {
            const [view, setView] = useState('login');
            const [workouts, setWorkouts] = useState({});
            const [editingDay, setEditingDay] = useState(null);
            const [editingWorkout, setEditingWorkout] = useState(null);
            const [liveWorkout, setLiveWorkout] = useState(null);
            const [currentExerciseIndex, setCurrentExerciseIndex] = useState(0);
            const [currentSetIndex, setCurrentSetIndex] = useState(0);
            const [workoutStartTime, setWorkoutStartTime] = useState(null);
            const [setStartTime, setSetStartTime] = useState(null);
            const [totalElapsedTime, setTotalElapsedTime] = useState(0);
            const [currentSetTime, setCurrentSetTime] = useState(0);
            const [completedSets, setCompletedSets] = useState([]);
            const [isLoading, setIsLoading] = useState(true);
            const [initialWorkoutSnapshot, setInitialWorkoutSnapshot] = useState(null);
            const [activeTab, setActiveTab] = useState('calendar');
            const [workoutHistory, setWorkoutHistory] = useState([]);
            // Auth state
            const [currentUser, setCurrentUser] = useState(null); // { username, createdAt }
            const [authError, setAuthError] = useState('');
            const [authLoading, setAuthLoading] = useState(false);
            const [showProfile, setShowProfile] = useState(false);
            const [loginUsername, setLoginUsername] = useState('');
            const [loginPassword, setLoginPassword] = useState('');
            const [pendingMigration, setPendingMigration] = useState(null); // old workout data to import

            // Check for old app data in localStorage
            const getOldAppData = () => {
                try {
                    const old = localStorage.getItem('workout-tracker-data');
                    if (old) {
                        const parsed = JSON.parse(old);
                        if (Object.keys(parsed).length > 0) return parsed;
                    }
                } catch (err) {}
                return null;
            };

            // --- Auth functions ---
            const doLogin = async () => {
                if (!loginUsername.trim() || !loginPassword.trim()) { setAuthError('Enter username and password'); return; }
                setAuthLoading(true);
                setAuthError('');
                const uname = loginUsername.trim().toLowerCase();
                const pHash = await hashPassword(loginPassword);
                if (cloudEnabled()) {
                    const userData = await cloudGet('users/' + uname);
                    if (!userData) { setAuthError('User not found. Register first.'); setAuthLoading(false); return; }
                    if (userData.passwordHash !== pHash) { setAuthError('Wrong password'); setAuthLoading(false); return; }
                    setCurrentUser({ username: uname, createdAt: userData.createdAt || Date.now() });
                    const loadedWorkouts = userData.workouts || {};
                    const loadedHistory = userData.history || [];
                    setWorkouts(loadedWorkouts);
                    setWorkoutHistory(loadedHistory);
                    localStorage.setItem('cwa-user', JSON.stringify({ username: uname, passwordHash: pHash }));
                    // Check for old data to migrate (only if account has no workouts)
                    if (Object.keys(loadedWorkouts).length === 0) {
                        const oldData = getOldAppData();
                        if (oldData) { setPendingMigration(oldData); setView('migrate'); setAuthLoading(false); return; }
                    }
                } else {
                    const localUser = localStorage.getItem('cwa-user-' + uname);
                    if (!localUser) { setAuthError('User not found. Register first.'); setAuthLoading(false); return; }
                    const parsed = JSON.parse(localUser);
                    if (parsed.passwordHash !== pHash) { setAuthError('Wrong password'); setAuthLoading(false); return; }
                    setCurrentUser({ username: uname, createdAt: parsed.createdAt || Date.now() });
                    const w = localStorage.getItem('cwa-workouts-' + uname);
                    const h = localStorage.getItem('cwa-history-' + uname);
                    if (w) setWorkouts(JSON.parse(w));
                    else {
                        const oldData = getOldAppData();
                        if (oldData) { setPendingMigration(oldData); setView('migrate'); setAuthLoading(false); localStorage.setItem('cwa-user', JSON.stringify({ username: uname, passwordHash: pHash })); return; }
                    }
                    if (h) setWorkoutHistory(JSON.parse(h));
                    localStorage.setItem('cwa-user', JSON.stringify({ username: uname, passwordHash: pHash }));
                }
                setView('landing');
                setIsLoading(false);
                setAuthLoading(false);
            };

            const doRegister = async () => {
                if (!loginUsername.trim() || !loginPassword.trim()) { setAuthError('Enter username and password'); return; }
                if (loginPassword.trim().length < 4) { setAuthError('Password must be at least 4 characters'); return; }
                setAuthLoading(true);
                setAuthError('');
                const uname = loginUsername.trim().toLowerCase();
                const pHash = await hashPassword(loginPassword);
                if (cloudEnabled()) {
                    const existing = await cloudGet('users/' + uname);
                    if (existing) { setAuthError('Username already taken'); setAuthLoading(false); return; }
                    const userData = { passwordHash: pHash, createdAt: Date.now(), workouts: {}, history: [] };
                    await cloudSet('users/' + uname, userData);
                    setCurrentUser({ username: uname, createdAt: userData.createdAt });
                    localStorage.setItem('cwa-user', JSON.stringify({ username: uname, passwordHash: pHash }));
                } else {
                    const localUser = localStorage.getItem('cwa-user-' + uname);
                    if (localUser) { setAuthError('Username already taken'); setAuthLoading(false); return; }
                    const userData = { passwordHash: pHash, createdAt: Date.now() };
                    localStorage.setItem('cwa-user-' + uname, JSON.stringify(userData));
                    setCurrentUser({ username: uname, createdAt: userData.createdAt });
                    localStorage.setItem('cwa-user', JSON.stringify({ username: uname, passwordHash: pHash }));
                }
                // Check for old data to migrate into the new account
                const oldData = getOldAppData();
                if (oldData) {
                    setPendingMigration(oldData);
                    setView('migrate');
                    setIsLoading(false);
                    setAuthLoading(false);
                    return;
                }
                setWorkouts({});
                setWorkoutHistory([]);
                setView('landing');
                setIsLoading(false);
                setAuthLoading(false);
            };

            const doMigrationImport = () => {
                if (pendingMigration) {
                    setWorkouts(pendingMigration);
                    setPendingMigration(null);
                }
                setView('landing');
            };

            const doMigrationSkip = () => {
                setPendingMigration(null);
                setView('landing');
            };

            const doLogout = () => {
                setCurrentUser(null);
                setWorkouts({});
                setWorkoutHistory([]);
                setView('login');
                setLoginUsername('');
                setLoginPassword('');
                setShowProfile(false);
                localStorage.removeItem('cwa-user');
            };

            const syncToCloud = async (w, h) => {
                if (!currentUser) return;
                const uname = currentUser.username;
                // Always save locally
                localStorage.setItem('cwa-workouts-' + uname, JSON.stringify(w));
                localStorage.setItem('cwa-history-' + uname, JSON.stringify(h));
                // Save to cloud if enabled
                if (cloudEnabled()) {
                    await cloudSet('users/' + uname + '/workouts', w);
                    await cloudSet('users/' + uname + '/history', h);
                }
            };

            // --- Tab switching logic ---
            const handleTabChange = (tabId) => {
                if (tabId === 'calendar') {
                    setActiveTab('calendar');
                    setView('landing');
                    // Don't reset edit state - just go back to calendar grid
                } else if (tabId === 'workout') {
                    setActiveTab('workout');
                    if (view === 'live' || view === 'complete') {
                        // Already in a workout flow, stay there
                    } else if (liveWorkout) {
                        setView('live');
                    } else {
                        setView('workout-idle');
                    }
                } else if (tabId === 'stats') {
                    setActiveTab('stats');
                    setView('stats');
                }
            };

            // --- Auto-login on mount ---
            useEffect(() => {
                const tryAutoLogin = async () => {
                    try {
                        const savedSession = localStorage.getItem('cwa-user');
                        if (savedSession) {
                            const { username, passwordHash } = JSON.parse(savedSession);
                            if (cloudEnabled()) {
                                const userData = await cloudGet('users/' + username);
                                if (userData && userData.passwordHash === passwordHash) {
                                    setCurrentUser({ username, createdAt: userData.createdAt || Date.now() });
                                    setWorkouts(userData.workouts || {});
                                    setWorkoutHistory(userData.history || []);
                                    setView('landing');
                                    setIsLoading(false);
                                    return;
                                }
                            }
                            // Fallback to local
                            const localUser = localStorage.getItem('cwa-user-' + username);
                            if (localUser) {
                                const parsed = JSON.parse(localUser);
                                if (parsed.passwordHash === passwordHash) {
                                    setCurrentUser({ username, createdAt: parsed.createdAt || Date.now() });
                                    const w = localStorage.getItem('cwa-workouts-' + username);
                                    const h = localStorage.getItem('cwa-history-' + username);
                                    if (w) setWorkouts(JSON.parse(w));
                                    if (h) setWorkoutHistory(JSON.parse(h));
                                    setView('landing');
                                    setIsLoading(false);
                                    return;
                                }
                            }
                        }
                    } catch (err) { console.log('Auto-login failed:', err); }
                    setIsLoading(false);
                };
                tryAutoLogin();
            }, []);

            // --- Sync on data change ---
            useEffect(() => {
                if (!isLoading && currentUser) {
                    syncToCloud(workouts, workoutHistory);
                }
            }, [workouts, workoutHistory]);

            const saveToHistory = (workout, elapsedTime) => {
                const entry = {
                    date: Date.now(),
                    day: workout.day,
                    name: workout.name,
                    totalTime: elapsedTime,
                    exercises: workout.exercises.map(ex => ({
                        name: ex.name,
                        sets: ex.sets.map(s => ({ reps: s.reps, weight: s.weight }))
                    }))
                };
                setWorkoutHistory(prev => [...prev, entry]);
            };

            const getExerciseHistory = (exerciseName) => {
                const entries = [];
                for (let i = workoutHistory.length - 1; i >= 0 && entries.length < 5; i--) {
                    const w = workoutHistory[i];
                    const ex = w.exercises.find(x => x.name === exerciseName);
                    if (ex) {
                        const maxWeight = Math.max(...ex.sets.map(s => s.weight));
                        const totalReps = ex.sets.reduce((sum, s) => sum + s.reps, 0);
                        const totalVol = ex.sets.reduce((sum, s) => sum + s.reps * s.weight, 0);
                        entries.unshift({ date: w.date, maxWeight, totalReps, totalVol, repsUp: false });
                    }
                }
                // Mark sessions where reps increased vs previous
                for (let i = 1; i < entries.length; i++) {
                    if (entries[i].totalReps > entries[i - 1].totalReps) {
                        entries[i].repsUp = true;
                    }
                }
                return entries;
            };

            // --- Timers ---
            useEffect(() => {
                let interval;
                if (workoutStartTime && view === 'live') {
                    interval = setInterval(() => { setTotalElapsedTime(Math.floor((Date.now() - workoutStartTime) / 1000)); }, 1000);
                }
                return () => clearInterval(interval);
            }, [workoutStartTime, view]);

            useEffect(() => {
                let interval;
                if (setStartTime && view === 'live') {
                    interval = setInterval(() => { setCurrentSetTime(Math.floor((Date.now() - setStartTime) / 1000)); }, 1000);
                }
                return () => clearInterval(interval);
            }, [setStartTime, view]);

            const formatTime = (seconds) => {
                const mins = Math.floor(seconds / 60);
                const secs = seconds % 60;
                return `${mins}:${secs.toString().padStart(2, '0')}`;
            };

            // --- Workout CRUD ---
            const startNewWorkout = () => {
                setEditingWorkout({ name: '', exercises: [{ name: '', notes: '', sets: [{ reps: 0, weight: 0 }, { reps: 0, weight: 0 }] }] });
                setView('edit');
            };

            const addExercise = () => {
                setEditingWorkout({ ...editingWorkout, exercises: [...editingWorkout.exercises, { name: '', notes: '', sets: [{ reps: 0, weight: 0 }, { reps: 0, weight: 0 }] }] });
            };

            const addSet = (exerciseIndex) => {
                const newExercises = [...editingWorkout.exercises];
                newExercises[exerciseIndex].sets.push({ reps: 0, weight: 0 });
                setEditingWorkout({ ...editingWorkout, exercises: newExercises });
            };

            const updateExerciseName = (exerciseIndex, name) => {
                const newExercises = [...editingWorkout.exercises];
                newExercises[exerciseIndex].name = name;
                setEditingWorkout({ ...editingWorkout, exercises: newExercises });
            };

            const updateExerciseNotes = (exerciseIndex, notes) => {
                const newExercises = [...editingWorkout.exercises];
                newExercises[exerciseIndex].notes = notes;
                setEditingWorkout({ ...editingWorkout, exercises: newExercises });
            };

            const updateSet = (exerciseIndex, setIndex, field, value) => {
                const newExercises = [...editingWorkout.exercises];
                const parsedValue = value === '' ? 0 : parseFloat(value);
                newExercises[exerciseIndex].sets[setIndex][field] = isNaN(parsedValue) ? 0 : parsedValue;
                setEditingWorkout({ ...editingWorkout, exercises: newExercises });
            };

            const removeSet = (exerciseIndex, setIndex) => {
                const newExercises = [...editingWorkout.exercises];
                if (newExercises[exerciseIndex].sets.length > 1) {
                    newExercises[exerciseIndex].sets.splice(setIndex, 1);
                    setEditingWorkout({ ...editingWorkout, exercises: newExercises });
                }
            };

            const removeExercise = (exerciseIndex) => {
                const newExercises = [...editingWorkout.exercises];
                if (newExercises.length > 1) {
                    newExercises.splice(exerciseIndex, 1);
                    setEditingWorkout({ ...editingWorkout, exercises: newExercises });
                }
            };

            const saveWorkout = () => {
                if (editingWorkout.name && editingWorkout.exercises.every(ex => ex.name)) {
                    const newWorkouts = { ...workouts };
                    newWorkouts[editingDay] = { ...editingWorkout, progress: null };
                    setWorkouts(newWorkouts);
                    setView('landing');
                    setEditingDay(null);
                    setEditingWorkout(null);
                }
            };

            const startWorkout = (day) => {
                const workout = workouts[day];
                const progress = workout.progress;
                if (!progress) setInitialWorkoutSnapshot(JSON.parse(JSON.stringify(workout)));
                if (progress) {
                    setCurrentExerciseIndex(progress.currentExerciseIndex);
                    setCurrentSetIndex(progress.currentSetIndex);
                    setWorkoutStartTime(progress.startTime);
                    setCompletedSets(progress.completedSets || []);
                    setSetStartTime(progress.setStartTime || Date.now());
                    if (progress.initialSnapshot) setInitialWorkoutSnapshot(progress.initialSnapshot);
                } else {
                    setCurrentExerciseIndex(0);
                    setCurrentSetIndex(0);
                    setWorkoutStartTime(Date.now());
                    setCompletedSets([]);
                    setSetStartTime(Date.now());
                }
                setLiveWorkout({ ...workout, day });
                setView('live');
                setActiveTab('workout');
            };

            const getTotalSetsRemaining = () => {
                if (!liveWorkout) return 0;
                let total = 0;
                for (let i = currentExerciseIndex; i < liveWorkout.exercises.length; i++) {
                    const exercise = liveWorkout.exercises[i];
                    total += i === currentExerciseIndex ? exercise.sets.length - currentSetIndex : exercise.sets.length;
                }
                return total;
            };

            const updateLiveSet = (field, value) => {
                const newWorkout = { ...liveWorkout };
                newWorkout.exercises[currentExerciseIndex].sets[currentSetIndex][field] = parseFloat(value) || 0;
                setLiveWorkout(newWorkout);
            };

            const nextSet = () => {
                const setTime = currentSetTime;
                const newCompletedSets = [...completedSets, setTime];
                setCompletedSets(newCompletedSets);

                const updatedWorkouts = { ...workouts };
                updatedWorkouts[liveWorkout.day] = {
                    ...liveWorkout,
                    progress: { currentExerciseIndex, currentSetIndex: currentSetIndex + 1, startTime: workoutStartTime, setStartTime: Date.now(), completedSets: newCompletedSets, initialSnapshot: initialWorkoutSnapshot }
                };

                const currentExercise = liveWorkout.exercises[currentExerciseIndex];

                if (currentSetIndex + 1 < currentExercise.sets.length) {
                    setCurrentSetIndex(currentSetIndex + 1);
                    setSetStartTime(Date.now());
                    setCurrentSetTime(0);
                    updatedWorkouts[liveWorkout.day].progress.currentSetIndex = currentSetIndex + 1;
                    updatedWorkouts[liveWorkout.day].progress.setStartTime = Date.now();
                } else if (currentExerciseIndex + 1 < liveWorkout.exercises.length) {
                    setCurrentExerciseIndex(currentExerciseIndex + 1);
                    setCurrentSetIndex(0);
                    setSetStartTime(Date.now());
                    setCurrentSetTime(0);
                    updatedWorkouts[liveWorkout.day].progress.currentExerciseIndex = currentExerciseIndex + 1;
                    updatedWorkouts[liveWorkout.day].progress.currentSetIndex = 0;
                    updatedWorkouts[liveWorkout.day].progress.setStartTime = Date.now();
                } else {
                    updatedWorkouts[liveWorkout.day].progress = null;
                    setWorkouts(updatedWorkouts);
                    saveToHistory(liveWorkout, Math.floor((Date.now() - workoutStartTime) / 1000));
                    setView('complete');
                    return;
                }
                setWorkouts(updatedWorkouts);
            };

            const prevSet = () => {
                if (currentSetIndex > 0) {
                    setCurrentSetIndex(currentSetIndex - 1);
                    setSetStartTime(Date.now());
                    setCurrentSetTime(0);
                    // Remove last completed set time
                    if (completedSets.length > 0) {
                        setCompletedSets(completedSets.slice(0, -1));
                    }
                } else if (currentExerciseIndex > 0) {
                    const prevExercise = liveWorkout.exercises[currentExerciseIndex - 1];
                    setCurrentExerciseIndex(currentExerciseIndex - 1);
                    setCurrentSetIndex(prevExercise.sets.length - 1);
                    setSetStartTime(Date.now());
                    setCurrentSetTime(0);
                    if (completedSets.length > 0) {
                        setCompletedSets(completedSets.slice(0, -1));
                    }
                }
                // else: already at very first set, do nothing
            };

            const canGoPrev = () => {
                return currentSetIndex > 0 || currentExerciseIndex > 0;
            };

            const getNextExerciseName = () => {
                if (!liveWorkout) return '';
                const currentExercise = liveWorkout.exercises[currentExerciseIndex];
                const isLastSetOfExercise = currentSetIndex >= currentExercise.sets.length - 1;
                const isLastExercise = currentExerciseIndex >= liveWorkout.exercises.length - 1;
                if (isLastSetOfExercise && isLastExercise) return 'Finish';
                if (isLastSetOfExercise && !isLastExercise) return liveWorkout.exercises[currentExerciseIndex + 1].name;
                return null; // still more sets in current exercise
            };

            const finishWorkout = () => {
                setView('landing');
                setActiveTab('calendar');
                setLiveWorkout(null);
                setCurrentExerciseIndex(0);
                setCurrentSetIndex(0);
                setWorkoutStartTime(null);
                setSetStartTime(null);
                setTotalElapsedTime(0);
                setCurrentSetTime(0);
                setCompletedSets([]);
                setInitialWorkoutSnapshot(null);
            };

            const calculateWorkoutSummary = () => {
                if (!initialWorkoutSnapshot || !liveWorkout) return { summary: [], totalScore: 0, maxScore: 0 };
                const summary = [];
                let totalScore = 0;
                liveWorkout.exercises.forEach((exercise, exIdx) => {
                    const initialExercise = initialWorkoutSnapshot.exercises[exIdx];
                    if (!initialExercise) return;
                    let totalRepsIncrease = 0, maxWeightIncrease = 0, hasChanges = false, points = 0;
                    exercise.sets.forEach((set, setIdx) => {
                        const initialSet = initialExercise.sets[setIdx];
                        if (!initialSet) return;
                        const repsDiff = set.reps - initialSet.reps;
                        const weightDiff = set.weight - initialSet.weight;
                        if (repsDiff > 0) { totalRepsIncrease += repsDiff; hasChanges = true; }
                        if (weightDiff > maxWeightIncrease) { maxWeightIncrease = weightDiff; if (weightDiff > 0) hasChanges = true; }
                    });
                    if (maxWeightIncrease > 0) points = 2;
                    else if (totalRepsIncrease >= 2) points = 2;
                    else if (totalRepsIncrease === 1) points = 1;
                    totalScore += points;
                    let changeText = 'No change';
                    if (totalRepsIncrease > 0 && maxWeightIncrease > 0) changeText = `Increased reps by ${totalRepsIncrease} and weight by ${maxWeightIncrease}kg`;
                    else if (totalRepsIncrease > 0) changeText = `Increased reps by ${totalRepsIncrease}`;
                    else if (maxWeightIncrease > 0) changeText = `Increased weight by ${maxWeightIncrease}kg`;
                    summary.push({ name: exercise.name, change: changeText, hasChanges, points });
                });
                return { summary, totalScore, maxScore: liveWorkout.exercises.length * 2 };
            };

            // ======================
            // LOADING
            // ======================
            if (isLoading) {
                return e('div', {
                    className: 'min-h-screen flex items-center justify-center',
                    style: { background: 'var(--void)', color: 'var(--on-surface)' }
                }, e('div', { className: 'text-xl font-bold', style: { color: 'var(--primary-container)' } }, 'Loading...'));
            }

            // ======================
            // LOGIN VIEW
            // ======================
            if (view === 'login') {
                return e('div', {
                    className: 'h-full flex flex-col items-center justify-center px-6',
                    style: { background: 'var(--void)', color: 'var(--on-surface)', overflow: 'hidden' }
                },
                    // Logo
                    e('div', { className: 'mb-6 text-center' },
                        e('span', { className: 'font-black italic text-4xl tracking-tighter', style: { color: 'var(--primary-container)' } }, 'CWA'),
                        e('div', { className: 'text-xs uppercase tracking-widest mt-1', style: { color: 'var(--on-surface-variant)' } }, 'Workout Tracker')
                    ),
                    // Login card
                    e('div', {
                        className: 'w-full max-w-sm rounded-2xl p-5',
                        style: { background: 'var(--surface-container-highest)' }
                    },
                        e('div', { className: 'mb-4' },
                            e('label', { className: 'block text-xs uppercase tracking-widest mb-1.5', style: { color: 'var(--on-surface-variant)' } }, 'Username'),
                            e('input', {
                                type: 'text',
                                value: loginUsername,
                                onChange: (ev) => { setLoginUsername(ev.target.value); setAuthError(''); },
                                onKeyDown: (ev) => { if (ev.key === 'Enter') doLogin(); },
                                className: 'w-full p-3 rounded-xl outline-none text-lg font-bold',
                                style: { background: 'var(--surface-container-low)', color: 'var(--on-surface)', border: 'none', caretColor: 'var(--primary-container)' },
                                placeholder: 'Enter username',
                                autoCapitalize: 'none',
                                autoCorrect: 'off'
                            })
                        ),
                        e('div', { className: 'mb-4' },
                            e('label', { className: 'block text-xs uppercase tracking-widest mb-1.5', style: { color: 'var(--on-surface-variant)' } }, 'Password'),
                            e('input', {
                                type: 'password',
