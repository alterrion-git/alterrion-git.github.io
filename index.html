                                    onConfirm: () => { cancelWorkout(); setConfirmState(null); }
                                }),
                                className: 'flex items-center gap-1 px-3 py-1.5 rounded-xl text-xs font-bold transition-opacity active:opacity-70 flex-shrink-0',
                                style: { background: 'var(--surface-container-high)', color: 'var(--on-surface-variant)' }
                            }, e(MIcon, { icon: 'close', style: { fontSize: '16px' } }), 'End')
                        )
                    ),
                    confirmState ? e(ConfirmDialog, { ...confirmState, onCancel: () => setConfirmState(null) }) : null,
                    e(BottomNavBar, { activeTab: 'workout', onTabChange: handleTabChange })
                );
            }

            // ======================
            // COMPLETE VIEW
            // ======================
            if (view === 'complete') {
                const { summary: workoutSummary, totalScore, maxScore } = calculateWorkoutSummary();
                const scoreLevel = maxScore > 0 ? Math.round((totalScore / maxScore) * 5) : 0;
                const clampedScore = Math.max(0, Math.min(5, scoreLevel));

                // Battery cell colors - progressive fill
                const cellColors = [
                    '#45484c', // 1 - dim
                    '#737679', // 2 - outline
                    '#a9abaf', // 3 - on-surface-variant
                    '#c4ec00', // 4 - primary-fixed-dim
                    '#d1fc00', // 5 - primary-container
                ];

                return e('div', {
                    className: 'min-h-screen flex flex-col',
                    style: { background: 'var(--void)', color: 'var(--on-surface)' }
                },
                    e(TopAppBar, {
                        title: 'WORKOUT COMPLETE',
                        rightAction: e('button', {
                            onClick: finishWorkout,
                            className: 'px-4 py-2 rounded-xl text-sm font-bold transition-opacity active:opacity-80',
                            style: { background: 'linear-gradient(45deg, #d1fc00, #c4ec00)', color: 'var(--on-primary-container)' }
                        }, 'Home')
                    }),
                    e('div', { className: 'flex-1 flex flex-col items-center pt-20 px-5 pb-28 overflow-y-auto' },
                        // Hero card
                        e('div', {
                            className: 'w-full max-w-lg rounded-2xl p-6 mt-4',
                            style: { background: 'var(--surface-container-highest)' }
                        },
                            // Trophy + title row
                            e('div', { className: 'flex items-center gap-4 mb-5' },
                                e('div', {
                                    className: 'w-16 h-16 rounded-2xl flex items-center justify-center flex-shrink-0',
                                    style: { background: 'rgba(209, 252, 0, 0.1)' }
                                },
                                    e(MIcon, { icon: 'emoji_events', fill: true, style: { fontSize: '36px', color: 'var(--primary-container)' } })
                                ),
                                e('div', null,
                                    e('div', { className: 'text-2xl font-black leading-tight' }, 'Great Work!'),
                                    e('div', { className: 'text-sm mt-0.5', style: { color: 'var(--on-surface-variant)' } },
                                        liveWorkout ? `${liveWorkout.name} \u2022 ${liveWorkout.day}` : 'Workout finished'
                                    )
                                )
                            ),
                            // Stats row
                            e('div', { className: 'flex gap-3 mb-5' },
                                // Time box
                                e('div', {
                                    className: 'flex-1 rounded-xl p-3 flex flex-col items-center',
                                    style: { background: 'var(--surface-container-low)' }
                                },
                                    e(MIcon, { icon: 'timer', style: { fontSize: '20px', color: 'var(--primary-fixed-dim)', marginBottom: '4px' } }),
                                    e('div', { className: 'text-xl font-black', style: { color: 'var(--primary-fixed-dim)' } }, formatTime(totalElapsedTime)),
                                    e('div', { className: 'text-xs uppercase tracking-widest mt-0.5', style: { color: 'var(--on-surface-variant)' } }, 'Duration')
                                ),
                                // Sets box
                                e('div', {
                                    className: 'flex-1 rounded-xl p-3 flex flex-col items-center',
                                    style: { background: 'var(--surface-container-low)' }
                                },
                                    e(MIcon, { icon: 'repeat', style: { fontSize: '20px', color: 'var(--primary-fixed-dim)', marginBottom: '4px' } }),
                                    e('div', { className: 'text-xl font-black', style: { color: 'var(--primary-fixed-dim)' } }, completedSets.length),
                                    e('div', { className: 'text-xs uppercase tracking-widest mt-0.5', style: { color: 'var(--on-surface-variant)' } }, 'Sets Done')
                                ),
                                // Score box
                                e('div', {
                                    className: 'flex-1 rounded-xl p-3 flex flex-col items-center',
                                    style: { background: 'var(--surface-container-low)' }
                                },
                                    e(MIcon, { icon: 'trending_up', style: { fontSize: '20px', color: 'var(--primary-fixed-dim)', marginBottom: '4px' } }),
                                    e('div', { className: 'text-xl font-black', style: { color: 'var(--primary-fixed-dim)' } }, `${totalScore}/${maxScore}`),
                                    e('div', { className: 'text-xs uppercase tracking-widest mt-0.5', style: { color: 'var(--on-surface-variant)' } }, 'Points')
                                )
                            ),
                            // Battery score bar
                            e('div', null,
                                e('div', { className: 'text-xs uppercase tracking-widest mb-2', style: { color: 'var(--on-surface-variant)' } }, 'Workout Score'),
                                e('div', { className: 'flex gap-1.5' },
                                    [0, 1, 2, 3, 4].map(i =>
                                        e('div', {
                                            key: i,
                                            className: 'flex-1 h-10 rounded-lg transition-all duration-500',
                                            style: {
                                                background: i < clampedScore ? cellColors[i] : 'var(--surface-container-low)',
                                                boxShadow: i < clampedScore && i >= 3 ? `0 0 12px ${cellColors[i]}40` : 'none'
                                            }
                                        })
                                    )
                                ),
                                e('div', { className: 'flex justify-between mt-1.5' },
                                    e('span', { className: 'text-xs', style: { color: 'var(--outline)' } }, 'Maintain'),
                                    e('span', { className: 'text-xs font-bold', style: { color: clampedScore >= 4 ? 'var(--primary-container)' : 'var(--outline)' } }, 'Progress')
                                )
                            )
                        ),
                        // Exercise Summary
                        e('div', { className: 'w-full max-w-lg mt-6' },
                            e('div', { className: 'text-xs uppercase tracking-widest mb-3 px-1', style: { color: 'var(--on-surface-variant)' } }, 'Exercise Breakdown'),
                            e('div', { className: 'space-y-2' },
                                workoutSummary.map((item, idx) => {
                                    const hist = getExerciseHistory(item.name);
                                    return e('div', {
                                        key: idx,
                                        className: 'p-4 rounded-xl',
                                        style: { background: 'var(--surface-container-high)' }
                                    },
                                        // Top row: points + name + change
                                        e('div', { className: 'flex items-center gap-3' },
                                            e('div', {
                                                className: 'w-10 h-10 rounded-xl flex items-center justify-center flex-shrink-0 text-sm font-black',
                                                style: {
                                                    background: item.points === 2 ? 'var(--primary-container)' : item.points === 1 ? 'var(--primary-fixed-dim)' : 'var(--surface-container-lowest)',
                                                    color: item.points >= 1 ? 'var(--void)' : 'var(--on-surface-variant)'
                                                }
                                            }, `+${item.points}`),
                                            e('div', { className: 'flex-1 min-w-0' },
                                                e('div', { className: 'font-bold text-base truncate' }, item.name),
                                                e('div', {
                                                    className: 'text-sm truncate',
                                                    style: { color: item.hasChanges ? 'var(--primary-fixed-dim)' : 'var(--on-surface-variant)' }
                                                }, item.change)
                                            )
                                        ),
                                        // Sparkline row (if history exists)
                                        hist.length >= 2 ? e('div', {
                                            className: 'mt-3 rounded-lg px-3 py-2 flex items-center justify-between',
                                            style: { background: 'var(--surface-container-lowest)' }
                                        },
                                            e('div', { className: 'text-xs', style: { color: 'var(--on-surface-variant)' } },
                                                `${hist.length} sessions \u2022 ${hist[hist.length - 1].maxWeight}kg`
                                            ),
                                            e(Sparkline, { data: hist, width: 100, height: 28 })
                                        ) : null
                                    );
                                })
                            )
                        )
                    ),
                    e(BottomNavBar, { activeTab: 'workout', onTabChange: handleTabChange })
                );
            }

            // ======================
            // MONTH CALENDAR VIEW (per-day logging hub)
            // ======================
            if (view === 'calendarMonth') {
                const monthNamesFull = ['January', 'February', 'March', 'April', 'May', 'June', 'July', 'August', 'September', 'October', 'November', 'December'];
                const cursor = new Date(calCursor);
                const year = cursor.getFullYear();
                const month = cursor.getMonth();
                const todayKey = dayKey(Date.now());

                // Presence sets for indicator dots.
                const metricDays = new Set(metrics.map(m => dayKey(m.date)));
                const photoDays = new Set(photos.map(p => dayKey(p.date)));
                const workoutDays = new Set(workoutHistory.map(w => dayKey(w.date)));

                // Build a Monday-first 6-week grid.
                const firstOfMonth = new Date(year, month, 1);
                const leading = (firstOfMonth.getDay() + 6) % 7; // 0 = Monday
                const daysInMonth = new Date(year, month + 1, 0).getDate();
                const cells = [];
                for (let i = 0; i < leading; i++) cells.push(null);
                for (let d = 1; d <= daysInMonth; d++) cells.push(new Date(year, month, d, 12, 0, 0, 0));
                while (cells.length % 7 !== 0) cells.push(null);

                const shiftMonth = (delta) => { const d = new Date(year, month + delta, 1); d.setHours(0, 0, 0, 0); setCalCursor(d.getTime()); };
                const goToday = () => { const d = new Date(); d.setDate(1); d.setHours(0, 0, 0, 0); setCalCursor(d.getTime()); };

                const dot = (color) => e('div', { style: { width: 5, height: 5, borderRadius: '50%', background: color } });
                const navBtn = (icon, onClick, lbl) => e('button', {
                    onClick, 'aria-label': lbl,
                    className: 'w-9 h-9 rounded-full flex items-center justify-center active:scale-90 flex-shrink-0',
                    style: { background: 'var(--surface-container-highest)', color: 'var(--on-surface)' }
                }, e(MIcon, { icon, style: { fontSize: '20px' } }));

                // ---- Day detail sheet ----
                const daySheet = selectedDay != null ? (() => {
                    const d = new Date(selectedDay);
                    const dk = dayKey(selectedDay);
                    const existing = metrics.find(m => dayKey(m.date) === dk) || null;
                    const dayPhotos = photos.filter(p => dayKey(p.date) === dk);
                    const dayWorkouts = workoutHistory.filter(w => dayKey(w.date) === dk);
                    const fixed = `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
                    return e('div', { className: 'fixed inset-0 z-[160] flex flex-col', style: { background: 'var(--void)' } },
                        e(TopAppBar, {
                            title: d.toLocaleDateString('en-GB', { weekday: 'short', day: 'numeric', month: 'short' }).toUpperCase(),
                            leftAction: e('button', {
                                onClick: () => setSelectedDay(null),
                                className: 'flex items-center gap-1 active:opacity-60', style: { color: 'var(--on-surface-variant)' }
                            }, e(MIcon, { icon: 'close', style: { fontSize: '22px' } }))
                        }),
                        e('div', { className: 'flex-1 overflow-y-auto pt-20 px-4 pb-8', style: { color: 'var(--on-surface)' } },
                            e('div', { className: 'max-w-lg mx-auto space-y-5' },
                                dayWorkouts.length ? e('div', null,
                                    e('div', { className: 'text-xs uppercase tracking-widest mb-2', style: { color: 'var(--on-surface-variant)' } }, 'Workouts'),
                                    e('div', { className: 'space-y-1.5' }, dayWorkouts.map((w, i) => e('div', { key: i, className: 'rounded-xl px-3 py-2 flex items-center gap-2', style: { background: 'var(--surface-container-high)' } },
                                        e(MIcon, { icon: 'fitness_center', style: { fontSize: '18px', color: 'var(--primary-fixed-dim)' } }),
                                        e('span', { className: 'text-sm font-bold' }, w.name),
                                        e('span', { className: 'text-xs ml-auto', style: { color: 'var(--on-surface-variant)' } }, formatTime(w.totalTime))
                                    )))
                                ) : null,
                                e('div', null,
                                    e('div', { className: 'text-xs uppercase tracking-widest mb-2', style: { color: 'var(--on-surface-variant)' } }, existing ? 'Edit Metrics' : 'Add Metrics'),
                                    e(MetricForm, { key: dk, fixedDate: fixed, initial: existing, onSave: (entry) => { saveMetric(entry); setToast('Saved'); } })
                                ),
                                e('div', null,
                                    e('div', { className: 'flex items-center justify-between mb-2' },
                                        e('div', { className: 'text-xs uppercase tracking-widest', style: { color: 'var(--on-surface-variant)' } }, 'Photos'),
                                        e('label', { className: 'flex items-center gap-1 px-3 py-1.5 rounded-lg text-xs font-bold cursor-pointer active:scale-95', style: { background: 'var(--surface-container-highest)', color: 'var(--primary-fixed-dim)' } },
                                            e(MIcon, { icon: 'add_a_photo', style: { fontSize: '16px' } }), 'Add',
                                            e('input', { type: 'file', accept: 'image/*', className: 'hidden', onChange: (ev) => { const f = ev.target.files && ev.target.files[0]; if (f) addPhotoFromFile(f, selectedDay); ev.target.value = ''; } })
                                        )
                                    ),
                                    dayPhotos.length ? e('div', { className: 'grid grid-cols-3 gap-2' }, dayPhotos.map(p => e('div', { key: p.id, className: 'relative rounded-xl overflow-hidden', style: { aspectRatio: '3/4', background: 'var(--surface-container-high)' } },
                                        e('img', { src: p.data, className: 'w-full h-full object-cover', style: { display: 'block' } }),
                                        e('button', { onClick: () => setConfirmState({ title: 'Delete photo?', message: 'This photo will be removed from this device.', confirmLabel: 'Delete', onConfirm: () => { removePhoto(p.id); setConfirmState(null); } }), className: 'absolute top-1 right-1 w-7 h-7 rounded-full flex items-center justify-center', style: { background: 'rgba(0,0,0,0.55)', color: '#fff' } }, e(MIcon, { icon: 'close', style: { fontSize: '15px' } }))
                                    ))) : e('div', { className: 'text-sm', style: { color: 'var(--outline)' } }, 'No photos for this day.')
                                )
                            )
                        ),
                        confirmState ? e(ConfirmDialog, { ...confirmState, onCancel: () => setConfirmState(null) }) : null
                    );
                })() : null;

                // ---- Month picker overlay ----
                const pickerOverlay = monthPicker ? e('div', { className: 'fixed inset-0 z-[160] flex items-center justify-center px-6', onClick: () => setMonthPicker(false) },
                    e('div', { className: 'absolute inset-0', style: { background: 'rgba(0,0,0,0.7)' } }),
                    e('div', { className: 'relative z-10 w-full max-w-xs rounded-2xl p-4', style: { background: 'var(--surface-container-highest)' }, onClick: (ev) => ev.stopPropagation() },
                        e('div', { className: 'flex items-center justify-between mb-4' },
                            navBtn('chevron_left', () => setCalCursor(new Date(year - 1, month, 1).getTime()), 'Previous year'),
                            e('div', { className: 'text-xl font-black' }, year),
                            navBtn('chevron_right', () => setCalCursor(new Date(year + 1, month, 1).getTime()), 'Next year')
                        ),
                        e('div', { className: 'grid grid-cols-3 gap-2' }, monthNamesFull.map((mn, mi) => e('button', {
                            key: mi,
                            onClick: () => { setCalCursor(new Date(year, mi, 1).getTime()); setMonthPicker(false); },
                            className: 'py-2.5 rounded-xl text-sm font-bold active:scale-95',
                            style: mi === month ? { background: 'linear-gradient(45deg, #d1fc00, #c4ec00)', color: 'var(--on-primary-container)' } : { background: 'var(--surface-container-low)', color: 'var(--on-surface-variant)' }
                        }, mn.slice(0, 3))))
                    )
                ) : null;

                return e('div', { className: 'min-h-screen flex flex-col', style: { background: 'var(--void)', color: 'var(--on-surface)' } },
                    e(TopAppBar, {
                        title: 'CALENDAR',
                        rightAction: e('button', { onClick: goToday, className: 'px-3 py-1.5 rounded-lg text-xs font-bold active:scale-95', style: { background: 'var(--surface-container-highest)', color: 'var(--primary-fixed-dim)' } }, 'Today')
                    }),
                    e('div', { className: 'flex-1 pt-20 px-3 pb-28 overflow-y-auto' },
                        e('div', { className: 'max-w-lg mx-auto' },
                            // Month header
                            e('div', { className: 'flex items-center justify-between mb-4 px-1' },
                                navBtn('chevron_left', () => shiftMonth(-1), 'Previous month'),
                                e('button', { onClick: () => setMonthPicker(true), className: 'flex items-center gap-1 active:opacity-70' },
                                    e('span', { className: 'text-2xl font-black' }, `${monthNamesFull[month]} ${year}`),
                                    e(MIcon, { icon: 'arrow_drop_down', style: { fontSize: '24px', color: 'var(--on-surface-variant)' } })
                                ),
                                navBtn('chevron_right', () => shiftMonth(1), 'Next month')
                            ),
                            // Weekday header
                            e('div', { className: 'grid grid-cols-7 gap-1 mb-1' },
                                ['M', 'T', 'W', 'T', 'F', 'S', 'S'].map((wd, i) => e('div', { key: i, className: 'text-center text-xs font-bold py-1', style: { color: 'var(--on-surface-variant)' } }, wd))
                            ),
                            // Day grid
                            e('div', { className: 'grid grid-cols-7 gap-1' },
                                cells.map((cell, idx) => {
                                    if (!cell) return e('div', { key: idx });
                                    const ck = dayKey(cell.getTime());
                                    const isToday = ck === todayKey;
                                    const isFuture = cell.getTime() > Date.now();
                                    const has = [];
                                    if (metricDays.has(ck)) has.push(dot('var(--primary-container)'));
                                    if (photoDays.has(ck)) has.push(dot('#00e5ff'));
                                    if (workoutDays.has(ck)) has.push(dot('var(--secondary)'));
                                    return e('button', {
                                        key: idx,
                                        onClick: () => { setSelectedDay(new Date(cell.getFullYear(), cell.getMonth(), cell.getDate(), 12, 0, 0, 0).getTime()); },
                                        className: 'rounded-xl flex flex-col items-center justify-start pt-1.5 active:scale-95 transition-transform',
                                        style: {
                                            minHeight: 52,
                                            background: isToday ? 'rgba(209,252,0,0.14)' : 'var(--surface-container-low)',
                                            border: isToday ? '1px solid var(--primary-container)' : '1px solid transparent',
                                            opacity: isFuture ? 0.45 : 1
                                        }
                                    },
                                        e('span', { className: 'text-sm font-bold', style: { color: isToday ? 'var(--primary-container)' : 'var(--on-surface)' } }, cell.getDate()),
                                        e('div', { className: 'flex gap-0.5 mt-1 h-1.5 items-center' }, has)
                                    );
                                })
                            ),
                            // Legend
                            e('div', { className: 'flex items-center justify-center gap-4 mt-4 text-xs', style: { color: 'var(--on-surface-variant)' } },
                                e('div', { className: 'flex items-center gap-1.5' }, dot('var(--primary-container)'), 'Metrics'),
                                e('div', { className: 'flex items-center gap-1.5' }, dot('#00e5ff'), 'Photo'),
                                e('div', { className: 'flex items-center gap-1.5' }, dot('var(--secondary)'), 'Workout')
                            ),
                            e('div', { className: 'text-xs text-center mt-3 px-2', style: { color: 'var(--outline)' } }, 'Tap any day to log weight, calories, sleep and photos. Anything logged here is automatically included in your AI recaps.')
                        )
                    ),
                    pickerOverlay,
                    daySheet,
                    toast ? e('div', { className: 'fixed left-1/2 -translate-x-1/2 z-[170] px-4 py-2 rounded-xl text-sm font-bold', style: { bottom: 'max(env(safe-area-inset-bottom), 80px)', background: 'var(--primary-container)', color: 'var(--on-primary-container)', boxShadow: '0 4px 20px rgba(0,0,0,0.4)' } }, toast) : null,
                    e(BottomNavBar, { activeTab: 'month', onTabChange: handleTabChange })
                );
            }

            // ======================
            // PROGRESS VIEW (hub: goals / metrics / photos / recaps / settings)
            // ======================
            if (view === 'progress') {
                const card = { background: 'var(--surface-container-highest)' };
                const sectionTitle = (t) => e('div', { className: 'text-xs uppercase tracking-widest mb-3 px-1', style: { color: 'var(--on-surface-variant)' } }, t);
                const backToHub = () => setProgressSub('hub');
                const toastEl = toast ? e('div', {
                    className: 'fixed left-1/2 -translate-x-1/2 z-[150] px-4 py-2 rounded-xl text-sm font-bold',
                    style: { bottom: 'max(env(safe-area-inset-bottom), 80px)', background: 'var(--primary-container)', color: 'var(--on-primary-container)', boxShadow: '0 4px 20px rgba(0,0,0,0.4)' }
                }, toast) : null;

                const topBar = (title, withBack) => e(TopAppBar, {
                    title,
                    leftAction: withBack ? e('button', {
                        onClick: backToHub,
                        className: 'flex items-center gap-1 transition-opacity active:opacity-60',
                        style: { color: 'var(--on-surface-variant)' }
                    }, e(ArrowLeft, { size: 20 }), e('span', { className: 'text-sm' }, 'Back')) : null
                });

                const shell = (title, withBack, children) => e('div', {
                    className: 'min-h-screen flex flex-col', style: { background: 'var(--void)', color: 'var(--on-surface)' }
                },
                    topBar(title, withBack),
                    e('div', { className: 'flex-1 pt-20 px-4 pb-28 overflow-y-auto' },
                        e('div', { className: 'max-w-lg mx-auto' }, children)
                    ),
                    toastEl,
                    e(BottomNavBar, { activeTab: 'progress', onTabChange: handleTabChange })
                );

                const numField = (label, value, onChange, ph, suffix) => e('div', null,
                    e('div', { className: 'text-xs uppercase tracking-widest mb-1', style: { color: 'var(--on-surface-variant)' } }, label),
                    e('div', { className: 'flex items-center gap-2' },
                        e('input', {
                            type: 'number', inputMode: 'decimal', value: value == null ? '' : value,
                            onChange: (ev) => onChange(ev.target.value === '' ? null : parseFloat(ev.target.value)),
                            placeholder: ph,
                            className: 'w-full p-2.5 rounded-lg outline-none text-base',
                            style: { background: 'var(--surface-container-low)', color: 'var(--on-surface)', border: 'none', caretColor: 'var(--primary-container)' }
                        }),
                        suffix ? e('span', { className: 'text-sm flex-shrink-0', style: { color: 'var(--on-surface-variant)' } }, suffix) : null
                    )
                );

                // ---- GOALS ----
                if (progressSub === 'goals') {
                    const goals = ['bulk', 'cut', 'maintain', 'recomp'];
                    return shell('GOALS', true,
                        e('div', { className: 'space-y-5' },
                            e('div', null,
                                e('div', { className: 'text-xs uppercase tracking-widest mb-2', style: { color: 'var(--on-surface-variant)' } }, 'Current Goal'),
                                e('div', { className: 'grid grid-cols-4 gap-2' },
                                    goals.map(g => e('button', {
                                        key: g,
                                        onClick: () => updateProfileField('goal', profile.goal === g ? '' : g),
                                        className: 'py-2.5 rounded-xl text-sm font-bold capitalize transition-all active:scale-95',
                                        style: profile.goal === g
                                            ? { background: 'linear-gradient(45deg, #d1fc00, #c4ec00)', color: 'var(--on-primary-container)' }
                                            : { background: 'var(--surface-container-highest)', color: 'var(--on-surface-variant)' }
                                    }, g))
                                )
                            ),
                            e('div', null,
                                e('div', { className: 'text-xs uppercase tracking-widest mb-1', style: { color: 'var(--on-surface-variant)' } }, 'Training Split / Plan'),
                                e('input', {
                                    type: 'text', value: profile.split || '',
                                    onChange: (ev) => updateProfileField('split', ev.target.value),
                                    placeholder: 'e.g., Push / Pull / Legs',
                                    className: 'w-full p-2.5 rounded-lg outline-none text-base',
                                    style: { background: 'var(--surface-container-low)', color: 'var(--on-surface)', border: 'none', caretColor: 'var(--primary-container)' }
                                })
                            ),
                            e('div', { className: 'grid grid-cols-2 gap-3' },
                                numField('Target Weight', profile.targetWeight, (v) => updateProfileField('targetWeight', v), '75', 'kg'),
                                numField('Target Body Fat', profile.targetBodyFat, (v) => updateProfileField('targetBodyFat', v), '12', '%'),
                                numField('Daily Calories', profile.dailyKcal, (v) => updateProfileField('dailyKcal', v), '2800', 'kcal'),
                                numField('Height', profile.heightCm, (v) => updateProfileField('heightCm', v), '180', 'cm')
                            ),
                            e('div', { className: 'text-xs leading-snug px-1', style: { color: 'var(--outline)' } },
                                'These goals are saved automatically and given to the AI as context for your recaps.')
                        )
                    );
                }

                // ---- DAILY METRICS ----
                if (progressSub === 'metrics') {
                    const recent = metrics.slice().sort((a, b) => b.date - a.date).slice(0, 30);
                    return shell('DAILY LOG', true,
                        e('div', null,
                            e(MetricForm, { onSave: (entry) => { saveMetric(entry); setToast('Saved'); } }),
                            recent.length > 0 ? e('div', { className: 'mt-6' },
                                sectionTitle('Recent Entries'),
                                e('div', { className: 'space-y-2' },
                                    recent.map((m) => {
                                        const d = new Date(m.date);
                                        const bits = [
                                            m.weight != null ? `${fmtNum(m.weight)}kg` : null,
                                            m.kcal != null ? `${fmtNum(m.kcal)}kcal` : null,
                                            m.sleep != null ? `${fmtNum(m.sleep)}h` : null,
                                            m.steps != null ? `${fmtNum(m.steps)} steps` : null,
                                        ].filter(Boolean).join(' · ');
                                        return e('div', { key: m.date, className: 'rounded-xl p-3 flex items-center gap-3', style: card },
                                            e('div', { className: 'w-12 text-center flex-shrink-0' },
                                                e('div', { className: 'text-sm font-black', style: { color: 'var(--primary-fixed-dim)' } }, d.getDate()),
                                                e('div', { className: 'text-xs uppercase', style: { color: 'var(--on-surface-variant)' } }, d.toLocaleDateString('en-GB', { month: 'short' }))
                                            ),
                                            e('div', { className: 'flex-1 min-w-0' },
                                                e('div', { className: 'text-sm font-bold truncate' }, bits || '—'),
                                                m.note ? e('div', { className: 'text-xs truncate', style: { color: 'var(--on-surface-variant)' } }, m.note) : null
                                            ),
                                            e('button', {
                                                onClick: () => setConfirmState({ title: 'Delete entry?', message: `Metrics for ${d.toLocaleDateString('en-GB')} will be removed.`, confirmLabel: 'Delete', onConfirm: () => { deleteMetric(m.date); setConfirmState(null); } }),
                                                className: 'p-2 rounded-lg flex-shrink-0', style: { background: 'var(--surface-container-low)', color: 'var(--on-surface-variant)' }
                                            }, e(MIcon, { icon: 'delete', style: { fontSize: '18px' } }))
                                        );
                                    })
                                )
                            ) : e('div', { className: 'mt-6 text-center text-sm', style: { color: 'var(--outline)' } }, 'No entries yet.')
                        ),
                        confirmState ? e(ConfirmDialog, { ...confirmState, onCancel: () => setConfirmState(null) }) : null
                    );
                }

                // ---- PHOTOS ----
                if (progressSub === 'photos') {
                    const byWeek = {};
                    photos.forEach(p => { (byWeek[p.week] = byWeek[p.week] || []).push(p); });
                    const weeks = Object.keys(byWeek).sort().reverse();
                    return shell('PROGRESS PHOTOS', true,
                        e('div', null,
                            e('label', {
                                className: 'w-full mb-5 py-3 rounded-xl flex items-center justify-center gap-2 font-black text-base cursor-pointer transition-all active:scale-95',
                                style: { background: 'linear-gradient(45deg, #d1fc00, #c4ec00)', color: 'var(--on-primary-container)' }
                            },
                                e(MIcon, { icon: 'add_a_photo', style: { fontSize: '22px' } }), 'Add Photo',
                                e('input', {
                                    type: 'file', accept: 'image/*', className: 'hidden',
                                    onChange: (ev) => { const f = ev.target.files && ev.target.files[0]; if (f) addPhotoFromFile(f); ev.target.value = ''; }
                                })
                            ),
                            weeks.length === 0 ? e('div', { className: 'text-center text-sm mt-8', style: { color: 'var(--outline)' } }, 'No photos yet. Add a weekly progress pic to start tracking visual change.')
                                : weeks.map(wk => e('div', { key: wk, className: 'mb-6' },
                                    sectionTitle(wk.replace('-W', ' · Week ')),
                                    e('div', { className: 'grid grid-cols-3 gap-2' },
                                        byWeek[wk].map(p => e('div', { key: p.id, className: 'relative rounded-xl overflow-hidden', style: { aspectRatio: '3/4', background: 'var(--surface-container-high)' } },
                                            e('img', { src: p.data, className: 'w-full h-full object-cover', style: { display: 'block' } }),
                                            e('button', {
                                                onClick: () => setConfirmState({ title: 'Delete photo?', message: 'This progress photo will be permanently removed from this device.', confirmLabel: 'Delete', onConfirm: () => { removePhoto(p.id); setConfirmState(null); } }),
                                                className: 'absolute top-1 right-1 w-7 h-7 rounded-full flex items-center justify-center', style: { background: 'rgba(0,0,0,0.55)', color: '#fff' }
                                            }, e(MIcon, { icon: 'close', style: { fontSize: '16px' } })),
                                            e('div', { className: 'absolute bottom-0 left-0 right-0 px-1.5 py-0.5 text-[10px]', style: { background: 'rgba(0,0,0,0.5)', color: '#fff' } }, new Date(p.date).toLocaleDateString('en-GB', { day: 'numeric', month: 'short' }))
                                        ))
                                    )
                                )),
                            e('div', { className: 'text-xs leading-snug px-1 mt-2', style: { color: 'var(--outline)' } },
                                'Photos stay on this device only. They are sent to the AI just for the moment a recap is generated.'),
                            confirmState ? e(ConfirmDialog, { ...confirmState, onCancel: () => setConfirmState(null) }) : null
                        )
                    );
                }

                // ---- AI RECAPS ----
                if (progressSub === 'recaps') {
                    const weeklyGate = canGenerate('weekly');
                    const monthlyGate = canGenerate('monthly');
                    const list = recaps.slice().sort((a, b) => b.date - a.date);
                    const genBtn = (type, gate) => e('button', {
                        onClick: () => generateRecap(type),
                        disabled: aiBusy || !gate.ok,
                        className: 'flex-1 py-3 rounded-xl font-black text-sm transition-all active:scale-95',
                        style: (gate.ok && !aiBusy)
                            ? { background: 'linear-gradient(45deg, #d1fc00, #c4ec00)', color: 'var(--on-primary-container)' }
                            : { background: 'var(--surface-container-highest)', color: 'var(--outline)' }
                    }, aiBusy ? 'Thinking…' : (type === 'weekly' ? 'Weekly Recap' : 'Monthly Recap'));
                    return shell('AI RECAPS', true,
                        e('div', null,
                            e('div', { className: 'flex gap-3 mb-2' }, genBtn('weekly', weeklyGate), genBtn('monthly', monthlyGate)),
                            e('div', { className: 'flex gap-3 mb-3' },
                                e('div', { className: 'flex-1 text-xs leading-snug px-1', style: { color: weeklyGate.ok ? 'var(--primary-fixed-dim)' : 'var(--outline)' } }, weeklyGate.ok ? 'Ready' : weeklyGate.reason),
                                e('div', { className: 'flex-1 text-xs leading-snug px-1', style: { color: monthlyGate.ok ? 'var(--primary-fixed-dim)' : 'var(--outline)' } }, monthlyGate.ok ? 'Ready' : monthlyGate.reason)
                            ),
                            aiError ? e('div', { className: 'text-sm mb-3 px-1', style: { color: 'var(--error)' } }, aiError) : null,
                            list.length === 0 ? e('div', { className: 'text-center text-sm mt-8', style: { color: 'var(--outline)' } }, 'No recaps yet. Generate one once you have a couple of weeks of data.')
                                : e('div', { className: 'space-y-3 mt-2' },
                                    list.map((r, i) => e('div', { key: r.date + '-' + i, className: 'rounded-xl p-4', style: card },
                                        e('div', { className: 'flex items-center justify-between mb-2' },
                                            e('span', { className: 'text-xs uppercase tracking-widest font-bold', style: { color: 'var(--primary-fixed-dim)' } }, `${r.type} · ${r.periodKey}`),
                                            e('span', { className: 'text-xs', style: { color: 'var(--on-surface-variant)' } }, new Date(r.date).toLocaleDateString('en-GB', { day: 'numeric', month: 'short' }))
                                        ),
                                        e('div', { className: 'text-sm leading-relaxed', style: { color: 'var(--on-surface)', whiteSpace: 'pre-wrap' } }, r.text)
                                    ))
                                )
                        )
                    );
                }

                // ---- SETTINGS ----
                if (progressSub === 'settings') {
                    return shell('SETTINGS', true,
                        e('div', { className: 'space-y-5' },
                            e('div', null,
                                sectionTitle('OpenAI API Key'),
                                e(ApiKeyForm, { onChanged: () => setToast('Key updated') })
                            ),
                            e('div', null,
                                sectionTitle('Account'),
                                e('div', { className: 'rounded-2xl p-4 flex items-center gap-2', style: card },
                                    e(MIcon, { icon: cloudEnabled() ? 'cloud_done' : 'cloud_off', style: { fontSize: '20px', color: cloudEnabled() ? 'var(--primary-fixed-dim)' : 'var(--outline)' } }),
                                    e('span', { className: 'text-sm', style: { color: 'var(--on-surface-variant)' } }, cloudEnabled() ? 'Cloud sync active' : 'Offline · local only')
                                )
                            )
                        )
                    );
                }

                // ---- HUB ----
                const latestWeight = metrics.filter(m => m.weight != null).sort((a, b) => b.date - a.date)[0];
                const hubCard = (icon, title, sub, target) => e('button', {
                    onClick: () => setProgressSub(target),
                    className: 'rounded-2xl p-4 flex flex-col items-start text-left transition-all active:scale-95',
                    style: card
                },
                    e('div', { className: 'w-10 h-10 rounded-xl flex items-center justify-center mb-2', style: { background: 'rgba(209, 252, 0, 0.1)' } },
                        e(MIcon, { icon, style: { fontSize: '22px', color: 'var(--primary-container)' } })),
                    e('div', { className: 'font-black text-base' }, title),
                    e('div', { className: 'text-xs mt-0.5', style: { color: 'var(--on-surface-variant)' } }, sub)
                );
                return shell('PROGRESS', false,
                    e('div', null,
                        // Snapshot
                        e('div', { className: 'grid grid-cols-3 gap-2 mb-5' },
                            e('div', { className: 'rounded-xl p-3 text-center', style: card },
                                e('div', { className: 'text-lg font-black', style: { color: 'var(--primary-fixed-dim)' } }, distinctWeeks()),
                                e('div', { className: 'text-xs', style: { color: 'var(--on-surface-variant)' } }, 'Weeks data')),
                            e('div', { className: 'rounded-xl p-3 text-center', style: card },
                                e('div', { className: 'text-lg font-black', style: { color: 'var(--primary-fixed-dim)' } }, latestWeight ? fmtNum(latestWeight.weight) : '—'),
                                e('div', { className: 'text-xs', style: { color: 'var(--on-surface-variant)' } }, 'Weight kg')),
                            e('div', { className: 'rounded-xl p-3 text-center', style: card },
                                e('div', { className: 'text-lg font-black', style: { color: 'var(--primary-fixed-dim)' } }, profile.goal ? profile.goal[0].toUpperCase() + profile.goal.slice(1) : '—'),
                                e('div', { className: 'text-xs', style: { color: 'var(--on-surface-variant)' } }, 'Goal'))
                        ),
                        e('div', { className: 'grid grid-cols-2 gap-3' },
                            hubCard('flag', 'Goals', 'Bulk/cut, targets', 'goals'),
                            hubCard('monitor_weight', 'Daily Log', 'Weight, kcal, sleep', 'metrics'),
                            hubCard('photo_camera', 'Photos', `${photos.length} saved`, 'photos'),
                            hubCard('auto_awesome', 'AI Recaps', 'Weekly & monthly', 'recaps'),
                            hubCard('key', 'Settings', 'OpenAI key', 'settings')
                        )
                    )
                );
            }

            // ======================
            // LANDING / CALENDAR VIEW
            // ======================
            const today = DAYS[new Date().getDay() === 0 ? 6 : new Date().getDay() - 1];
            const currentDate = new Date();

            const getDateForDay = (dayName) => {
                const todayIndex = DAYS.indexOf(today);
                const targetIndex = DAYS.indexOf(dayName);
                const dayDiff = targetIndex - todayIndex;
                const targetDate = new Date(currentDate);
                targetDate.setDate(currentDate.getDate() + dayDiff);
                const day = targetDate.getDate().toString().padStart(2, '0');
                const month = (targetDate.getMonth() + 1).toString().padStart(2, '0');
                return `${day}/${month}`;
            };

            // Get week number
            const getWeekNumber = (d) => {
                const date = new Date(d);
                date.setHours(0, 0, 0, 0);
                date.setDate(date.getDate() + 3 - (date.getDay() + 6) % 7);
                const week1 = new Date(date.getFullYear(), 0, 4);
                return 1 + Math.round(((date - week1) / 86400000 - 3 + (week1.getDay() + 6) % 7) / 7);
            };

            const monthNames = ['January', 'February', 'March', 'April', 'May', 'June', 'July', 'August', 'September', 'October', 'November', 'December'];

            return e('div', {
                className: 'min-h-screen flex flex-col',
                style: { background: 'var(--void)', color: 'var(--on-surface)' }
            },
                profileModal,
                e(TopAppBar, {
                    title: 'PLAN',
                    rightAction: e('button', {
                        onClick: () => setShowProfile(true),
                        className: 'w-9 h-9 rounded-xl flex items-center justify-center transition-all active:scale-90',
                        style: { background: 'rgba(209, 252, 0, 0.1)' }
                    }, e(MIcon, { icon: 'person', fill: true, style: { fontSize: '20px', color: 'var(--primary-container)' } }))
                }),
                e('main', { className: 'flex-1 pt-20 px-4 pb-28' },
                    // Date header
                    e('div', { className: 'mb-6' },
                        e('p', {
                            className: 'text-xs uppercase tracking-widest',
                            style: { color: 'var(--on-surface-variant)' }
                        }, `${monthNames[currentDate.getMonth()]} ${currentDate.getFullYear()}`),
                        e('h2', { className: 'text-4xl font-black leading-none mt-1' }, `WEEK ${getWeekNumber(currentDate)}`)
                    ),
                    // Weekly grid
                    e('div', { className: 'grid grid-cols-2 gap-4 max-w-6xl mx-auto' },
                        DAYS.map((day) => {
                            const workout = workouts[day];
                            const isToday = day === today;
                            const hasProgress = workout?.progress;

                            // TODAY card - highlighted with primary-container
                            if (isToday && workout) {
                                return e('div', {
                                    key: day,
                                    className: 'rounded-xl p-5 flex flex-col justify-between min-h-[160px] relative overflow-hidden',
                                    style: {
                                        background: 'var(--primary-container)',
                                        boxShadow: '0 0 30px rgba(209, 252, 0, 0.15)'
                                    }
                                },
                                    e('div', {
                                        className: 'absolute top-2 right-2 px-2 py-0.5 rounded text-xs font-bold',
                                        style: { background: 'rgba(76, 93, 0, 0.2)', color: 'var(--on-primary-container)' }
                                    }, getDateForDay(day)),
                                    e('div', null,
                                        e('span', {
                                            className: 'text-xs uppercase tracking-widest font-bold',
                                            style: { color: 'var(--on-primary-container)' }
                                        }, `${day} \u2022 Today`),
                                        e('h3', {
                                            className: 'font-black text-xl mt-1 leading-tight',
                                            style: { color: 'var(--on-primary-container)' }
                                        }, workout.name)
                                    ),
                                    e('div', { className: 'flex items-center gap-2 justify-end mt-4' },
                                        e('button', {
                                            key: 'start',
                                            onClick: () => startWorkout(day),
                                            className: 'px-4 py-2 rounded-xl text-sm font-bold transition-all active:scale-95',
                                            style: { background: 'var(--on-primary-container)', color: 'var(--primary-container)' }
                                        }, hasProgress ? 'Continue' : 'Start'),
                                        e('button', {
                                            key: 'settings',
                                            onClick: () => { setEditingDay(day); setEditingWorkout(workout); setView('edit'); },
                                            className: 'p-2 rounded-xl transition-all active:scale-95',
                                            style: { background: 'rgba(76, 93, 0, 0.15)', color: 'var(--on-primary-container)' }
                                        }, e(Settings, { size: 18 }))
                                    )
                                );
                            }

                            // Today but no workout (rest day)
                            if (isToday && !workout) {
                                return e('div', {
                                    key: day,
                                    className: 'rounded-xl p-5 flex flex-col justify-between min-h-[160px] relative',
                                    style: {
                                        background: 'var(--primary-container)',
                                        boxShadow: '0 0 30px rgba(209, 252, 0, 0.15)'
                                    }
                                },
                                    e('div', {
                                        className: 'absolute top-2 right-2 px-2 py-0.5 rounded text-xs font-bold',
                                        style: { background: 'rgba(76, 93, 0, 0.2)', color: 'var(--on-primary-container)' }
                                    }, getDateForDay(day)),
                                    e('div', null,
                                        e('span', { className: 'text-xs uppercase tracking-widest font-bold', style: { color: 'var(--on-primary-container)' } }, `${day} \u2022 Today`),
                                        e('h3', { className: 'font-medium text-lg mt-1 italic', style: { color: 'var(--on-primary-container)', opacity: 0.7 } }, 'Rest Day')
                                    ),
                                    e('div', { className: 'flex justify-end mt-4' },
                                        e('button', {
                                            onClick: () => { setEditingDay(day); startNewWorkout(); },
                                            className: 'flex items-center gap-2 px-4 py-2 rounded-xl text-sm font-bold transition-all active:scale-95',
                                            style: { background: 'var(--on-primary-container)', color: 'var(--primary-container)' }
                                        }, e(Plus, { size: 18 }), 'Add')
                                    )
                                );
                            }

                            // Regular day with workout
                            if (workout) {
                                return e('div', {
                                    key: day,
                                    className: 'rounded-xl p-5 flex flex-col justify-between min-h-[160px] relative',
                                    style: { background: 'var(--surface-container-highest)' }
                                },
                                    e('div', {
                                        className: 'absolute top-2 right-2 px-2 py-0.5 rounded text-xs font-bold',
                                        style: { background: 'rgba(248, 249, 254, 0.06)', color: 'var(--on-surface-variant)' }
                                    }, getDateForDay(day)),
                                    e('div', null,
                                        e('span', { className: 'text-xs uppercase tracking-widest', style: { color: 'var(--on-surface-variant)' } }, day),
                                        e('h3', { className: 'font-bold text-xl mt-1', style: { color: 'var(--on-surface)' } }, workout.name)
                                    ),
                                    e('div', { className: 'flex items-center gap-2 justify-end mt-4' },
                                        e('button', {
                                            key: 'start',
                                            onClick: () => startWorkout(day),
                                            className: 'px-4 py-2 rounded-xl text-sm font-bold transition-all active:scale-95',
                                            style: { background: 'var(--surface-container-low)', color: 'var(--primary-fixed-dim)' }
                                        }, hasProgress ? 'Continue' : 'Start'),
                                        e('button', {
                                            key: 'settings',
                                            onClick: () => { setEditingDay(day); setEditingWorkout(workout); setView('edit'); },
                                            className: 'p-2 rounded-xl transition-all active:scale-95',
                                            style: { background: 'rgba(69, 72, 76, 0.15)', color: 'var(--on-surface)' }
                                        }, e(Settings, { size: 18 }))
                                    )
                                );
                            }

                            // Rest day (no workout)
                            return e('div', {
                                key: day,
                                className: 'rounded-xl p-5 flex flex-col justify-between min-h-[160px] relative',
                                style: { background: 'var(--surface-container-low)', border: '1px dashed rgba(69, 72, 76, 0.2)' }
                            },
                                e('div', {
                                    className: 'absolute top-2 right-2 px-2 py-0.5 rounded text-xs font-bold',
                                    style: { background: 'rgba(248, 249, 254, 0.03)', color: 'var(--on-surface-variant)' }
                                }, getDateForDay(day)),
                                e('div', null,
                                    e('span', { className: 'text-xs uppercase tracking-widest', style: { color: 'var(--on-surface-variant)' } }, day),
                                    e('h3', { className: 'font-medium text-lg mt-1 italic', style: { color: 'var(--on-surface-variant)', opacity: 0.6 } }, 'Rest Day')
                                ),
                                e('div', { className: 'flex justify-end mt-4' },
                                    e('button', {
                                        onClick: () => { setEditingDay(day); startNewWorkout(); },
                                        className: 'flex items-center gap-2 px-4 py-2 rounded-xl text-sm transition-all active:scale-95',
                                        style: { background: 'var(--surface-container-highest)', color: 'var(--primary-fixed-dim)' }
                                    }, e(Plus, { size: 18 }), 'Add')
                                )
                            );
                        })
                    )
                ),
                e(BottomNavBar, { activeTab, onTabChange: handleTabChange })
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(e(WorkoutApp));
    </script>
</body>
</html>
